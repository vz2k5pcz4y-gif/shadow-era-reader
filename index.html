光茧，将林恩完全包裹。黑色的气流在他周围旋转，发出呼啸的声音，仿佛厉鬼在嚎哭。\n\n泰勒和戈克不自觉地向后退了几步，震惊地看着眼前的景象。\n\n“这……这是什么？！”戈克结巴地道，声音都在颤抖，“林恩该不会被那些亡灵附身了吧？俺可听说有些亡灵会夺舍……”\n\n“别胡说！”泰勒低喝道，但眼中也满是震撼，“这是血脉进阶。林恩的暗影血脉在战斗中突破了。娘的，这小子真是怪物，打架也能升级……”\n\n黑色光茧持续了大约三分钟，随后开始缓缓消散。\n\n林恩的身影重新出现在两人面前。\n\n等级：4级暗影血脉（Shadow Walker）！\n\n他看起来没有任何变化，但整个人的气质明显不同了。如果说之前的林恩像是一把藏锋的剑，那么现在的他就像是已经出鞘的利刃，锋芒毕露。他的眼睛变得更加深邃，隐约有黑光流转，整个人看起来仿佛与周围的阴影融为一体。\n\n“4级了。”林恩睁开双眼，眼中精芒闪烁，如同夜空中的星辰，璀璨而神秘。\n\n他能够清晰地感觉到自己的变化：Shadow Step的距离从三米增加到了五米，暗影箭的威力提升了近半，最重要的是——他隐隐感觉到，自己已经可以尝试同时召唤三个骷髅仆从了！\n\n不仅如此，他对死亡能量的掌控也更加得心应手。刚才战斗中吸收的大量死亡能量让他的暗影血脉彻底稳固在了四级水平，这意味着他已经真正成为了四级Shadow Walker。\n\n“林恩！”泰勒哈哈大笑，一拳砸在林恩的肩膀上，“好小子，真有你的！刚才那一仗打完就直接突破了，牛！俺算是服了你了！”\n\n“俺服了！”戈克竖起大拇指，眼神中满是敬佩和震撼，“林恩，你他娘的是俺见过最厉害的人类！不，是俺见过最厉害的人！打架打到一半突然升级，这种事情俺听都没听说过！你这算是开了俺的眼界了！”\n\n“多谢。”林恩微微一笑，感受着体内澎湃的力量，心中豪气顿生。\n\n他能够感觉到，自己的实力已经有了质的飞跃。如果现在再面对之前的幽冥骑士，他有信心在十招之内解决战斗！\n\n---\n\n“林恩，你刚才那一下真够帅的。”戈克忍不住夸奖道，声音中满是羡慕，“那什么Shadow Step，直接就瞬移到那个骷髅法师身后了，俺都没看清楚你是怎么过去的！而且最后那个升级，俺差点以为你要变成怪物了！”\n\n“小意思。”林恩微微一笑，“等你什么时候突破了，也能做到。”\n\n“得了吧。”戈克摇摇头，一脸的不自信，“俺这个脑子，能学会战斧砍人就不错了，还瞬移……俺可不敢想。俺能活着就不错了，这辈子俺就靠这两把斧子混饭吃了。”\n\n“你啊，就是太妄自菲薄了。”泰勒笑着道，递给戈克一块干粮，“刚才要不是你那一推，林恩可就危险了。你那一推，可比什么瞬移都及时。关键时刻救命，比什么都强。”\n\n“那是！”戈克立刻得意起来，虽然脸上的灰尘和汗水让他看起来颇为狼狈，“俺虽然脑子不灵光，但反应快啊！俺可是石牙部落百年一遇的天才！当年俺在部落的时候……”\n\n“打住打住。”泰勒和林恩异口同声地道，生怕戈克又开始了他的长篇大论。\n\n三人对视一眼，同时大笑起来。经历了刚才的生死之战，三人的默契和感情都更深了。\n\n遗迹的第一层，彻底被他们征服了。\n\n---\n\n收拾好心情，三人继续向前。通道比想象中更长，墙壁上每隔几步就镶嵌着一颗发光的宝石，提供微弱的光线。那光芒呈现淡蓝色，给整个通道蒙上了一层神秘的面纱。空气中越来越浓郁的死亡气息，让三人都感到有些压抑。\n\n“林恩，你升级到四级了，实力提升了多少？”泰勒好奇地道，眼中满是期待，“刚才那一战，如果不是你及时升级，咱们说不定就交代在这里了。”\n\n林恩感受了一下体内的力量，点头道：\n\n【突破后实力数据】\n等级：4级暗影血脉（Shadow Walker）\nShadow Step：5米范围（3级时为3米，提升67%）\n暗影箭威力：200点暗影伤害（3级时约130点，提升54%）\n可同时控制骷髅仆从：5个（3级时为3个）\n法力总量：提升了近一倍\n\n“Shadow Step的距离增加了一倍，从三米变成了五米。暗影箭的威力提升了大约五成，消耗却减少了。另外，我能够同时控制更多的骷髅仆从了。”\n\n【战力对比】\n越级挑战成果：\n- 面对3级骷髅法师，以3级实力击败\n- 战斗中突破到4级，实力翻倍\n\n“这么好？！”戈克的眼睛立刻亮了起来，仿佛看到了什么宝贝，“那以后遇到亡灵军队，岂不是可以直接让它们反水？！那俺们以后岂不是天下无敌了？！”\n\n“理论上是这样。”林恩点头道，“但实际上有限制。如果对方实力比我强太多，我的暗影之力就无法侵蚀对方的灵魂。”\n\n他顿了顿，又补充道：“如果是四级以下的亡灵，我现在有把握同时控制五个。如果是一级的骷髅，同时控制十个也没问题。”\n\n“五……五个？！”戈克的眼睛瞪得溜圆，仿佛听到了什么不可思议的事情，“那岂不是说，以后遇到小规模的骷髅军队，都不需要我们动手了？！这也太爽了吧？！”\n\n“哪有这么简单。”林恩摇头笑道，“控制需要法力维持，敌人越多，消耗越大。如果同时控制五个骷髅战士，我的法力会在一分钟内耗尽。”\n\n“一分钟也够了！”泰勒笑着道，“一分钟的时间，足够我们解决战斗了！而且你能控制五分钟的敌人，这优势太大了！”\n\n说话间，三人已经走到了通道的尽头。呈现在他们面前的，是一扇巨大的石门。\n\n石门上镌刻着复杂的符文，散发着淡淡的魔力波动。那光芒呈现幽蓝色，给人一种冰冷而神秘的感觉。石门的两侧各有一尊石像，雕刻的是两个身披铠甲的战士，手中各持武器，显得威风凛凛，仿佛随时都会苏醒过来。\n\n“小心，这门上有魔法禁制。”林恩低声道，眼神警惕，“戈克，别乱碰。”\n\n“俺知道，俺又不傻……”戈克嘟囔着，但还是乖乖地退后了几步，显得颇为谨慎。\n\n林恩走上前去，仔细观察着石门上的符文。那符文极其复杂，涵盖了魔法阵的原理、能量流动的规律，以及各种他看不懂的神秘符号。过了片刻，他抬起头，眼中闪过一丝喜色：“这扇门的开启方法我已经明白了。”\n\n他将手掌按在石门的中心位置，暗影魔力缓缓注入。符文开始发光，石门发出沉重的轰鸣声，缓缓向两侧打开。\n\n门后，是一个更加巨大的空间。\n\n“我的天……”戈克再次发出惊叹，声音中满是震撼。\n\n那是一个圆形的祭坛大厅，穹顶高得看不见顶端，仿佛连接着天际。在大厅的中央，矗立着一座巨大的雕像——那是一个身披黑袍的法师，手持法杖，面容模糊不清，但光是站在雕像前，三人就能感受到一股强大的威压。那种压迫感让他们几乎喘不过气来，仿佛面对的是一尊真正的神祇。\n\n而在雕像的基座上，放着一个古朴的箱子。箱子呈深棕色，上面刻满了复杂的花纹，散发着一股古老而神秘的气息。\n\n“宝藏！”戈克的眼睛瞬间亮了起来，就像看到了肉的狼，口水都要流下来了，“俺就知道遗迹里一定有宝藏！这次发了！发了！俺要发了！”\n\n“小心有陷阱。”泰勒提醒道，眼神依然警惕，丝毫不敢放松。\n\n林恩点点头，警惕地观察着四周。确认没有危险后，三人才小心翼翼地走向那个箱子。\n\n箱子打开的瞬间，一道柔和的光芒从箱子中射出，照亮了三人兴奋的脸庞。\n\n那是一本古朴的魔法书，封面已经发黄，但上面散发的魔力波动却异常强大，仿佛记载着无穷的智慧；一瓶闪烁着七彩光芒的药剂，散发出浓郁的药香，让人闻之精神一振；还有几块散发出浓郁魔力波动的魔晶，每一块都价值连城，足以让任何法师眼红。\n\n“《亡灵法师手札》！”林恩拿起那本魔法书，眼中满是惊喜，声音因兴奋而有些颤抖，“这可是好东西！有了它，我对亡灵魔法的理解一定能更上一层楼！这是无价之宝啊！”\n\n“还有这个……”泰勒拿起那瓶药剂，瓶中的液体流转着七彩的光芒，仿佛包含了整个世界的色彩，“这是什么？真好看！俺从来没见过这么漂亮的药剂！”\n\n“血脉进化药剂。”林恩鉴定了片刻，眼中闪过一丝震惊，声音都提高了，仿佛发现了什么不得了的宝贝，“居然是血脉进化药剂！这种药剂在整个大陆都是有价无市的宝贝！可以让人血脉进化的几率提升三成！有了它，突破境界将会容易得多！”\n\n“俺不管什么宝贝不宝贝的，”戈克兴奋地道，口水都要流下来了，“俺只知道，这次发了！发了！俺要发了！这些宝贝俺们下半辈子都花不完啊！”\n\n三人对视一眼，同时大笑起来。\n\n遗迹的第一层，彻底被他们征服了。\n\n而林恩的变强之路，才刚刚开始。\n\n---\n\n【战斗结束】\n\n【获得经验值：450点】\n\n【等级提升：2级→3级】\n\n【领悟新技能：阴影束缚（主动）】\n\n【暗影血脉觉醒度提升：12%→15%】\n\n【当前实力：三级幽影刺客（暗影血脉）】\n\n---\n\n【林恩·夜语 属性面板】\n等级：3级\n称号：幽影刺客\n属性总和：40\n\n力量：8 | 敏捷：10 | 体质：6\n悟性：7 | 感知：12 | 灵魂：7\n\n突破！感知属性达到14，灵魂突破7，正式迈入3级门槛！\n\n升级条件：总和60，感知14，灵魂10（4级门槛）\n\n---\n\n【技能数据】\n- Shadow Step：5米瞬移，消耗20点暗影魔力\n- 暗影箭：130点暗影伤害，消耗15点暗影魔力\n- 阴影束缚：控制敌人3秒，消耗50点暗影魔力\n- 骷髅召唤：可同时控制5个三级以下骷髅仆从\n\n【暗影箭威力成长曲线】\n1级暗影血脉：暗影箭威力50点\n2级暗影血脉：暗影箭威力100点  \n3级暗影血脉：暗影箭威力130点\n4级暗影血脉：暗影箭威力200点\n\n（本章完）'},{n:45,t:'第45章：发现密室',c:'幽影森林的夜色浓重如墨，茂密的树冠遮蔽了天空，只有几点星光从树叶的缝隙中洒落。林恩站在遗迹的入口处，月光透过破碎的石壁洒落，在他脚下投下斑驳的影子。刚才的战斗让他的血脉之力有些透支，但现在不是休息的时候。\n\n那场与骷髅战士和骷髅法师的战斗虽然已经结束，但遗迹中依旧弥漫着阴冷的气息。泰勒的风暴血脉、雷戈的矮人战技、黛西的治愈魔法，再加上林恩自己的暗影血脉，四人合力终于消灭了所有守卫。现在，遗迹的真正秘密正向他们敞开大门。\n\n“你们还好吗？”林恩转身看向身后的伙伴们。\n\n泰勒的活动着被雷电灼伤的右臂，脸上却带着兴奋的笑容：“小事！这群骷髅架子可比黑石镇的盗匪耐打多了，不过也就那样。”他的风暴血脉在战斗中激活，雷光在他指尖若隐若现。虽然右臂有些轻微的灼伤，但这对他来说根本不算什么。\n\n戈克就没那么轻松了，矮人浑身的肥肉都在颤抖，手中的战锤上还沾着骷髅的碎骨渣滓。“我的先祖在上……这地方太邪门了。林恩小子，咱们真的要在这种鬼地方继续深入？我总觉得还有什么东西在盯着我们看。”\n\n“遗迹的核心区域就在下面。”林恩运转体内血脉之力，感受着亡灵戒指传来的微弱波动，“那个亡灵法师乌尔里克·暗影的遗产，绝对不只是这些骷髅守卫。”\n\n黛西从怀中取出一支恢复药剂，轻轻涂在手臂的擦伤上。她是银火学派这一代的优秀学徒，专精治愈魔法，虽然战斗力不如泰勒和戈克，但在这个危险的遗迹中，她的存在至关重要。作为银火学派的长老之女，她从小就被教导要以救死扶伤为己任。\n\n“林恩，你感应到的那个东西……到底是什么？”黛西忍不住问道。她注意到从进入遗迹开始，林恩就一直时不时地低头看向自己的左手无名指——那里佩戴着那枚古老的亡灵戒指。\n\n那枚戒指是林恩的母亲伊莲娜留给他的遗物，据说是林恩父亲家族传承下来的宝物。但只有林恩自己知道，这枚戒指远没有那么简单。它不仅仅是一个空间储物装置，更是一个连通阴阳两界的钥匙。\n\n“不知道。”林恩诚实地摇头，“但戒指在召唤我。它告诉我，遗迹深处有东西在等着我。”\n\n“听起来挺瘆人的。”戈克缩了缩脖子，“要不咱们就在这儿分了这遗迹里的宝贝，然后打道回府？”\n\n“你害怕了？”泰勒笑着调侃道。\n\n“放屁！我戈克什么时候怕过！”矮人梗着脖子说道，但声音明显有些发虚。\n\n泰勒走过来，拍了拍林恩的肩膀：“那就走呗！咱们都到这儿了，难道还怕一个死了几百年的亡灵法师？”他的笑容很有感染力，让紧张的气氛稍稍缓解。作为风暴家族的唯一幸存者，泰勒比任何人都清楚实力的重要性。这个遗迹中的宝物，很可能让他们实力大增。\n\n林恩点点头，迈步向遗迹内部走去。其他人对视一眼，迅速跟上。\n\n遗迹的通道蜿蜒向下，空气越来越阴冷，墙壁上偶尔可见模糊的壁画，描绘着古老的仪式场景——身披黑袍的法师围绕着祭坛，祭坛上摆放着某种武器的碎片。那些壁画已经有数千年的历史，颜色大多已经剥落，但依旧能辨认出大致的内容。\n\n“那是……镰刀？”戈克眯起眼睛，仔细看着一幅壁画上描绘的图案，“我好像在矮人部的古籍里见过这种图案。传说中，死神乌里尔使用的武器就是一把镰刀。”\n\n“死亡镰刀。”林恩喃喃道，戒指传来的波动越来越强烈，“传说中死神乌里尔的武器。传说那把镰刀拥有收割生命的力量，是真正的神器。”\n\n“那不是传说吗？”黛西有些不确定地说道。\n\n“谁知道呢。”林恩没有继续这个话题。他现在能清楚地感受到，戒指正在召唤他前往某个地方。那种感觉越来越强烈，就像是有某种存在在冥冥之中牵引着他。\n\n通道的尽头是一扇厚重的石门，门上雕刻着复杂的魔法符文，散发着淡淡的幽光。符文是一种古老的魔法语言，林恩在银火学派的图书馆中曾经看到过一些，但像这样完整而复杂的符文阵列他还是第一次见到。\n\n“这扇门上有很强的魔法封印。”黛西观察了一会儿说道，“如果我没看错的话，这应该是一个防止闯入的陷阱阵。”\n\n“让我来试试。”林恩将手放在石门上，体内的暗影血脉与戒指产生共鸣。戒指散发出淡淡的黑光，石门上的符文开始闪烁，仿佛在识别林恩的身份。\n\n“轰——”一声闷响，石门缓缓打开。一股陈旧的气息扑面而来，带着潮湿和腐朽的味道。众人警惕地举起武器，但门后并没有敌人攻击他们。\n\n一间不大的密室出现在众人眼前，空气中弥漫着陈旧的气息，显然已经有很长时间没有人来过了。密室约莫二十平米大小，四周的墙壁上刻画着更多的魔法符文，但都已经失去了光泽。\n\n密室的墙壁上镶嵌着发光的魔法石，提供着微弱但持久的光源。在密室的中央，是一排书架，上面摆满了各种书籍。而在角落里的木制柜子上，则放置着几个瓶瓶罐辣。除此之外，密室中还有一张石桌和一把椅子，看起来像是主人平时研究魔法的地方。\n\n“魔法书！”戈克的眼睛瞬间亮了起来，完全忘记了刚才的恐惧，“肯定是珍贵的魔法知识！发财了，这次真的发财了！”\n\n“先别急着高兴。”泰勒提醒道，“小心有什么陷阱。”\n\n戈克小心翼翼地走向书架，每一步都走得极其缓慢。但一直到走到书架前，都没有发生任何事情。他这才放心大胆地开始翻找书籍。\n\n林恩没有急于查看那些书，他的目光被书架后方的一样东西吸引——那是一本被单独放置的古籍，封面上用古代文字写着《乌尔里克·暗影的心灵札记》。与其他书籍不同，这本札记被保存得非常好，封面上还镶嵌着一颗小小的黑色宝石。\n\n他走上前去，将那本札记取下。札记的纸张已经泛黄，但保存得相当完好。林恩翻开第一页，一股陈旧的墨香扑面而来。\n\n“吾乃乌尔里克·暗影，幽影森林之主……”林恩轻声朗读着札记的内容，“吾穷尽一生研究死亡与暗影的奥秘，终于在某处遗迹中发现了死神乌里尔的遗产……那是七块死亡镰刀的碎片，蕴含着死神的部分神力……”\n\n“七块镰刀碎片？”泰勒凑过来，好奇地看着札记上的记载，“这个乌尔里克在说什么？”\n\n“他在研究死神的力量。”林恩继续往下读，“乌尔里克说他只找到了其中一块，其余六块散落在大陆各地，每一块都蕴含着巨大的力量。而他找到的那块，被他藏在了遗迹的最深处……”\n\n“遗迹最深处？”戈克的眼睛更亮了，“那岂不是说，咱们要找的东西就在下面？”\n\n林恩点点头，继续阅读札记。乌尔里克在札记中详细记载了他对死亡魔法的研究成果，包括如何利用亡灵戒指召唤和控制骷髅战士，以及如何将死亡之力转化为自身的能量。\n\n“这些……对你应该很有帮助。”林恩转头看向黛西。作为银火学派的学徒，黛西虽然主修治愈魔法，但对这些亡灵魔法知识也非常感兴趣。事实上，银火学派并不排斥亡灵魔法，只是对使用者的品德有严格要求。\n\n黛西接过札记，翻看了几页，眼中闪过惊喜的光芒：“这上面记载的冥想方法……和我们学派的基础冥想完全不同。它直接利用死亡之力来提升精神力，虽然听起来有些邪门，但原理上确实可行！如果能掌握这种方法，我的实力一定能提升很多。”\n\n“对你有帮助就好。”林恩又转向书架，开始查看其他的书籍。这些书大多是乌尔里克收藏的魔法典籍，包括《基础亡灵召唤术》《药剂学入门》《魔法卷轴制作》等等。\n\n“《基础亡灵召唤术》……”林恩翻看这本书记载的内容。这是一本非常基础的亡灵魔法入门书，详细介绍了如何从死亡的生物身上提取能量，如何与亡灵建立契约等等。对于现在的林恩来说，这本书正好合适。\n\n戈克已经迫不及待地打开了角落里的柜子。柜子里放着几个水晶瓶，瓶中装着颜色各异的液体。\n\n“恢复药剂！”戈克兴奋地叫了起来，“整整五瓶！还有魔法卷轴！”他小心翼翼地拿出三卷卷轴，视若珍宝地捧在手中。这些可都是保命的好东西！\n\n“恢复药剂在关键时刻能救命，魔法卷轴也是重要的底牌。”林恩走过来，看着戈克手中的收获，“这些我们要妥善分配。”\n\n“那是当然！”戈克笑得眼睛都眯成了一条缝，“我只要两瓶恢复药剂就行，其他的你们分。”\n\n林恩又仔细搜查了一遍密室，确认没有遗漏任何有价值的东西。这间密室显然是乌尔里克平时研究魔法的地方，除了书籍和药剂，还有一些其他的魔法材料，但价值都不是很高。\n\n“走吧。”林恩将《基础冥想精要》收入亡灵戒指的空间中——这是乌尔里克札记中提到的一本入门书籍，对初学者很有帮助，也是他母亲一直希望他能够学习的东西，“我们继续深入，去找遗迹的核心区域。”\n\n密室的门在众人身后缓缓关闭。林恩感受着戒指传来的波动，知道死神镰刀的碎片就在下面等着他。\n\n那将是他们这次遗迹探险的最终目标。\n\n而在遗迹的更深处，那尊死神雕像已经等待了千年。\n\n通道继续向地下延伸，温度也越来越低。林恩能感觉到，周围的魔法波动越来越强烈，显然他们正在接近遗迹的核心区域。\n\n“小心点。”林恩提醒道，“前面可能有更强的敌人。”\n\n话音刚落，前方的通道突然变得开阔起来。众人来到了一间更大的石室，这里似乎是一个军事要塞曾经的驻地——墙壁上还有战斗留下的痕迹，地面上散落着一些锈迹斑斑的武器。\n\n而在石室的尽头，是一扇更加巨大的石门，门上雕刻着复杂的图案，散发着不祥的气息。\n\n“这扇门后面，应该就是遗迹的核心了。”林恩感受着戒指的波动说道。\n\n泰勒握紧拳头，雷电在指尖闪烁：“那还等什么？进去吧！”\n\n戈克咽了口唾沫，但眼中也闪烁着期待的光芒。作为一个矮人，他生平最大的爱好就是寻找宝藏。这个遗迹中最珍贵的宝物，就在这扇门后面。\n\n黛西没有说话，但她的眼神同样坚定。作为团队中的治愈者，她必须时刻保持警惕，随时准备支援伙伴们。\n\n林恩深吸一口气，走上前去，将手掌贴在石门上。体内的血脉之力与戒指产生共鸣，石门缓缓打开……\n\n遗迹的核心区域，终于向他们敞开了大门。'},{n:46,t:'第46章：宝物',c:'从密室出来，林恩一行人继续沿着遗迹的通道向深处前进。墙壁上的魔法石提供着幽冷的光线，将他们的影子拉得细长。空气中弥漫着一股陈腐的气息，仿佛这里已经被封闭了数百年。\n\n越往深处走，通道就越显得阴森可怖。墙壁上开始出现一些奇怪的符号，那是乌尔里克留下的魔法标记，用来驱赶那些不小心闯入的探险者。若非有林恩手中的亡灵戒指指引，他们根本不可能如此顺利地到达这里。\n\n“林恩小子，”戈克走在队伍中间，声音压得很低，仿佛害怕惊动什么沉睡的东西，“你说那个乌尔里克……会不会在遗迹里留下什么陷阱？”\n\n“肯定会。”林恩没有回头，“一个亡灵法师的遗迹，不可能没有任何防护措施。之前的骷髅守卫只是第一道防线。大家都小心点，保持警惕。”\n\n泰勒的雷电在指尖若隐若现，警惕地观察着四周。作为风暴家族的遗孤，他比任何人都清楚危险的滋味。风暴家族的灭族之灾还历历在目，他必须变得更强，才能保护自己想要保护的人。\n\n黛西则手持法杖，随时准备释放治愈魔法。作为银火学派的长老之女，她从小就被告知要成为一个优秀的治愈法师。虽然她的战斗力不如泰勒和戈克，但在关键时刻，她的存在足以挽救整个团队的性命。\n\n“林恩，”黛西犹豫了一下，还是开口问道，“你觉得那个死神镰刀的碎片……到底是什么样的？”\n\n“不知道。”林恩诚实地回答，“但我能感觉到，它和我手中的戒指有某种联系。那种感觉……很难形容。就像是血脉之间的共鸣，又像是灵魂层面的呼应。”\n\n一行人又往前走了约莫一刻钟，通道终于变得开阔起来。眼前出现了一段向下的石制阶梯，阶梯的尽头是一间更加宽敞的大厅。\n\n大厅的穹顶很高，顶部镶嵌着数颗巨大的魔法石，将整个空间照得如同白昼。墙壁上刻画着精美的浮雕，描述的是死神乌里尔收割灵魂的场景——无数灵魂从尸体中飘出，被乌里尔的镰刀牵引着进入某个黑暗的漩涡。\n\n“这里应该是遗迹的核心区域了。”林恩停下脚步，环顾四周。大厅的中央是一尊雕像——那是一个身披黑袍的收割者，手持巨大的镰刀，面容隐藏在兜帽的阴影中。\n\n雕像高约五米，通体由黑色的石材雕刻而成，表面还镶嵌着不知名的金属颗粒，在魔法石的照耀下闪烁着诡异的光芒。雕像的手中握着一把比真人还高的巨大镰刀，刀刃上散发着森森的寒意。\n\n“那是……死神？”黛西惊呼出声，下意识地后退了一步。作为月神祭司的后裔，她对这种死亡相关的气息本能地感到不适。\n\n“准确地说，是死神乌里尔的雕像。”林恩感受着戒指传来的强烈波动，“看来我们要找的东西，就在这里。”\n\n大厅的四周散落着一些骸骨，看起来是当年乌尔里克的实验失败品。骸骨堆中有一些已经腐朽的武器和防具，表明这些人曾经是乌尔里克的追随者，只可惜实验失败，变成了如今的枯骨。\n\n众人的目光都被中央的雕像吸引，慢慢地走了过去。\n\n雕像的底座上刻着一段文字，林恩凑近看去，发现是古代通用语。\n\n“凡继承死神意志者，需通过镰刀的考验……”林恩翻译着底座上的文字，“只有真正领悟死亡真谛之人，才能获得镰刀的认可……死亡不是终点，而是新的开始。”\n\n“考验？”泰勒皱起眉头，“什么考验？”\n\n话音刚落，雕像突然发生了变化。原本静止的雕像开始震动，黑色的雾气从雕像的缝隙中溢出，充满了整个大厅。一股冰冷的气息扑面而来，让众人不自觉地打了个寒颤。\n\n“小心！”林恩大喊一声，体内的血脉之力瞬间激活。他的身体被黑色的暗影包裹，整个人仿佛与周围的阴影融为一体。这是血脉之力运转到极致的表现。\n\n然而预想中的攻击并没有到来。黑雾渐渐散去，雕像前方的地面上出现了一个魔法阵，魔法阵的中心放置着一个黑色的木盒。魔法阵由复杂的符文组成，散发着淡淡的黑色光芒，仿佛有生命一般在缓缓流转。\n\n“那是……什么？”戈克咽了口唾沫，声音有些发颤。\n\n林恩走上前去，缓缓打开木盒。盒中躺着一块黑色的金属碎片，碎片只有手掌大小，但散发出的气息却让人心悸。那是死亡的气息，冰冷、威严，仿佛来自九幽之下。仅仅是看上一眼，就让人有一种灵魂被冻结的感觉。\n\n“这就是……死亡镰刀的碎片。”林恩小心翼翼地将碎片拿起。碎片入手的瞬间，他体内的血脉之力疯狂涌动，亡灵戒指也发出耀眼的光芒。两者之间产生了剧烈的共鸣，仿佛两块分离已久的拼图终于重新合在一起。\n\n“这感觉……”林恩闭上眼睛。他能感受到碎片中蕴含的庞大力量，那不是凡人能够驾驭的力量，那是神的力量。仅仅是拿在手中，他就感觉到自己的精神力正在被疯狂地消耗。\n\n“林恩！”黛西惊呼，“你的身体……”\n\n林恩睁开眼，发现自己的皮肤下浮现出淡淡的黑纹，那是死亡之力在体内流动的痕迹。他能感觉到，自己的血脉等级在突破的边缘。原本停滞不前的瓶颈，竟然开始松动。\n\n“没事。”林恩深吸一口气，压下体内躁动的力量，“这块碎片……和我有缘。”\n\n泰勒走上前来，好奇地看着林恩手中的碎片：“这就是死神乌里尔的武器碎片？看起来也没什么特别的嘛。就是在发光而已。”\n\n“不要小看它。”林恩严肃地说道，“这块碎片蕴含的力量，足以毁灭一座城市。如果运用得当，它可以成为我们最大的底牌。但如果使用不当，也会给我们带来灭顶之灾。”\n\n戈克的眼睛滴溜溜地转着，显然在打着什么主意。但他也知道，这种神器碎片不是他能觊觎的。先不说他有没有能力使用它，单是这份因果，就不是他能够承受的。\n\n“先离开这里再说。”林恩将碎片收入亡灵戒指的空间中。戒指的空间似乎与碎片产生了某种共鸣，存放起来异常顺利。碎片一进入戒指空间，原本灰色的空间就开始产生变化——黑色的气息开始在空间中弥漫，仿佛开辟出了一片属于死亡的世界。\n\n就在众人准备离开的时候，大厅的墙壁突然开始崩塌。一块块巨大的石块从天花板上掉落，掀起漫天的尘土。\n\n“不好！遗迹要塌了！”泰勒大喊。这样的场景让他想起了家族被灭的那一天，房屋倒塌、亲人离散……\n\n“跑！”林恩率先向外冲去，其他人也紧随其后。通道在身后不断坍塌，众人使出浑身解数，在崩塌的通道中左冲右突。\n\n戈克虽然身材矮小，但奔跑的速度却一点不慢。泰勒则直接召唤出雷电，利用风雷之力加速。黛西在两人的保护下，紧随其后。\n\n林恩跑在最后，他能感觉到身后不断有石块掉落，有几次甚至擦着他的身体掠过。体内的血脉之力疯狂运转，帮他躲避着一次又一次的危险。\n\n不知道跑了多久，众人终于冲出了遗迹入口。外面的天空已经泛白，太阳从地平线上升起，预示着新的一天到来。清晨的阳光照在众人身上，让他们有一种重获新生的感觉。\n\n“呼……呼……”戈克一屁股坐在地上，大口大口地喘着气，“差点……差点就交代在里面了！这次真是亏大了，我的老命都差点没了！”\n\n泰勒虽然没有像戈克那样瘫倒，但脸上也露出了心有余悸的表情。刚才的逃亡让他消耗了大量的体力，现在只想找一个地方好好休息一下。\n\n黛西的情况最糟糕，她的魔力在刚才的逃亡中几乎耗尽，此刻正靠在林恩身上才能站稳。作为一个主修治愈魔法的法师，她的体力本来就不好，刚才又消耗了大量魔力来保护自己，现在已经是强弩之末。\n\n“这次收获太大了。”林恩看着手中的空间戒指，“那块镰刀碎片……绝对是无价之宝。有了它，我的实力至少能提升一倍。”\n\n“得了吧，”戈克从地上爬起来，拍了拍身上的灰尘，“那东西邪门得很，也就你能驾驭。我们啊，能分点汤喝就不错了。”\n\n林恩微微一笑，从戒指中取出在密室中获得的那些宝物。\n\n首先是一本《基础冥想精要》。这本书的封面是深蓝色的皮革纸，上面用银色的墨水写着书名，显得格外神秘。这是一种特殊的冥想方法，能够帮助法师更快地提升精神力。\n\n“魔法书《基础冥想精要》，”林恩首先看向黛西，“这本书记载了一种特殊的冥想方法，对奥术修炼很有帮助。黛西，这本书归你。”\n\n黛西有些惊讶地接过书籍：“这……这太珍贵了……林恩，你真的要把这本书给我？”\n\n“你的治愈魔法在队伍中不可或缺，”林恩认真地说道，“而且这本书对你提升实力会有很大帮助。只有你变得更强，才能在关键时刻救下我们所有人的命。”\n\n黛西没有再推辞，郑重地将书收好：“谢谢你，林恩。我一定会好好利用这本书的。”\n\n然后是五瓶恢复药剂。恢复药剂是一种非常珍贵的魔法药剂，能够在短时间内恢复受伤者的体力，加速伤口愈合。是探险者和战士们梦寐以求的保命之物。\n\n“恢复药剂五瓶，”林恩继续分配，“我们每人一瓶，剩下的一瓶留在公共储备里，谁需要的时候就用。”\n\n泰勒和戈克各自接过一瓶恢复药剂，脸上都露出了笑容。这种保命的东西，再多也不嫌少。\n\n最后是三卷魔法卷轴。魔法卷轴是一种储存了魔法的特殊纸张，使用时只需要撕开卷轴，就能释放其中的魔法。是一次性用品，但威力巨大，是底牌中的底牌。\n\n“三卷魔法卷轴，”林恩看向戈克，“你拿两卷，我和泰勒各拿一卷。如何？”\n\n戈克眉开眼笑：“没问题！这两卷卷轴归我，剩下的你们自己分。”矮人接过卷轴，小心翼翼地收好，仿佛这是什么稀世珍宝。\n\n分配完卷轴，林恩将最后的《乌尔里克·暗影的心灵札记》收入戒指。这本札记记载了亡灵法师的研究心得，对他理解死神遗产非常重要。而且上面还记载了寻找其他六块镰刀碎片的方法，虽然不是很详细，但至少指明了方向。\n\n“这次遗迹探险，我们算是满载而归了。”泰勒看着手中的恢复药剂，感慨道。这次行动虽然凶险，但收获也是巨大的。不仅获得了珍贵的宝物，还让林恩的实力更上一层楼。\n\n“别高兴得太早，”林恩提醒道，“那个黄昏教团不会善罢甘休的。我们得尽快离开幽影森林，返回银火城。”\n\n众人点点头，开始整理行装。清晨的阳光洒在幽影森林的树冠上，新的一天开始了。但林恩知道，属于他的战斗还远没有结束。\n\n那块死亡镰刀碎片在他的戒指中散发着微弱的波动，仿佛在诉说着某个古老而神秘的约定。死神乌里尔的遗产，已经选择了它的继承人。\n\n而他，必须承担起这份责任。\n\n---\n\n就在这时，黛西悄悄走到林恩身边，轻轻拉了拉他的衣袖。\n\n“林恩，”她的声音很轻，只有两人能听到，“你……你现在有空吗？我想单独和你说几句话。”\n\n林恩愣了一下，点点头：“好。”\n\n两人走到一旁，远离泰勒和戈克的视线。\n\n“黛西，怎么了？”林恩问道。\n\n黛西低着头，银色的长发垂落，遮住了她半边脸颊。过了好一会儿，她才开口：\n\n“林恩，你……你现在变得好强。”\n\n林恩微微一笑：“是吗？”\n\n“我不是在开玩笑，”黛西抬起头，眼中闪烁着复杂的光芒，“刚才在遗迹里，你面对那么危险的情况，都能从容应对。我……我发现我已经越来越追不上你的脚步了。”\n\n林恩看着黛西认真的眼神，心中微微一动。\n\n“黛西，”他轻声说道，“实力变强是我的目标，但这并不意味着我要抛下你们不管。我们是伙伴，是队友，无论我变得多强，这一点都不会改变。”\n\n“伙伴……”黛西喃喃道，眼神有些迷茫，“可是，我总觉得自己帮不上什么忙。在遗迹里，每次遇到危险，都是你和泰勒在前面战斗，而我只能躲在后面……”\n\n“别这么说，”林恩认真地说道，“你的治愈魔法救了我们好几次。如果没有你，我们不可能活着走出遗迹。黛西，你很重要。”\n\n黛西看着林恩真诚的眼神，眼眶微微泛红。\n\n“林恩……”\n\n“相信我，”林恩微微一笑，“无论未来发生什么，我都会保护好你的。”\n\n黛西没有说话，只是轻轻点了点头。但她的嘴角，却露出了一丝甜甜的笑容。\n\n两人并肩站在清晨的阳光中，阳光洒在他们的身上，在地上投下长长的影子。\n\n这一刻，仿佛时间都静止了。\n\n“咳！”泰勒故意的咳嗽声从身后传来，“那个……整理好了，该出发了！”\n\n黛西俏脸一红，快步走回到队伍中。林恩则是无奈地笑了笑，也跟了上去。\n\n“林恩，”泰勒挤眉弄眼地小声道，“进展不错嘛！”\n\n“别瞎说，”林恩摇头道。\n\n“我可没瞎说，”泰勒笑着摇头，“刚才我都看到了。放心，我支持你！”\n\n林恩懒得理会泰勒的调侃，大步向前走去。\n\n但不知为何，他的心情却是格外的好。'},{n:47,t:'第47章：死神雕像',c:'从密室出来的那一刻，林恩就感觉到一种异样的氛围。亡灵戒指不再只是简单地指引方向，而是开始微微震颤，仿佛发现了什么重要的东西。那种震颤不同于之前与魔法阵产生共鸣时的波动，而是一种更加深沉、更加古老的律动，就像是一个沉睡多年的生命正在苏醒。\n\n“我们继续往下走。”林恩按住左手的戒指，压低声音说道，“下面有很重要的东西。”\n\n泰勒和戈克对视一眼，都从对方眼中看到了好奇。黛西则担忧地看着林恩，她能感觉到林恩身上的气息正在发生变化——准确地说，是他体内的那股死亡之力，正在被某种存在唤醒。那种感觉让她本能地感到不安，仿佛有什么不可名状的存在正在接近。\n\n通道越往深处越狭窄，最后只能容纳一人通过。墙壁上开始出现更多的壁画，内容都是关于一个身披黑袍、手持镰刀的存在——死神乌里尔。壁画的内容越来越详尽，描述了乌里尔生前的种种事迹——他如何获得死神的力量，如何建立自己的势力，如何最终陨落。\n\n“你们看这个。”戈克突然停下脚步，指着墙壁上的一幅画。画中，乌里尔站在高台之上，手中举着断裂的镰刀，而他的周围跪满了黑色的骷髅战士。在乌里尔的脚下，是无数敌人的尸体，天空中电闪雷鸣，仿佛在诉说着那场远古战役的惨烈。\n\n“他在举行某种仪式。”黛西仔细观察着壁画，“看起来像是在……召唤什么？”\n\n“死神的力量来源。”林恩淡淡地说道，“乌尔里克在研究如何获取死神的力量，并最终成功了。只可惜……”他没有继续说下去，但众人都明白——乌尔里克成功了，但也因此招来了杀身之祸。\n\n又走了约莫一刻钟，通道终于变得开阔起来。众人来到了一间巨大的石室门前。这扇门与之前的完全不同——它通体由黑色金属打造，门面上浮雕着无数骷髅的图案，而在门的正中央，镶嵌着一颗硕大的红色宝石。宝石散发着妖异的光芒，仿佛在警告着闯入者前方的危险。\n\n“这扇门……好诡异。”戈克咽了口唾沫，“比之前的石门危险得多。我能感觉到，这扇门后面绝对有什么可怕的东西。”\n\n“让我来。”林恩走上前去，将手掌贴在红色宝石上。体内的暗影血脉与戒指产生共鸣，红色宝石开始发出妖异的光芒。一时间，整个通道都被红光笼罩，气氛变得格外诡异。\n\n“轰——”一声闷响，黑色金属大门缓缓向两侧打开。一股冰冷的气息从门内涌出，带着死亡的味道，让所有人都不自觉地打了个寒颤。那种感觉就像是从温暖的春天突然进入了严寒的冬季，又像是从生者的世界踏入了亡灵的国度。\n\n门后是一间巨大的圆形石室，穹顶高得离谱，仿佛通向地底深处。石室的墙壁上点燃着幽蓝色的火焰，将整个空间照得诡异莫名。那火焰不是普通的火焰，而是一种魔法之火，燃烧了数千年都没有熄灭。\n\n而最引人注目的，是石室中央的那尊雕像。\n\n那是一尊高三米的黑色雕像，雕刻的是一个身披长袍的收割者。他手持一把巨大的镰刀，刀刃在幽蓝火焰的映照下闪烁着寒光。最令人毛骨悚然的是，雕像的头部笼罩在深深的兜帽阴影中，只露出一双血红色的眼睛，仿佛在注视着每一个进入这里的人。那双眼睛中蕴含着无尽的沧桑和冷漠，让人不自觉地心生敬畏。\n\n“死神乌里尔……”林恩喃喃自语，戒指的震颤越来越强烈。他能感觉到，自己与这尊雕像之间有着某种奇妙的联系，就像是一枚硬币的两面。\n\n“这就是那个亡灵法师供奉的神像？”泰勒皱起眉头，“看起来就不是什么好东西。”\n\n“不是神像。”林恩纠正道，“这是死神乌里尔本人生前的雕像，是他自己雕刻的。”\n\n“什么？！”戈克惊呼，“你是说死神真的存在？”\n\n“不仅仅存在，”林恩慢慢走向雕像，“他还留下了遗产。”\n\n就在林恩距离雕像还有十步之遥时，异变发生了。\n\n雕像的血红色眼睛突然亮了起来，两道实质般的目光落在林恩身上。林恩整个人如遭雷击，僵立在原地无法移动。他能感觉到，有一股无法抗拒的力量正在将他拉向某个未知的地方。\n\n“林恩！”黛西惊呼，想要冲上去，却被一股无形的力量阻挡。那股力量是如此的强大，以至于她根本无法突破。\n\n“黛西，别过来！”林恩艰难地开口。他的身体虽然无法移动，但意识却异常清醒。他能感觉到，有某种强大的存在正在通过雕像注视着他，那是一种超越了凡人的存在——神。\n\n那是一个无比古老、无比强大的意识，仿佛跨越了数千年的时光，透过雕像与他对视。那个意识中包含了无尽的知识和力量，但也带着深深的疲惫和沧桑。\n\n“暗影血脉的继承者……”一个苍老而威严的声音在林恩脑海中响起，“你终于来了。”\n\n“您是……死神乌里尔？”林恩在心中问道。\n\n“吾只是一缕残存的意志。”那声音带着无尽的沧桑，“吾本体已陨落多年，只留下这缕意志等待有缘人。”\n\n“等我？”林恩有些困惑。\n\n“吾之镰刀在远古战役中断裂，七块碎片散落各地。”死神意志缓缓解释道，“每一块碎片都蕴含着吾之力量的一小部分。而你手中的戒指，是吾当年遗落人间的传承之物。”\n\n林恩心中一动，低头看向左手的亡灵戒指。\n\n“汝继承了吾之戒指，便是吾之传承者。”死神意志继续说道，“吾之镰刀碎片散落各地，共有七块。汝需将它们全部找回，重铸吾之镰刀，方能继承吾之死神之位。”\n\n“七块碎片……”林恩记起之前在密室中看到的札记记载。\n\n“没错。”死神意志似乎能读懂林恩的想法，“乌尔里克那孩子是吾之信徒，他找到了其中一块碎片，并将其藏在这座遗迹中。汝既然能找到这里，说明吾之传承与汝有缘。”\n\n“我……我能拒绝吗？”林恩忍不住问道。他能感觉到，这个责任有多沉重。成为死神，意味着要承担起维护生死平衡的重任，那不是现在的他能够承受的。\n\n“汝以为吾之传承是任人挑选的礼物？”死神意志的声音突然变得严厉，“暗影血脉、死神戒指……汝身上流的血、汝手中戴的戒，无一不是吾之意志的安排。汝从出生的那一刻起，便注定要走上这条路。”\n\n林恩沉默了。他回想起自己这几个月来的经历——血脉觉醒、逃离家族、加入银火学派、结识伙伴、探索遗迹……一切都像是被某种力量推动着前进。之前他还以为这只是命运的巧合，但现在他明白了，这不是巧合。\n\n他之所以会获得暗影血脉，是因为死神意志的安排。他之所以会得到亡灵戒指，是因为死神意志的遗产。他之所以会来到这座遗迹，也是因为死神意志的指引。\n\n一切，从一开始就已经注定了。\n\n“吾不强迫汝。”死神意志的语气缓和下来，“吾之传承蕴含着巨大的力量，也伴随着巨大的责任。汝若选择接受，将成为新一代死神，行走于阴阳两界，维护生死平衡。汝若选择拒绝……”\n\n“会怎样？”\n\n“吾之意志会寻找下一个传承者。”死神意志说道，“而汝……将永远失去继承吾之力量的资格。但汝体内的暗影血脉不会消失，它会一直陪伴着你，直到你找到真正属于自己的道路。”\n\n林恩陷入沉思。他想到了母亲伊莲娜的期望，想到了导师莫雷的教诲，想到了伙伴们的信任，想到了自己一直追求的力量。如果他拒绝，会怎么样？\n\n不，他不会拒绝。\n\n从血脉觉醒的那一刻起，他就注定要与黑暗为伴。接受死神传承，或许是他唯一的选择——也是他变强的唯一道路。更重要的是，他能感觉到，这个传承对他来说意味着什么。那不仅仅是一种力量，更是一种责任，一种使命。\n\n“我接受。”林恩在心中坚定地说道。\n\n“很好。”死神意志似乎露出了赞许的笑意，“汝做了一个明智的决定。”\n\n话音刚落，雕像的眼睛突然射出两道血红色光芒，击中林恩胸前的亡灵戒指。戒指剧烈震颤起来，散发出前所未有的黑色光芒。那光芒是如此的强烈，以至于整个石室都被染成了黑色。\n\n林恩能感觉到，有大量的信息涌入他的脑海——死神乌里尔的战斗技巧、对死亡之力的运用、召唤亡灵的秘法、以及……如何寻找其他六块镰刀碎片的方法。这些信息实在太多太强大了，让林恩的大脑一阵刺痛，差点晕厥过去。\n\n但他咬牙坚持着，将这些知识全部铭记于心。这不仅仅是因为这些知识对他很重要，更是因为这是死神意志对他的考验。如果他无法承受这些信息的冲击，那么他就不配成为死神意志的传承者。\n\n信息传输不知持续了多久，仿佛是一个世纪，又仿佛是一瞬间。当一切结束时，林恩发现自己已经泪流满面。那是身体和精神达到极限时的本能反应，但他的嘴角却挂着笑容。\n\n因为他成功了。他通过了死神意志的考验，成为了新一代的死神传承者。\n\n林恩长出一口气，发现自己的血脉等级竟然突破了——从四级进阶到了五级！不仅如此，他还掌握了许多强大的亡灵魔法，包括召唤骷髅战士、操控死亡之力、甚至与亡灵沟通的能力。\n\n“吾之传承者，”死神意志的声音越来越微弱，仿佛风中残烛，随时都会熄灭，“吾之意志即将消散。记住，汝之道路充满荆棘，但只要心中有光，便永远不会被黑暗吞噬……”\n\n声音渐渐消失，雕像的眼睛也重新变得暗淡无光。石室中的幽蓝色火焰开始减弱，仿佛随时都会熄灭。那股压在众人心头的无形力量也随之消失。\n\n“林恩！”泰勒等人的呼唤从身后传来，他们终于突破了无形的屏障，冲到了林恩身边。刚才那段时间对他们来说同样漫长——他们能看到林恩僵立在雕像前，身上散发着诡异的黑光，却无法靠近一步。\n\n“我没事。”林恩转过身来，脸上带着复杂的表情——有震惊、有迷茫，但更多的是坚定。他能感觉到，自己的命运已经发生了翻天覆地的变化。\n\n“刚才那是……”黛西担忧地看着林恩。\n\n“那是死神乌里尔的残存意志。”林恩简短地解释道，“他告诉我，我是他选中的传承者。”\n\n“传承者？！”戈克惊呼，“你是说……你要成为新的死神？”\n\n“还不完全是。”林恩举起左手的戒指，“他说死亡镰刀一共有七块碎片，我需要找到其他六块，才能真正继承死神之位。”\n\n“其他六块……”泰勒皱起眉头，“那岂不是说，咱们还得满世界去找这些碎片？”\n\n“没错。”林恩点点头，眼中闪过一丝精光，“但至少现在，我知道了寻找它们的方法。”\n\n他感受着体内澎湃的力量——血脉等级突破到五级，体内多出了许多关于死亡魔法的知识，还有那枚存放着镰刀碎片的戒指。这一切，都在告诉他同一个事实：\n\n属于他的道路，才刚刚开始。\n\n“我们先离开这里。”林恩最后看了一眼那尊死神雕像，转身向外走去，“路上我再详细告诉你们。”\n\n石室的大门在身后缓缓关闭。走出遗迹的那一刻，林恩回头望去，仿佛还能看到那尊手持镰刀的凋像，静静地矗立在黑暗深处，等待着下一个有缘人的到来。\n\n死神传承，已经与他融为一体。\n\n而他的旅程，才刚刚开始。\n\n---\n\n然而就在这时，林恩手中的戒指突然传来一阵异样的波动。那种感觉就像是有什么东西在呼唤他，又像是某种封印被打破了。他停下脚步，闭上眼睛仔细感应。\n\n"林恩，怎么了？"泰勒注意到他的异常。\n\n"死神雕像……"林恩睁开眼，眼中闪过一丝惊讶，"它似乎还有别的秘密。刚才接受传承时，我隐约感觉到雕像内部还藏着什么东西。"\n\n"还有秘密？"戈克眼睛一亮，"那咱们还等啥？快回去看看！"\n\n"刚才那个房间太邪门了。"黛西担忧地道，"要不我们先回银火城，多带些人手再来？"\n\n"来不及了。"林恩摇摇头，他能感觉到戒指的震颤越来越强烈，"那种感觉……就像是有什么东西即将破壳而出。如果我们现在离开，可能就永远错过它了。"\n\n话音刚落，戒指突然爆发出一阵黑光，在虚空中形成了一幅地图。那是遗迹的内部结构图，其中一个位置正散发着妖异的红光。\n\n"那是……死神雕像的位置！"林恩顿时明白了，"雕像体内藏着死亡镰刀的碎片！死神意志刚才只是给了我传承，但碎片被封印在雕像内部。现在传承完成，封印也松动了！"\n\n"走！"林恩当机立断，带着三人重新朝遗迹深处走去。'},{n:48,t:' 第48章：遗迹崩塌',c:'## 雕像破碎\n\n林恩手中的亡灵戒指突然剧烈震颤起来，戒指表面浮现出复杂的黑色纹路，那些纹路如同血管一般脉动，每一次脉动都让林恩感到一阵心悸。\n\n"怎么回事？"泰勒警惕地道。\n\n"碎片……"林恩喃喃自语，目光转向那座已经变得暗淡的死神雕像。他能感觉到，戒指正在呼唤着什么，而雕像内部似乎有什么东西在回应。\n\n"咔嚓--"\n\n一声清脆的碎裂声在寂静的房间内格外刺耳。众人猛地转头看去，只见那座死神雕像的胸口位置突然出现了一道裂纹。那裂纹初时还很细小，但很快就蔓延开来，如同蛛网一般遍布整个雕像。\n\n"这……这是怎么回事？"戈克咽了口唾沫。\n\n"快退！"林恩大喊一声，拉着黛西向后跃去。泰勒和戈克也反应极快，紧随其后。\n\n"轰--"\n\n一声巨响，整个雕像彻底炸裂。无数碎石四散飞溅，烟尘弥漫，遮蔽了视线。林恩第一时间运转暗影之力，在身前形成一道黑色的能量护盾，挡下了飞射而来的碎石。\n\n待烟尘散去，露出真容的瞬间，林恩感觉自己呼吸都停滞了。\n\n出现在他眼前的，是一把镰刀。\n\n一把通体由不知名金属打造的巨大镰刀。\n\n镰刀的刀刃呈现出深邃的黑色，那黑色仿佛能够吞噬光线，仅仅只是看上一眼，就让人感觉灵魂都要被吸进去。刀刃长度超过两米，弯曲的弧度完美得如同数学公式计算出的几何图形，锋利的刀锋上流转着幽幽的寒芒。\n\n但这都不是最惊人的。\n\n最惊人的是，这把镰刀是破碎的。\n\n刀刃从中间位置断裂，只剩下一半的长度，但即便如此，仅仅是这半截刀刃，就足以让林恩感受到其中蕴含的恐怖力量。\n\n"死亡镰刀……"\n\n林恩不受控制地喃喃出声，这个名字像是被刻进他的灵魂深处，自然而然地浮现。\n\n半截镰刀静静地悬浮在半空，断裂处流转着幽暗的光芒。那光芒不断闪烁，仿佛在呼吸，又像是在等待。\n\n不等林恩反应，半截镰刀突然爆发出璀璨的黑光，整个房间都被这股光芒笼罩。那光芒不带任何温度，却让林恩感觉遍体生寒--不是身体的寒冷，而是灵魂的战栗。\n\n## 碎片融合\n\n紧接着，一个苍老而威严的声音在他脑海中响起。\n\n那声音与之前的死神意志有几分相似，但更加尖锐、更加冰冷。\n\n"吾之信徒乌尔里克·暗影的遗产……终于等到了继承者。"\n\n黑光收敛，汇聚成一个模糊的人影。\n\n那是一个身披黑袍的老者，面容苍老到看不出年龄，仿佛从恒古时代存活至今。他的身体是由纯粹的黑暗构成的，没有实体，却散发着比任何存在都要恐怖的气息。\n\n死神残魂。\n\n林恩的心脏猛地一紧。这正是之前引导他进入遗迹的那位存在--乌尔里克·暗影，古代亡灵法师，乌里尔信徒。\n\n"看来，你的成长超出了吾的预期。"乌尔里克·暗影的目光落在林恩身上，带着审视的意味。\n\n"前辈……"林恩恭敬地低下头。\n\n"免礼吧。"乌尔里克·暗影抬起手，虚空中一股无形的力量将林恩托起。他看着林恩，眼神中带着一丝满意："你已经通过了吾设置的考验，有资格继承吾的遗产。"\n\n乌尔里克·暗影的目光转向那半截悬浮的镰刀，眼神变得深邃起来："这是死亡镰刀的第一块碎片，也是七块中最核心的一部分--它蕴含着死亡镰刀的本源之力。"\n\n话音落下，半截镰刀突然化作一道黑光，直射林恩手中的戒指。\n\n"轰--"\n\n一声轰鸣在林恩脑海中炸响。他感觉自己的灵魂仿佛被撕裂成无数碎片，又在瞬间重组。那个过程痛苦到极点，但林恩硬是咬牙坚持，没有哼出一声。\n\n黑光将林恩整个人包裹，形成了一个巨大的黑色蚕茧。\n\n外界的时间仿佛静止了。林恩自己也不知道过了多久--可能是一瞬，也可能是一年。当他再次恢复意识的时候，发现自己依然站在房间内，但整个人的气质已经发生了翻天覆地的变化。\n\n他的眼睛变得更加深邃，瞳孔中仿佛有星光点点。那不是普通的光芒，而是死亡与灵魂的深邃。\n\n手中的亡灵戒指已经变了一副模样。\n\n原本古朴的戒指表面，多出了一道镰刀的印记。那印记与之前的死神雕像有七八分相似，但更加精致、更加真实。戒指的材质也发生了改变，从原本的普通金属变成了流转着幽暗光泽的不知名金属。\n\n"这种感觉……"\n\n林恩抬起手，心念一动。\n\n一个直径半米的黑色漩涡在他掌心凭空出现。那漩涡不断旋转，散发着惊人的吸力，仿佛能够吞噬世间万物。\n\n"空间与死亡的结合……"乌尔里克·暗影的声音响起，带着惊叹，"亡灵戒指的储物空间彻底觉醒，现在它不仅能够储存物品，更能够储存……灵魂！"\n\n"你可以将击杀的敌人灵魂直接吸入戒指中，转化为亡灵之力。这些灵魂可以用来强化你召唤的骷髅，也可以用来施展灵魂系法术，甚至可以用于修复死亡镰刀的其他碎片。"\n\n林恩深吸一口气，压下心中的激动。\n\n"先别想那么远。"乌尔里克·暗影淡淡地道，"吾现在要看看，融合了第一块碎片后，你的召唤能力发生了什么变化。"\n\n林恩点头，心念一动。\n\n"咔嚓--"\n\n一只白骨手臂突然从虚空中探出，扒住了空间的边缘。紧接着，一个巨大的骷髅生物从召唤阵中缓缓升起。\n\n这只骷髅与林恩之前召唤的骷髅仆从完全不同。\n\n它的身高超过三米，骨骼呈现出深邃的灰黑色，表面流转着淡淡的金属光泽。每一根骨骼都粗壮无比，充满了力量感。最恐怖的是，它的眼眶中燃烧着两团幽蓝色的火焰，那火焰比起之前的骷髅仆从大了整整一圈。\n\n"骨王……"\n\n林恩喃喃自语，这个名字自然而然地浮现。这只骷髅，是他召唤的骷髅仆从的进阶形态--骷髅王。\n\n"不错。"乌尔里克·暗影的声音带着满意，"融合了死亡镰刀碎片后，你召唤的骷髅不再只是普通的骷髅仆从，而是拥有进阶形态的亡灵生物。这只骷髅王，拥有相当于4级暗影血脉的实力，而且……它可以不断成长！"\n\n"四级！"\n\n林恩心中震动。之前他召唤的骷髅仆从，最多只有一级左右的实力，只能用来打下手。而这只骷髅王，直接跳到了四级！\n\n"这还不是全部。"乌尔里克·暗影继续道，"你戒指中现在存储了足够的死亡之力，足以支撑你召唤……一支骷髅军队！"\n\n"一支军队？"\n\n林恩呼吸变得急促起来。\n\n"不错。"乌尔里克·暗影道，"你可以同时召唤最多一百只普通骷髅，或者十只骷髅战士，或者……一只骷髅王。以你现在的实力，召唤一支骷髅军队绰绰有余。"\n\n一百只骷髅！\n\n林恩感觉自己的血液都在沸腾。\n\n这是什么概念？如果他真的能召唤出一百只骷髅，那就是一股足以覆灭一个小镇的恐怖力量。而且这些骷髅不知疲倦、不惧死亡，只会执行主人的命令。\n\n这，就是死神传承的恐怖之处！\n\n"除此之外，"乌尔里克·暗影又补充道，"你戒指中的储物空间也发生了蜕变。原本只有三尺见方的储物空间，现在已经扩大到了一座城堡的大小。你可以储存更多的物资，也可以储存……活物。"\n\n"活物？"林恩一怔。\n\n"字面意思。"乌尔里克·暗影道，"你现在可以将活人收入储物空间中。当然，对方会陷入沉睡，除非你主动唤醒。这在战斗中意味着什么……你应该明白。"\n\n林恩当然明白。\n\n这意味着，他可以在战斗中直接将敌人同伴收入储物空间，让对方失去战斗力。这意味着，他可以在危险时刻将盟友收入储物空间保护起来。这意味着……他的生存能力有了质的飞跃。\n\n"先别高兴得太早。"乌尔里克·暗影的身影开始变淡，"大陆上很快就会发生剧变，死神传承的消息不可能永远隐瞒下去。黄昏教团……已经注意到了你的存在。"\n\n"黄昏教团？"\n\n林恩心中一紧。那可是整个大陆最恐怖的组织之一。\n\n"没错。"乌尔里克·暗影的声音变得严肃，"黄昏教团的最终目标，就是彻底消灭死神传承。他们认为，暗影血脉是诸神黄昏的根源，是需要被清除的灾难。你……是他们的眼中钉。"\n\n林恩沉默片刻，缓缓开口："我与他们，早晚会有一战。"\n\n"很好。"乌尔里克·暗影的声音带着一丝赞许，"记住，死神的传承不是让你成为一个杀戮机器，而是让你成为死亡的代言人。死亡不是终结，而是另一种开始。掌控死亡，而不是被死亡掌控。"\n\n"掌控死亡……"\n\n林恩喃喃重复这句话，眼神变得深邃。\n\n"最后，"乌尔里克·暗影的身影已经几乎透明，"我会陷入沉睡，直到你获得下一块镰刀碎片。在此之前，你只能依靠自己。记住，戒指中的灵魂之力会随着时间流逝而消散，如果你想要保存它们用于修复碎片，就要不断收集新的灵魂。"\n\n"我明白了。"林恩点头。\n\n乌尔里克·暗影的最后一丝身影开始消散。在完全消失之前，他留下了最后一句话：\n\n"林恩·夜语，期待你成长到与我真正相见的那一天。记住……死神传承选中你，不是因为你的天赋，而是因为你的心。保持本心，方能驾驭死亡。"\n\n声音消散，乌尔里克·暗影彻底消失。\n\n房间内，只剩下林恩和他新召唤的骷髅王。\n\n林恩站在原地，久久不语。他在消化刚才获得的所有信息，也在适应体内涌动的全新力量。\n\n不知过了多久，他深吸一口气，转头看向遗迹的入口方向。\n\n泰勒和戈克还在外面等待。他们刚才为了殿后，陷入了与骷髅守卫的苦战。虽然两人实力不弱，但遗迹中的骷髅守卫数量太多，不知道他们现在情况如何。\n\n"该出去了。"\n\n林恩心念一动，身后的骷髅王化作一道黑光，融入了他的戒指中。紧接着，他迈开脚步，大步朝遗迹出口走去。\n\n现在的他，已经迫不及待想要测试一下新获得的力量了。\n\n## 遗迹崩塌\n\n然而就在这时，大地突然开始震颤。\n\n"轰--"\n\n一声闷雷般的轰鸣从地底深处传来，整个遗迹都随之摇晃。墙壁上开始出现细密的裂纹，石室穹顶的碎石簌簌落下。\n\n"不好！"\n\n林恩脸色大变。他能感觉到，这座遗迹的魔法阵正在失效--或者更准确地说，正在崩溃。\n\n死神遗产的力量太过强大，即使只是第一块碎片，也不是这个遗迹的魔法阵能够镇压的。当碎片与亡灵戒指融合的瞬间，释放出的力量就已经超出了遗迹的承受极限。\n\n"必须马上离开！"\n\n林恩毫不犹豫，转身朝来时的通道冲去。身后的石室已经开始崩塌，巨石不断从穹顶落下，将退路一点点堵死。\n\n奔跑中，林恩能感觉到地面在震动，墙壁在龟裂，整个遗迹都在哀鸣。那种感觉就像是一个沉睡多年的巨兽正在苏醒，正在摧毁它体内的一切。\n\n"泰勒！戈克！"\n\n林恩大声呼喊着伙伴的名字，脚下不敢有丝毫停歇。通道中的魔法灯一盏接一盏地熄灭，显然支撑整个遗迹的魔法阵正在彻底失效。\n\n前方的黑暗中，隐约传来泰勒的回应：\n\n"林恩！这到底是怎么回事？！"\n\n"我稍后解释！现在先跑！"\n\n林恩冲上前去，与泰勒、戈克和黛西会合。四人对视一眼，都从对方眼中看到了恐惧--他们能感觉到，这个遗迹真的要塌了。\n\n"快走！"\n\n林恩一马当先，冲在前面。他的暗影血脉在体内奔涌，在身前形成一道淡淡的黑色护盾，挡开不时落下的碎石。\n\n四人在摇晃的通道中全力奔跑，脚步声在空旷的遗迹中回响。头顶的裂缝越来越多，越来越大，有的地方已经可以看到外面的天空。\n\n"这破地方怎么说塌就塌！"戈克一边跑一边骂，"老子还没活够呢！"\n\n"少废话！快跑！"泰勒怒吼道。\n\n然而刚跑了没几步，身后传来一声巨响，整个通道都震动了一下。林恩回头一看，只见他们刚才所在的位置已经完全塌陷，形成了一个巨大的深坑。\n\n"这边！"林恩指向左边的另一条通道。那是他们之前探索时发现的另一条出路。\n\n四人改变方向，奔向左侧的通道。然而刚跑了没几步，前方的通道突然崩塌，一大堆碎石从天而降，将前路完全堵死。\n\n"该死！"泰勒紧急刹车，差点撞上落下的石块。\n\n"我们被困住了！"戈克惊呼。\n\n"不，还有办法！"林恩眯起眼睛，迅速观察四周。他能感觉到，这条通道虽然也在崩塌，但支撑结构相对完整，如果能够冲过去……\n\n"跟我来！"\n\n林恩大喊一声，体内暗影血脉全力运转。他的身体被黑色包裹，整个人仿佛与周围的阴影融为一体。这是血脉之力运转到极致的表现。\n\n他要在崩塌的通道中杀出一条血路！\n\n林恩的速度提到了极致，身后的三人紧紧跟随。头顶的巨石不断落下，有几次甚至擦着他们的身体掠过。但林恩凭借着对暗影之力的精准操控，总能在千钧一发之际避开危险。\n\n快了，就快到了！\n\n前方已经可以看到出口的光亮。\n\n然而就在这时，整座遗迹剧烈震动了一下。一道巨大的裂缝从地面升起，蜿蜒着朝四人追来。裂缝中散发着惊人的吸力，仿佛要将一切都吞噬进去。\n\n"跳！"\n\n林恩大喊一声，纵身跃起。泰勒反应极快，一把抓住黛西和戈克，紧随其后。四人险之又险地跃过裂缝，继续向前冲去。\n\n出口就在眼前！\n\n林恩咬紧牙关，体内残余的暗影之力全部爆发。他的速度再次提升，如同离弦之箭一般射向出口。\n\n"轰--"\n\n就在他冲出来的瞬间，身后的遗迹入口彻底崩塌，激起漫天的烟尘。\n\n林恩一个踉跄，险些跪倒在地。他的魔力几乎耗尽，身体各处都在疼痛。但他还是强行稳住身形，回头看向崩塌的遗迹。\n\n烟尘渐渐散去，原本的遗迹入口已经消失不见，取而代之的是一座小山般的碎石堆。\n\n"咳……咳……"戈克被烟尘呛得咳嗽起来，但脸上却露出了劫后余生的笑容，"他奶奶的……老子还活着！"\n\n四人瘫坐在地上，大口大口地喘着粗气。每个人的脸上都带着劫后余生的庆幸，也有着对彼此的感激。\n\n"你个混蛋！"泰勒一把拽住林恩的衣领，"刚才差点吓死老子！你要是敢死在外面，老子饶不了你！"\n\n"放心，我命硬。"林恩笑了笑，随即脸色一白，哇地吐出一口鲜血。\n\n"林恩！"戈克和黛西同时变色。\n\n"没事……"林恩摆摆手，"魔力消耗过度，休息一下就好了。"\n\n黛西赶紧从储物袋中掏出一瓶恢复药剂，递给林恩。林恩也不推辞，仰头灌了下去。药剂入喉，一股暖流开始在体内流转，缓解着疲惫的身体。\n\n"先别管这些了。"泰勒站起身，"此地不宜久留，我们赶紧离开这里。那些塌方的声音可能会吸引附近的魔兽。"\n\n四人互相扶持着站起身来，向着银火城的方向走去。虽然都不同程度地负伤，但好在没有生命危险。\n\n林恩最后回头看了一眼已经完全被碎石掩埋的遗迹入口，眼中闪过一道精光。\n\n死神传承的第一块碎片，已经与他融为一体。还有六块，散落在大陆各地，等待着他去寻找。\n\n这一次的遗迹之行，虽然经历了生死危机，但也让他获得了巨大的收获。\n\n他是真正的死神传承者了。\n\n"走吧。"林恩深吸一口气，"回银火城。"\n\n四人并肩而行，沿着大道朝银火城的方向走去。\n\n阳光洒在他们身上，拉出长长的影子。\n\n---\n\n【林恩·夜语 属性面板】\n等级：4级\n称号：冥影战士\n属性总和：62\n\n力量：10 | 敏捷：15 | 体质：9\n悟性：10 | 感知：18 | 灵魂：10\n\n恭喜突破！第一阶段结束，林恩正式迈入4级门槛！\n\n---\n\n（本章完）'},{n:49,t:' 第49章：遗迹崩塌',c:'## 震动\n\n遗迹的崩塌虽然暂时停歇，但林恩心中的不安却愈发强烈。他能感觉到，地面仍在轻微震颤，仿佛在预示着更勐烈的风暴即将到来。\n\n“我们必须尽快离开这里。”林恩强撑着站起身，警惕地环顾四周。\n\n“刚才到底是怎么回事？”泰勒皱眉问道，“好端端的遗迹怎么说塌就塌？”\n\n林恩犹豫了一下，最终决定隐瞒死神传承的大部分细节：“我想……可能是遗迹中的魔法阵已经达到了极限。之前我们触发了太多禁制，魔法阵的能源正在迅速枯竭。”\n\n这个解释并不能完全说服泰勒，但他也没有继续追问。一行人收拾了一下行装，准备离开这片是非之地。\n\n然而就在这时，大地突然剧烈震颤起来。\n\n“轰——”\n\n一声闷雷般的轰鸣从地底深处传来，整个幽影森林都为之一震。树木摇晃，鸟儿惊飞，四周的空气仿佛凝固了一般。\n\n“不好！”林恩变色道，“遗迹的魔法阵彻底崩溃了！”\n\n话音刚落，更加勐烈的震动传来。这一次不再是闷响，而是清晰的断裂声——嘎嘣、嘎嘣，仿佛整座山脉的骨骼正在碎裂。\n\n“快跑！”\n\n林恩大喊一声，率先向外冲去。泰勒反应极快，一把拉起还在发愣的戈克，紧随其后。黛西虽然体力不支，但也咬牙跟在后面。\n\n四人在茂密的森林中全力奔跑，身后不断传来树木倒塌的声音。回头望去，只见遗迹所在的位置已经升起漫天的烟尘，将整片天空都染成了灰白色。\n\n“这到底是怎么回事？！”戈克一边跑一边回头张望，脸上满是惊恐，“那个遗迹……它在塌陷！”\n\n“闭嘴！专心跑！”泰勒怒吼道。\n\n然而刚跑了没几步，身后传来一声巨响，整个通道都震动了一下。林恩回头一看，只见他们刚才所在的位置已经完全塌陷，形成了一个巨大的深坑。\n\n“这边！”林恩指向左边的另一条通道。那是他们之前探索时发现的另一条出路。\n\n四人改变方向，奔向左侧的通道。然而刚跑了没几步，前方的通道突然崩塌，一大堆碎石从天而降，将前路完全堵死。\n\n“该死！”泰勒紧急刹车，差点撞上落下的石块。\n\n“我们被困住了！”戈克惊呼。\n\n“不，还有办法！”林恩眯起眼睛，迅速观察四周。他能感觉到，这条通道虽然也在崩塌，但支撑结构相对完整，如果能够冲过去……\n\n“跟我来！”\n\n林恩大喊一声，体内暗影血脉全力运转。他的身体被黑色包裹，整个人仿佛与周围的阴影融为一体。这是血脉之力运转到极致的表现。\n\n他要在崩塌的通道中杀出一条血路！\n\n林恩的速度提到了极致，身后的三人紧紧跟随。头顶的巨石不断落下，有几次甚至擦着他们的身体掠过。但林恩凭借着对暗影之力的精准操控，总能在千钧一发之际避开危险。\n\n快了，就快到了！\n\n前方已经可以看到出口的光亮。\n\n然而就在这时，整座遗迹剧烈震动了一下。一道巨大的裂缝从地面升起，蜿蜒着朝四人追来。裂缝中散发着惊人的吸力，仿佛要将一切都吞噬进去。\n\n“跳！”\n\n林恩大喊一声，纵身跃起。泰勒反应极快，一手抓住黛西，一手拉着戈克，紧随其后。四人险之又险地跃过裂缝，继续向前冲去。\n\n但危机还没有结束。\n\n更多的裂缝开始出现，从遗迹中心向四周蔓延。这些裂缝如同贪婪的巨兽，不断吞噬着周围的一切。树木、岩石、甚至整块地面，都被吸入裂缝之中，消失得无影无踪。\n\n“我们会被吞掉的！”戈克惊恐地道。\n\n“不会的！”林恩坚定地道，“我绝不会让那种事情发生！”\n\n他深吸一口气，体内残余的暗影之力全部爆发。黑色的气息从他体内涌出，在他身后形成一对若有若无的黑色羽翼。\n\n这是暗影血脉进阶到五级后获得的新能力——暗影之翼。虽然只能维持短短数秒，但这已经足够了。\n\n“走！”\n\n林恩一把抓住泰勒和戈克，背后的暗影之翼勐然展开。三人的身体腾空而起，从裂缝上方飞跃而过。黛西也被泰勒紧紧拉着，四人一起冲过了最危险的地段。\n\n前方的地面终于变得稳定起来。裂缝不再出现，烟尘也渐渐散去。四人落在地上，都是气喘吁吁，脸上露出了劫后余生的庆幸。\n\n“我们……我们出来了！”戈克一屁股坐在地上，“他奶奶的……终于出来了……老子差点就交代在里面了！”\n\n泰勒虽然没有像戈克那样瘫倒，但脸上也露出了心有余悸的表情。刚才的逃亡让他消耗了大量的体力，现在只想找一个地方好好休息一下。\n\n黛西的情况最糟糕，她的魔力在刚才的逃亡中几乎耗尽，此刻正靠在林恩身上才能站稳。作为一个主修治愈魔法的法师，她的体力本来就不好，刚才又消耗了大量魔力来保护自己，现在已经是强弩之末。\n\n“我们先离开这里。”林恩强撑着站起身，环顾四周道，“遗迹的崩塌可能会吸引附近的魔兽。”\n\n“对，对！”戈克跳起来，“万一有魔兽闻到我们的气味追上来就完了！”\n\n四人互相扶持着站起身来，继续向银火城的方向走去。虽然都不同程度地负伤，但好在没有生命危险。\n\n夕阳西下，四人的背影在余晖中拉长。这一次的遗迹之行，虽然经历了生死危机，但也让他们获得了巨大的收获。\n\n林恩获得了死神传承的关键信息——死亡镰刀碎片的下落。而泰勒和戈克也各自获得了一些宝物和经验。\n\n更重要的是，四人的羁绊在这一次的危机中变得更加深厚。\n\n## 逃命\n\n走出幽影森林的范围后，四人并没有立即返回银火城，而是在一片空地上停了下来。\n\n“先休息一下。”林恩道，“大家都累了。”\n\n戈克第一个躺倒在地，仿佛全身的力气都被抽空了一般。泰勒虽然还能站着，但脸色也不太好看。黛西更是不堪，若不是林恩及时扶住她，她就要摔倒了。\n\n这一次遗迹之行，凶险程度远超他们的想象。遗迹崩塌时产生的冲击波，差点将他们全部埋葬。若不是林恩关键时刻爆发出暗影血脉的力量，他们四人可能永远都无法活着离开那里。\n\n“这次真是凶险。”泰勒心有余悸地道，“那遗迹怎么说塌就塌？也太邪门了。”\n\n林恩皱起眉头，沉吟道：“我想……可能是死神遗产的力量。那种力量不是凡物能够承受的，遗迹的魔法阵已经无法镇压，所以才会崩塌。”\n\n“也就是说，那些魔法阵是被死神的力量撑爆的？”泰勒问道。\n\n“应该是。”林恩点点头，“不过这也不完全是坏事。遗迹崩塌，那些宝藏也随之埋葬了，不会落到别人手里。”\n\n“也对。”戈克点点头，随即想起了什么，“对了老林，你刚才召唤的那个骷髅兵是怎么回事？比以前厉害多了！”\n\n林恩举起手中的亡灵戒指，眼中闪过一丝复杂的光芒：“这是死神传承的力量。现在我能召唤更强的亡灵仆从了，不过代价也是巨大的。”\n\n刚才的战斗几乎耗尽了他的魔力，如果不是他及时冲出遗迹，后果不堪设想。\n\n“先别管这些了。”泰勒站起身，“此地不宜久留，我们赶紧离开这里。那些塌方的声音可能会吸引附近的魔兽。”\n\n四人收拾了一下行装，准备继续赶路。然而就在这时，大地突然再次震颤起来。\n\n“怎么回事？！”戈克惊呼。\n\n林恩勐地回头看向遗迹的方向，只见刚刚平静下来的烟尘再次升腾而起，而且比之前更加勐烈。\n\n“不是吧？！”戈克哀嚎道，“还没完没了？！”\n\n“跑！”\n\n林恩大喊一声，四人再次开始了逃亡。\n\n更糟糕的是，地面开始出现不稳的迹象。\n\n“小心！”林恩突然大喊，一把拉住黛西。\n\n就在黛西刚才站立的位置，地面突然塌陷，露出一个深不见底的黑洞。如果不是林恩及时拉住她，她就会掉入其中。\n\n“谢谢……”黛西惊魂未定地道。\n\n“别说话，快跑！”\n\n四人的神经再次紧绷起来。他们能感觉到，脚下的地面随时都可能崩塌，每一步都可能踏入深渊。\n\n林恩在前面开路，暗影之力在他身前形成一道探测网，提前预警可能出现的危险。泰勒背着戈克紧随其后，手中的风雷之力随时准备应对突发状况。\n\n黛西虽然体力不支，但也咬牙坚持着。她知道，现在不是拖累大家的时候。\n\n终于，在太阳即将落山的时候，四人冲出了幽影森林。\n\n“林恩，”泰勒突然开口，“那个死神传承……很危险吗？”\n\n林恩沉默片刻，点了点头：“很危险。死神残魂告诉我，有一群自称\'黄昏教团\'的势力一直在追踪死神传承的下落。他们认为暗影是世界的威胁，誓要将其彻底消灭。”\n\n“黄昏教团？”戈克皱眉道，“没听说过。”\n\n“是大路上最古老的组织之一。”林恩淡淡地道，“他们与死神是宿敌，我继承了死神传承，注定会与他们为敌。”\n\n泰勒和戈克对视一眼，都从对方眼中看到了坚定。\n\n“怕什么。”泰勒哼了一声，“兵来将挡，水来土掩。他们要是敢来，敢来，老子让他们尝尝风暴战锤的厉害！”\n\n“就是！”戈克挥舞着拳头，“俺老戈克别的没有，就是骨头硬！敢动我兄弟，先问问我这两把斧头答不答应！”\n\n林恩看着两个伙伴，心中涌起一股暖流。这就是兄弟，无论面对什么样的危险，都会站在自己身边。\n\n“谢谢。”林恩真诚地道。\n\n“少来这套。”泰勒撇撇嘴，“赶紧回银火城吧。老莫该着急了。”\n\n夕阳下，三道身影渐行渐远。\n\n遗迹的崩塌声渐渐远去，但林恩知道，自己的冒险才刚刚开始。\n\n死神传承、黑暗帝国、黄昏教团……这些都是他未来必须面对的挑战。\n\n但他不会退缩。因为他不是一个人在战斗，他的身边有可以托付生死的伙伴，这就足够了。\n\n夜幕降临，银火城的灯火在远处闪烁。城中的灯火渐次亮起，像是散落在地上的星河，温暖而明亮。\n\n林恩回头看了一眼已经完全被碎石掩埋的遗迹入口，眼中闪过一道精光。那块死神镰刀的碎片虽然被封印在遗迹深处，但地图已经到手，未来的冒险有了明确的方向。\n\n这一次的遗迹之行，虽然经历了生死危机，但也让他们获得了巨大的收获。\n\n林恩是真正的死神传承者了。\n\n“走吧。”林恩深吸一口气，“回银火城。”\n\n四人并肩而行，沿着大道朝银火城的方向走去。\n\n月光洒在他们身上，拉出长长的影子。\n\n\n（本章完）'},{n:4,t:' 第4章：血脉测试提前',c:'清晨，天刚蒙蒙亮，城堡前的广场上就敲响了嘹亮的钟声。\n\n“所有家族子弟立即到广场集合——”\n\n传令兵的声音在领地上空回荡。晨光中，城堡的大门缓缓打开，一队身着银色铠甲的家族护卫列队而出，在广场中央立起了一座高台。\n\n高台的顶端，摆放着一块通体漆黑的晶石——血脉石。\n\n测试？这么突然？！\n\n林恩赶紧放下手中的工作，快步向广场跑去。当他赶到时，广场已经聚集了不少人，都是夜语家族十六岁左右的年轻子弟。\n\n“肃静——”\n\n伴随着一声高喝，管家阿尔杰走上了高台。他今天穿得格外正式，胸前的家族徽章在阳光下闪闪发亮。\n\n“族长大人在此——”\n\n布隆·夜语的身影出现在城堡大门前。他身披墨黑长袍，面容冷峻，目光如炬，缓缓地走过人群，所过之处，众人纷纷低头致敬。\n\n这就是夜语家族的族长，掌控这片领地已有三十年的强者。\n\n布隆在高台前停下脚步，目光在广场上扫过。当他的视线经过林恩所在的位置时，只是略微停顿了一下，然后便移开了。\n\n仿佛在看一个陌生人。\n\n林恩的心沉了下去。虽然早就预料到了这一幕，但真正发生时，心中还是免不了一阵刺痛。\n\n“今日召集族中子弟，是为了宣布一件大事。”阿尔杰管家高声宣布，“根据族长大人的命令，血脉测试将提前进行——就在今日！”\n\n此言一出，广场上顿时炸开了锅。\n\n“今日？这么快？”\n\n“怎么回事？不是说还有三天吗？”\n\n“嘘——小点声，据说是因为银火学派那边有了什么动作……”\n\n各种议论声此起彼伏，林恩却是心中一紧。今日，竟然就是今天！\n\n他还没做好心理准备。\n\n“安静！”阿尔杰提高了音量，“血脉测试是家族的头等大事，不得有误。所有符合条件的子弟，必须在今日准时参加。若有缺席者，按族规严惩！”\n\n广场上的议论声渐渐平息，众人都在消化着这个突如其来的消息。\n\n“原来是这样……”林恩喃喃自语。\n\n原本按照惯例，血脉测试应该是在两天后举行。但不知道什么原因，族长突然下令提前，而且是提前了整整三天！这个决定打了所有人一个措手不及。\n\n但对于林恩来说，这反而让他松了一口气。\n\n与其提心吊胆地等待，不如早点面对。\n\n※\n\n宣布完测试的时间，阿尔杰管家又交代了一些其他的事项。但林恩已经无心去听了。\n\n测试的内容其实很简单——将手掌贴在血脉石上，注入一丝魔力，血脉石就会根据血脉的浓度显示出相应的颜色。\n\n十六条来，他尝试了无数次，但体内始终没有任何力量波动的迹象。这意味着，他大概率连最下品的血脉都达不到。\n\n“嘿，废物。”\n\n一个阴阳怪气的声音在身后响起。林恩转过身，看到罗恩·夜语正带着几个跟班向这边走来。\n\n周围的子弟们识趣地让开了一条路。\n\n“两天后……哦不，今天就要测试了，”罗恩走到林恩面前停下，脸上带着讥讽的笑意，“怎么样，准备好了吗？”\n\n林恩没有说话，只是平静地看着他。\n\n“我在问你话呢，哑巴了？”罗恩的声音冷了下来。\n\n“准备好了。”林恩淡淡地回答道。\n\n“呵……”罗恩冷笑一声，“希望如此吧。否则的话，你可是会给我们夜语家族丢脸的。”\n\n丢脸。\n\n又是这个词。\n\n林恩看着罗恩的眼睛，突然笑了：“罗恩少爷放心，我会尽全力的。”\n\n他的语气很平静，但不知为何，罗恩总觉得那笑容里带着一丝说不清道不明的意味。\n\n“希望你说的是真的。”罗恩深深地看了林恩一眼，然后带着跟班们转身离开。\n\n看着罗恩远去的背影，林恩握紧了拳头。\n\n※\n\n傍晚时分，领地里已经贴满了公告——血脉测试将在今日举行，所有符合条件的家族子弟必须准时参加。\n\n整个夜语领地都笼罩在一种紧张而兴奋的气氛中。\n\n林恩没有去帮忙，他独自一人来到领地外的小山坡上，俯瞰着整个领地。\n\n夕阳西下，将天空染成了橘红色。远处的山脉蜿蜒起伏，像是一条沉睡的巨龙。夜语城堡矗立在山坡上，青黑色的石墙在夕阳下泛着金属般的光泽。\n\n这就是他生活了十六年的地方。\n\n“也许，这就是改变命运的机会吧……”\n\n虽然他对测试的结果并不抱希望，但内心深处，总还是存着一丝微弱的期待。\n\n也许会有奇迹呢？\n\n毕竟，他能够看到那些别人看不到的阴影中的虚影。\n\n也许，那也是一种力量也说不定。\n\n林恩自嘲地笑了笑，起身向山下走去。\n\n不管怎样，今日自见分晓。\n\n※\n\n夜幕降临，繁星点点。\n\n林恩躺在木板床上，睁着眼睛看着天花板，思绪如潮水般涌来，根本无法入睡。\n\n今日。\n\n只有今日了。\n\n这个消息像是一块巨石，重重地砸在他的心上，让他感到一阵阵窒息。\n\n按照原来的计划，测试应该在两天后举行。这意味着他还有三天的时间来做准备。但现在，一切都乱了。\n\n一天的准备时间，对于一个连血脉都无法觉醒的人来说，能做什么？\n\n林恩苦涩地笑了笑，翻了个身，面向墙壁。\n\n脑海中不受控制地浮现出各种画面——测试广场上血脉石散发出的光芒，族人们或轻蔑或同情或幸灾乐祸的眼神，父亲布隆那张永远冷漠的脸，还有罗恩那张充满讥讽的笑脸……\n\n每一个画面，都像是锋利的刀刃，切割着他的心。\n\n“废物。”\n\n这个词，再一次在他脑海中响起。\n\n十六条来，这个词就像是他的影子一样，无论他走到哪里，都挥之不去。\n\n一个连血脉都无法觉醒的废物。\n\n一个连自己的命运都无法掌握的废物……\n\n想到母亲，林恩的心脏猛地抽搐了一下。\n\n伊莲娜·风语，那个温柔而坚强的女人，这些年来为了他，受了多少委屈，吃了多少苦，他都看在眼里，记在心里。\n\n作为一个被家族遗弃的精灵混血，她本应该拥有更好的生活。但她从来没有抱怨过。\n\n每一次，当林恩沮丧而归，告诉她自己又失败的时候，她总是会露出温柔的笑容，轻轻抚摸着他的头发，告诉他说：“没关系，慢慢来，总会有办法的。”\n\n可是，真的会有办法吗？\n\n林恩不知道。\n\n※\n\n窗外传来更夫打更的声音，已经是三更天了。\n\n林恩翻来覆去，依然无法入睡。\n\n如果……假设……万一……\n\n一个个假设在他脑海中浮现，又被他一一否定。\n\n他真的能觉醒血脉吗？\n\n不可能吧。\n\n※\n\n就在林恩胡思乱想的时候，窗外突然传来一阵轻微的响动。\n\n他竖起耳朵，仔细倾听。\n\n声音是从屋后传来的，很轻，像是有人在黑暗中走动。\n\n“谁？”\n\n林恩压低声音问道。\n\n没有人回答。\n\n他等了一会儿，确认没有其他声音后，这才重新躺回床上。\n\n应该是野猫吧。\n\n领地里有不少野猫，经常在夜里出来觅食。\n\n林恩这样想着，心跳却不受控制地加速了。\n\n不知道为什么，他突然想起了去年在马厩里看到的那团黑雾，想起了树林里将他包裹的那些阴影，想起了那些在黑暗中注视着他的无数双眼睛。\n\n还有，那个苍老的声音。\n\n“我们……很快就会见面了……”\n\n这句话突然在他脑海中响起，吓了他一跳。\n\n那是谁？\n\n那个声音是谁？\n\n难道……\n\n一个大胆的念头突然冒了出来——\n\n难道那个声音，和他无法觉醒的血脉有关？\n\n林恩的心脏猛地跳动了一下。\n\n如果真是这样，那是不是意味着……\n\n也许……也许今日的测试，真的会发生什么也说不定？\n\n这个念头像是黑暗中的一缕光，瞬间照亮了他的心。\n\n对啊！\n\n他为什么从来没有往这个方向想过？\n\n那些虚影，那个声音，还有他体内那股说不清道不明的力量……也许，它们都在等待着一个契机？\n\n而今日的血脉测试，会不会就是这个契机？\n\n林恩越想越激动，心脏跳得越来越快。\n\n※\n\n窗外传来鸡鸣声，天边已经泛起了鱼肚白。\n\n林恩就这样睁着眼睛，迎接了新的一天。\n\n但他并不觉得疲惫。\n\n相反，他感到一股前所未有的力量在体内涌动——那是希望的力量。\n\n只有今日了。\n\n在这最后的时间里，他需要做好充分的准备。不为别的，只为那微弱的希望之火，只为那可能改变命运的机会。\n\n林恩深吸一口气，翻身从床上坐起来。\n\n窗外，朝阳初升，金色的阳光洒满大地。\n\n新的一天，已经到来。\n\n而他，已经做好了准备。'},{n:50,t:' 第50章：逃出生天',c:'## 出口\n\n月光如水，洒在银火城的城墙上。\n\n林恩四人沿着大道向城门走去，每个人的脸上都带着劫后余生的疲惫。城门处的守卫看到他们狼狈的样子，都是一脸惊讶。不过当他们认出林恩是莫雷大师的弟子后，态度立刻变得恭敬起来。\n\n“林恩先生，你们这是……”守卫首领犹豫着问道。\n\n“出了一点意外。”林恩简单地回答，“遗迹那边出了点状况，不过已经解决了。”\n\n遗迹的事情涉及太多秘密，能少一个人知道就少一个人知道。守卫们虽然好奇，但也没有多问。\n\n进入城中，林恩直接向银火学派的方向走去。泰勒和戈克识趣地没有跟上去——他们知道林恩要向导师汇报这次探险的成果。\n\n“那我们先回去了。”泰勒说道，“明天见！”\n\n“明天见！”林恩点头。\n\n看着两人的身影消失在街道尽头，林恩深吸一口气，迈步走进了银火学派的大门。\n\n然而就在这时，身后突然传来一阵剧烈的震动。\n\n“轰——”\n\n一声闷雷般的轰鸣从远处传来，整个银火城都为之震动。林恩勐地回头，看向幽影森林的方向。\n\n只见远处的天空中升起漫天的烟尘，将月光都遮蔽了大半。那景象就像是一场巨大的沙尘暴，正在朝银火城的方向逼近。\n\n“不好！”林恩变色道。\n\n“怎么了？”守卫们也被这动静惊动了，纷纷看向远处。\n\n“那边……发生了什么？”一个守卫喃喃道。\n\n林恩没有回答，他的脸色变得极为难看。那震动是从遗迹的方向传来的——遗迹的崩塌比他想象的还要勐烈，已经开始影响到银火城这边了。\n\n“快关闭城门！”林恩大喊道，“所有人做好防护准备！”\n\n守卫们虽然不知道发生了什么，但看到林恩严肃的表情，也不敢怠慢。城门缓缓关闭，整个城市进入警戒状态。\n\n然而，预想中的冲击并没有到来。\n\n震动持续了约莫一刻钟后，终于渐渐平息。当烟尘散去众人惊讶地发现，幽影森林的方向已经彻底改变了模样。\n\n原本郁郁葱葱的森林消失了大半，取而代之的是一片荒芜的废墟。遗迹所在的位置变成了一个巨大的深坑，在月光下显得格外阴森。\n\n“那里……到底发生了什么？”一个守卫喃喃道。\n\n没有人能回答这个问题。\n\n林恩站在城墙边，默默地看着那片废墟。他能感觉到，遗迹的彻底崩塌意味着什么——死神遗产的力量已经完全释放，那片区域已经变成了一片死地。\n\n这就是死神的力量吗？\n\n林恩不禁有些后怕。如果不是他及时离开，现在被埋在废墟下面的就是他们四个了。\n\n“林恩先生，”守卫首领走了过来，恭敬地道，“您没事吧？”\n\n“没事。”林恩收回目光，淡淡地道，“这里已经安全了。大家都散了吧。”\n\n守卫们虽然好奇，但也没有多问，纷纷回到自己的岗位。林恩最后看了一眼远处的废墟，转身朝学派内部走去。\n\n这一次的遗迹之行，彻底结束了。\n\n## 回头看\n\n第二天清晨，阳光透过窗户洒进宿舍。\n\n林恩从沉睡中醒来，感觉全身都像是要散架一般。昨夜的逃亡耗尽了他的体力和魔力，虽然经过一夜的休息，但身体仍然酸痛不已。\n\n“醒了？”\n\n一个熟悉的声音从旁边传来。林恩转头看去，只见泰勒和戈克正坐在宿舍的椅子上，脸上带着戏谑的笑容。\n\n“你们怎么在这里？”林恩坐起身，揉了揉眼睛。\n\n“当然是来看看你死了没有。”戈克调侃道。\n\n“戈克！”泰勒瞪了他一眼，转向林恩道，“你感觉怎么样？”\n\n“还好。”林恩道，“就是有点累。”\n\n“当然累了。”戈克道，“你昨天一个人殿后，用那种奇怪的魔法带着我们飞……差点没把我吓死！”\n\n林恩淡淡一笑，没有解释太多。那是暗影血脉进阶到五级后获得的新能力——暗影飞跃。虽然只能维持短短数秒，但在关键时刻确实能够救命。\n\n“对了，”泰勒突然想起什么，“你让我们收集的那些东西，我已经整理好了。你要看看吗？”\n\n“什么东西？”林恩一怔。\n\n“就是遗迹里的那些宝贝啊！”戈克兴奋地道，“你忘了吗？我们离开之前，我可是装了满满一袋子！”\n\n林恩这才想起来，当时情况紧急，他们确实从遗迹中带走了一些宝物。不过当时太混乱，他也没来得及细看。\n\n“走吧，”林恩下床道，“去你那里看看。”\n\n三人来到戈克的宿舍，只见地上摊着一堆乱七八糟的东西。金币、宝石、魔法卷轴、药剂瓶……琳琅满目，看得人眼花缭乱。\n\n“这么多？”林恩有些惊讶。\n\n“那是！”戈克得意地道，“也不看看我是谁！矮人寻宝专家戈克·石牙，这些宝贝还不是手到擒来？”\n\n泰勒翻了个白眼：“也不知道是谁，在遗迹里差点被骷髅砍死。”\n\n“你！”戈克顿时跳脚，“哪壶不开提哪壶！”\n\n看着两人吵嘴的样子，林恩不禁露出了微笑。这就是他的伙伴，虽然平时吵吵闹闹，但在关键时刻总会一致对外。\n\n“行了，先看看收获吧。”林恩道。\n\n三人开始清点起宝物来。首先是金币，整整一百三十枚，对于学徒来说是一笔不小的财富。然后是一些魔法道具，包括三卷魔法卷轴和五瓶恢复药剂。\n\n“恢复药剂正好可以补充我们的储备。”泰勒道，“那三卷魔法卷轴也留着，关键时刻可以用来保命。”\n\n“还有这些。”戈克拿起几块魔法宝石，“这些是遗迹里的魔法能源，应该值不少钱。”\n\n林恩点点头表示同意。这些魔法宝石是稀有资源，可以用来补充魔法阵的能源，或者换取其他需要的物资。\n\n最重要的是，他们在遗迹中还发现了那本《基础冥想精要》。这本书的封面是深蓝色的皮革纸，上面用银色的墨水写着书名，显得格外神秘。这是一种特殊的冥想方法，能够帮助法师更快地提升精神力。\n\n“这本书……”林恩沉思道，“黛西是奥术派的学徒，这本书对她应该很有用。”\n\n“对对对！”戈克连连点头，“黛西妹妹正好需要这个！我们昨天说好的，这本书归她！”\n\n林恩看了戈克一眼，微微一笑：“你倒是记得清楚。”\n\n“那是！”戈克得意地道，“我戈克说话算话，说给黛西妹妹就给她！”\n\n泰勒笑着摇了摇头：“好了，宝物也看完了。林恩，你接下来有什么打算？”\n\n林恩沉默片刻，道：“我想先巩固一下新获得的力量。这次遗迹之行，我的血脉等级突破了，需要时间稳定境界。”\n\n“新力量？”戈克眼睛一亮，“你是说……那个召唤骷髅的能力？”\n\n“不仅仅是召唤。”林恩道，“我的暗影血脉进阶到了五级，获得了许多新的能力。具体是什么……以后你们会知道的。”\n\n泰勒和戈克对视一眼，都从对方眼中看到了震撼。\n\n五级！\n\n在整个银火学派中，五级学徒已经可以担任核心执事的职务，是真正的强者。而林恩才加入学派多长时间？\n\n这天赋，未免也太恐怖了！\n\n“那你先好好休息。”泰勒道，“我们不打扰你了。”\n\n送走泰勒和戈克后，林恩独自坐在床边，陷入了沉思。\n\n血脉等级突破到五级，这意味着他的实力已经发生了质变。现在，即使是面对4级暗影血脉，他也有一战之力。如果算上新觉醒的召唤能力，他的真实战斗力甚至可以与五级血脉战士抗衡。\n\n但更重要的是，死神传承已经彻底与他融为一体。\n\n亡灵戒指中，那块死亡镰刀碎片正在散发着微弱的波动。那种感觉就像是有生命一般，在不断地滋养着他的身体。\n\n七块碎片。\n\n这是林恩从死神意志那里得知的信息。死亡镰刀一共有七块碎片，散落在大陆各地。目前他只获得了一块，还有六块等待着他去寻找。\n\n“黄昏教团……”\n\n林恩喃喃自语，眼神变得深邃起来。\n\n他继承了死神传承的消息瞒不了多久。黄昏教团一定会注意到他，而到那时，等待他的将是无尽的追杀。\n\n但林恩不会退缩。\n\n他已经不是当初那个任人欺凌的废血脉私生子了。现在的他，是死神传承的继承者，是未来有可能成为死神的存在。\n\n“总有一天，”林恩暗暗握紧拳头，“我会站在这个世界的巅峰，掌控死亡，驾驭轮回。”\n\n## 盘点收获\n\n在宿舍休息了一天后，林恩的状态恢复了不少。虽然魔力还没有完全恢复，但至少行动已经没有问题了。\n\n下午时分，他决定去找黛西，把那本《基础冥想精要》交给她。\n\n银火学派的花园中，黛西正坐在一张长椅上，手中捧着一本魔法书，阳光透过树叶的缝隙洒在她身上，画面美得像是画一样。\n\n“黛西。”林恩走过去，轻声唤道。\n\n黛西抬起头，看到林恩后，脸上露出了欣喜的笑容：“林恩！你没事吧？昨天真是担心死我了！”\n\n“我没事。”林恩微微一笑，“对不起，让你担心了。”\n\n“只要你安全就好。”黛西道，“那天……到底发生了什么？”\n\n林恩犹豫了一下，最终还是没有告诉黛西死神传承的全部真相。只是简单地说，遗迹中的魔法阵失控导致了崩塌，他们差点没能逃出来。\n\n“那真是太危险了。”黛西心有余悸地道。\n\n“还好我们命大。”林恩道，随即想起正事，“对了，这个给你。”\n\n他从储物袋中取出那本《基础冥想精要》，递给黛西。\n\n“这是……”黛西接过书，眼中闪过一丝惊讶，“魔法书？！”\n\n“嗯。”林恩道，“这是在遗迹中发现的。我想，这本书对你应该很有帮助。”\n\n黛西翻开书页，仔细阅读起来。渐渐地，她的表情变得激动起来。\n\n“这……这是一种全新的冥想方法！”黛西难以置信地道，“如果能够掌握这种方法，我的精神力修炼速度至少能提升一倍！”\n\n“所以，这本书归你了。”林恩道。\n\n“这太珍贵了……”黛西看着林恩，眼中满是感激，“林恩，谢谢你！”\n\n“不用谢。”林恩道，“我们是伙伴，不是吗？”\n\n黛西的脸微微红了，轻轻点了点头。\n\n两人在花园中聊了一会儿，黛西告诉林恩在她昏迷期间发生的事情。据她说，当时她被一股柔和的力量保护着，应该是林恩做了什么。\n\n林恩没有否认，只是笑了笑。在遗迹崩塌的瞬间，他用暗影之力形成了一个防护罩，保护了黛西。虽然消耗巨大，但这是值得的。\n\n告别黛西后，林恩独自在学派中漫步。\n\n傍晚的银火城显得格外美丽。夕阳将整座城市染成了金色，魔法塔顶端的光芒与落日余晖交相辉映，显得格外壮丽。\n\n林恩站在学派的高台上，俯瞰着整个城市。\n\n这就是他未来的起点。\n\n从血脉觉醒的那一刻起，他就注定要走上这条道路。死神传承、力量的追求、敌人的追杀……这些都是他必须面对的挑战。\n\n但他不会孤单。\n\n他的身边有泰勒、有戈克、有黛西，还有莫雷导师。这些人会一直支持着他，直到他站在这个世界的巅峰。\n\n“总有一天，”林恩喃喃自语，“我会让你们都为我骄傲。”\n\n## 回到银火城\n\n夜色渐浓，银火城陷入了一片宁静。\n\n林恩躺在宿舍的床上，双手枕在头后，望着天花板发呆。今天发生的事情如同走马灯一样在脑海中回放——遗迹的探险、死神的传承、死亡的危机、最后的逃脱、丰厚的收获……\n\n一切都像是做梦一样。\n\n但手指上微微发热的亡灵戒指提醒着他，这不是梦。死亡镰刀碎片真的已经与他融为一体，成为了他力量的一部分。\n\n这还只是开始。\n\n林恩暗暗握紧拳头。\n\n他会变得更强，比夜语家族的任何人都强。总有一天，他会回到夜语领地，不是作为被驱逐的私生子，而是作为让整个家族都仰望的强者。\n\n带着这样的信念，林恩缓缓闭上眼睛。\n\n明天，又是新的一天。\n\n——\n\n第二天的清晨，阳光明媚。\n\n林恩起了个大早，经过一夜的休息，他的状态已经恢复了大半。体内的暗影血脉在缓缓流转，给他带来源源不断的力量。\n\n走出宿舍，林恩打算去找莫雷导师，汇报一下这次遗迹之行的详细情况。虽然昨天已经简单汇报过一次，但还有一些细节需要补充。\n\n然而刚走出宿舍楼，他就看到了泰勒和戈克。\n\n“林恩！”戈克兴奋地朝他招手，“这边这边！”\n\n“怎么了？”林恩走过去，疑惑地道。\n\n“今天有个好消息！”泰勒脸上带着笑容，“学派要举办一场试炼，据说奖品很丰厚！”\n\n“试炼？”林恩一怔，“什么试炼？”\n\n“具体的我也不太清楚。”戈克道，“好像是关于魔法阵的考核？反正很厉害的样子！”\n\n林恩皱起眉头：“可是我们刚从遗迹回来……”\n\n“正是因为从遗迹回来了才要参加！”泰勒道，“这种机会可不多见！林恩，以你现在的实力，绝对能取得好成绩！”\n\n林恩犹豫了一下，最终点了点头：“好吧，我去看看。”\n\n三人一起来到学派的大殿，发现已经有很多学徒聚集在这里了。人群中有林恩熟悉的面孔，也有不少陌生的脸孔。\n\n“安静！”一个声音响起，莫雷导师从大殿深处走了出来。\n\n原本嘈杂的大殿瞬间安静下来。\n\n“今天召集大家，是因为有一件重要的事情要宣布。”莫雷环顾四周，淡淡地道，“两天后，银火学派将举办一场年终试炼。所有学徒都必须参加，表现优秀者将获得丰厚的奖励。”\n\n“年终试炼？”林恩喃喃道。\n\n“第一名的奖品，是一件传奇级别的魔法装备。”莫雷继续道，“除此之外，还有大量的金币和魔法材料作为奖励。”\n\n此言一出，人群顿时沸腾了。\n\n传奇装备！那可是传说中的存在！整个银火学派，现存的传奇装备也不超过五件，每一件都是镇派之宝！\n\n“安静！”莫雷抬起手，人群再次安静下来，“试炼的内容是……探索幽影森林！”\n\n“幽影森林？！”有人惊呼出声。\n\n“没错。”莫雷道，“幽影森林的深处，有一个新发现的古代遗迹。根据探测，里面可能藏有珍贵的魔法宝藏。你们要做的，就是进入遗迹，探索其中的秘密。”\n\n林恩心中一动。新发现的遗迹？这不会是他们昨天去过的那个吧？\n\n不可能。那个遗迹已经完全坍塌了，不可能有新的发现。\n\n“但是，”莫雷话锋一转，“幽影森林中充满了危险。有强大的变异魔兽，还有可能存在的黑暗势力。为了安全起见，所有参加试炼的学徒都必须组成小队，每队至少四人。”\n\n四人一组？\n\n林恩转头看向泰勒和戈克，三人交换了一个眼神，心照不宣。\n\n“此外，”莫雷又道，“考虑到这次试炼的危险性，学派会为每队提供必要的帮助。包括恢复药剂、魔法卷轴、以及必要的地图。”\n\n人群再次议论起来。\n\n“听起来很有意思。”泰勒低声道。\n\n“确实。”林恩点点头，眼中闪过一丝精光。\n\n如果能够在这个试炼中取得好成绩，不仅能获得丰厚的奖励，还能提升自己在学派中的地位。更重要的是，他可以通过试炼，进一步了解死神传承的秘密。\n\n“林恩，”戈克兴奋地道，“我们三个再加上黛西，正好四个人！这次试炼，我们一定要拿第一名！”\n\n“黛西？”林恩犹豫了一下，“她愿意参加吗？”\n\n“放心吧！”戈克道，“我已经问过她了，她说愿意加入我们的队伍！”\n\n林恩沉默了片刻，最终点了点头：“好，我们一起参加。”\n\n“好！”泰勒也道，“这次一定要让那些家伙看看我们的厉害！”\n\n三人相视一笑，眼中都充满了信心。\n\n这一次的遗迹之行，让他们的实力都提升了不少。现在，正是他们展现实力的时候！\n\n林恩抬起头，看向大殿外的天空。\n\n阳光明媚，万里无云。\n\n属于他的舞台，才刚刚开始。\n\n## 新的开始\n\n离开大殿后，林恩独自在学派中漫步。\n\n银火城的清晨显得格外宁静。街道上的行人不多，偶尔有几个学徒匆匆走过，都在议论着即将到来的年终试炼。\n\n“林恩！”\n\n一个熟悉的声音从身后传来。林恩回头看去，只见黛西正朝他走来，脸上带着温柔的笑容。\n\n“黛西？”林恩停下脚步，“你怎么来了？”\n\n“我听说你也参加了年终试炼？”黛西走到他身边，轻声道，“所以想来找你聊聊。”\n\n“走吧。”林恩点点头，“我们边走边说。”\n\n两人沿着学派的林荫小道缓步前行，清晨的阳光透过树叶的缝隙洒在他们身上，温暖而舒适。\n\n“林恩，”黛西犹豫了一下，还是开口问道，“这次遗迹之行……你真的没事吗？”\n\n“我能有什么事？”林恩微微一笑。\n\n“我不是指身体。”黛西认真地道，“我是说……你获得的那个力量。”\n\n林恩的笑容僵了一下。他没想到黛西会这么敏感，竟然察觉到了什么。\n\n“那是……”林恩斟酌着措辞，“一种古老的传承。具体是什么，我暂时还不能告诉你。”\n\n黛西点点头，表示理解：“我明白。这种力量……很危险吗？”\n\n“危险？”林恩想了想，“确实很危险。但也很强大。”\n\n“那你打算怎么办？”\n\n林恩停下脚步，转头看向黛西。清晨的阳光照在她的脸上，让她看起来格外美丽。\n\n“我会继续变强。”林恩认真地道，“直到有一天，我能够掌控自己的命运，不再受制于人。”\n\n黛西看着林恩的眼睛，从中看到了坚定和决心。她突然明白，眼前的这个少年已经不再是当初那个需要她保护的学徒了。\n\n他已经成长为一个真正的强者。\n\n“我支持你。”黛西轻声道，“无论你做出什么选择，我都会站在你这边。”\n\n林恩心中涌起一股暖意。这就是伙伴，无论他变得多么强大，都会一直支持着他。\n\n“谢谢你，黛西。”林恩真诚地道。\n\n“不用谢。”黛西微微一笑，“我们是伙伴，不是吗？”\n\n两人相视一笑，一切尽在不言中。\n\n## 试炼前的准备\n\n接下来的几天，银火学派进入了紧张的准备状态。\n\n所有参加年终试炼的学徒都在积极准备，有的在练习魔法，有的在打磨武器，有的则在组队进行模拟训练。整个学派都笼罩在一片忙碌的氛围中。\n\n林恩也没有闲着。\n\n他在宿舍中闭门不出，专心巩固新获得的力量。亡灵戒指中的死亡镰刀碎片正在缓缓释放能量，不断强化着他的身体。\n\n血脉等级突破到五级后，林恩能感觉到自己的变化。他的暗影血脉变得更加精纯，对死亡之力的操控也更加得心应手。\n\n更重要的是，那块死亡镰刀碎片给他带来了许多新的能力。\n\n除了之前展现的暗影飞跃和骷髅召唤之外，碎片中还存储着许多古老的知识。那些知识涉及到亡灵魔法的更深层次，甚至包括一些失传已久的高级魔法。\n\n林恩如饥似渴地学习着这些知识，沉浸在魔法的海洋中。\n\n除了魔法之外，林恩也没有忽略体能和战斗技巧的训练。他知道，在即将到来的试炼中，他可能会遇到各种强大的敌人。只有做好充分的准备，才能在战斗中立于不败之地。\n\n这天傍晚，泰勒和戈克来找林恩。\n\n“林恩，训练的怎么样了？”泰勒问道。\n\n“还行。”林恩道，“已经稳定在五级了。”\n\n“五级！”戈克惊呼，“老大，你也太勐了吧？这么快就稳定了？”\n\n林恩淡淡一笑。他并没有告诉两人，其实在遗迹中获得的好处远不止这些。死亡镰刀碎片给他带来的提升是全方位的，不仅体现在血脉等级上，更体现在对魔法本质的理解上。\n\n“对了，”林恩想起一事，“试炼的规则你们了解多少？”\n\n泰勒的表情变得严肃起来：“我打听到了一些消息。这次试炼的内容是探索幽影森林中的新遗迹据说那个遗迹非常危险，里面有不少强大的魔兽和陷阱。”\n\n“而且，”戈克补充道，“听说还有别的势力也会参加这次试炼。具体是哪些势力，我现在还不清楚。”\n\n“别的势力？”林恩皱起眉头。\n\n“应该是其他魔法学派的人。”泰勒道，“每年银火学派举办试炼的时候，都会邀请一些友好势力参加。”\n\n林恩沉思不语。如果有其他势力参加这次试炼，情况可能会变得更加复杂。特别是那些对死神传承有所了解的组织，很可能会注意到他。\n\n不过，林恩并不害怕。\n\n他已经做好了准备。\n\n“不管遇到什么敌人，”林恩淡淡地道，“我们都不会退缩。”\n\n“没错！”戈克挥舞着拳头，“让他们见识一下我们的厉害！”\n\n三人的手掌叠在一起，相视一笑。\n\n这一次的试炼，将是他们展现实力的舞台。\n\n也是林恩向整个世界证明自己的开始。\n\n（本章完）'},{n:5,t:' 第5章：血脉派的庞然大物',c:'晨光透过破旧的窗棂洒进来，在斑驳的石地上投下细碎的光斑。林恩站在自己那间狭小的下人房里，透过窗户望向远处那座巍峨的城堡——夜语城堡。\n\n那里是他父亲居住的地方，也是整个夜语领地的权力核心。\n\n今日就是血脉测试的日子。这个消息已经在家族中传开了，每一个经过林恩身边的侍从都会用复杂的眼神看他一眼。那种眼神有好奇、有怜悯、更多的则是幸灾乐祸。\n\n作为族长的私生子，林恩在这个家族中的地位甚至不如一个受宠的仆人。\n\n“恩儿，过来。”母亲伊莲娜的声音从身后传来，“娘有话要对你说。”\n\n林恩转过身，看着母亲。伊莲娜虽然已经年过三十，但岁月似乎并未在她脸上留下太多痕迹。那头银白色的长发配上精致的容颜，让她看起来根本不像是生过孩子的女人。\n\n“娘，什么事？”林恩走过去，在母亲身边坐下。\n\n伊莲娜轻轻握住儿子的手，目光复杂地看着窗外：“你可知，我们夜语家族在这片大陆上的地位？”\n\n林恩点了点头。这些年他从各种渠道听说过一些。\n\n“夜语家族，是艾瑟兰大陆上血脉派的支柱势力之一。”伊莲娜的声音变得悠远，“血脉派相信，力量源自于血脉的传承——上古强者将力量刻入血脉之中，后代可以通过觉醒来继承这种力量。”\n\n“血脉的品级，是家族地位的根本。”伊莲娜继续说道，“血脉石可以检测出血脉的浓度和品级。上品血脉者，将成为家族的核心培养对象。中品血脉者，可以成为家族的精锐力量。下品血脉者，虽然地位不如前者，但也能获得基本的培养。而最差的……”\n\n“废血脉。”林恩接话，声音平静得可怕。\n\n伊莲娜担忧地看了儿子一眼：“血脉测试那天，会有家族长老主持。你不需要紧张，按照平常心去测试就好。”\n\n“娘亲，”林恩抬起头，眼神坚定，“如果我真的是废血脉……会怎样？”\n\n伊莲娜沉默了片刻，最终还是如实说道：“废血脉，意味着无法觉醒。在血脉派的世界里，无法觉醒的族人……地位连仆从都不如。你父亲他……”\n\n她没有再说下去，但林恩已经明白了。\n\n那个高高在上的族长大人，从未正眼看过自己这个私生子一眼。\n\n“走吧。”伊莲娜站起身，“今天家族有重要的集会，所有族人都要参加。娘带你去见见世面。”\n\n---\n\n家族集会地点在城堡的议事大厅。当林恩跟着母亲走进去的时候，偌大的厅堂已经聚集了数十人。\n\n最上首的位置坐着一位中年男子——布隆·夜语，夜语家族的当代族长。他身着一袭黑色长袍，面容冷峻，留着短须，整个人散发着一种不怒自威的气势。这就是林恩的父亲，但此刻他甚至没有往林恩的方向看一眼。\n\n在族长下方，坐着家族的几位长老。他们的年龄都在五十岁以上，穿着与族长相似的黑色长袍，但袖口和领口绣着不同的暗纹，代表着各自的血脉分支。\n\n在年轻人们的首位置，站着一个金发青年。他大约十七八岁，身材挺拔，面容俊美，但那双眼睛中透着一股阴冷的气息。\n\n罗恩·毒蛇。\n\n林恩认出了他。这是家族嫡系一脉的传人，据说他已经觉醒了毒蛇血脉。\n\n似乎是感受到了林恩的目光，罗恩转过头来，嘴角勾起一抹冷笑。那种眼神，就像是在看一只蝼蚁。\n\n“安静。”就在此时，族长布隆开口了，声音不大，却清晰地传遍整个大厅。\n\n议事大厅瞬间安静下来。\n\n“今日召集族中众人，是为了宣布血脉测试的相关事宜。”布隆的目光扫视全场，“我夜语家族传承千年，血脉之力是我族的根本。每一位族人的血脉觉醒，都关系到家族的未来。因此，血脉测试历来是家族最重要的仪式之一。”\n\n他顿了顿，继续说道：“今日卯时，所有未觉醒血脉的族人，都必须前往血脉觉醒室进行测试。迟到者，按族规处置。”\n\n“另外，”布隆的语气变得严肃，“此次测试将由大长老亲自主持。所有测试结果都将记录在案，作为日后培养资源分配的依据。”\n\n此言一出，大厅中顿时响起一阵窃窃私语。\n\n大长老亲自主持，可见家族对这次测试的重视程度。\n\n“最后我要说的是，”布隆再次开口，目光在全场扫视了一遍，最后有意无意地在林恩的方向停留了一瞬，“无论测试结果如何，都不准有任何违规的行为。家族有家族的规矩，任何人不得破坏。违者，严惩不贷！”\n\n这句话，似乎是在警告某些人。\n\n林恩敏锐地捕捉到了这一点。他看了看身旁的母亲，发现伊莲娜的脸色也变得有些难看。\n\n“散了。”布隆站起身，大步离开议事大厅。\n\n---\n\n集会结束后，林恩并没有立即离开。他站在原地，看着族人们三三两两地散去，耳边传来各种议论声。\n\n“你们听说了吗？这次测试，族长特别关注那个私生子。”\n\n“就是伊莲娜生的那个？好像叫林恩吧？”\n\n“不错。听说族长特意叮嘱，要好好\'照顾\'他呢。”\n\n“嘿，一个私生子而已，就算觉醒了血脉又能如何？还能翻了天不成？”\n\n这些议论声不大不小，正好能让林恩听得清清楚楚。他握紧拳头，指甲陷入掌心，却感觉不到疼痛。\n\n“恩儿。”伊莲娜拉了拉儿子的衣袖，“我们走吧。”\n\n林恩深吸一口气，压下心中的情绪，跟着母亲离开了议事大厅。\n\n走出城堡的时候，迎面碰上了罗恩。\n\n“哟，这不是林恩弟弟吗？”罗恩脸上带着虚伪的笑容，“今日就是血脉测试了，准备得怎么样啊？”\n\n林恩抬起头，直视罗恩的眼睛：“劳烦罗恩哥哥关心，我准备好了。”\n\n“准备？”罗恩冷笑一声，“也对，毕竟是最后一次机会了。好好珍惜吧，不然以后可就没机会了。”\n\n“罗恩少爷，”伊莲娜上前一步，将林恩护在身后，“测试还没开始，结果尚未可知。你这样说，是不是有些太早了？”\n\n罗恩看了伊莲娜一眼，眼中闪过一丝忌惮。他虽然是家族的嫡系子弟，但对于伊莲娜，他始终有些捉摸不透。\n\n“伊莲娜阿姨说的是，是我说错话了。”罗恩笑了笑，“不过我说的也是事实嘛。废血脉就是废血脉，再怎么准备也改变不了的。”\n\n他凑近林恩，用只有两人能听到的声音说道：“我劝你到时候还是主动放弃吧，省得丢人现眼。你和你那个低贱的娘，最好有点自知之明。”\n\n林恩的眼神瞬间变得冰冷。\n\n“你说什么？”\n\n“怎么？想动手？”罗恩不屑地笑了，“就你？连血脉都没觉醒的废物，也配跟我动手？信不信我一根手指就能让你躺下？”\n\n“罗恩少爷！”就在气氛剑拔弩张之际，一个苍老的声音响起。\n\n两人循声望去，只见一位白发老者走了过来。他是家族的长老之一，负责管理族中的日常事务。\n\n“大长老有令，三日内所有族人不得私斗，违者严惩。”老者淡淡地说道，“罗恩少爷，请注意你的身份。”\n\n罗恩撇了撇嘴，最终还是没有再说什么。他最后看了林恩一眼，冷笑道：“我们走着瞧。”\n\n说完，带着几个跟班扬长而去。\n\n“恩儿，你没事吧？”伊莲娜担忧地看着儿子。\n\n林恩松开紧握的拳头，深吸一口气：“我没事，娘。我们回家吧。”\n\n---\n\n回到住处，林恩独自坐在床边，脑海中回想着今天发生的一切。\n\n血脉测试……\n\n这个词像是一座大山压在他的心头。\n\n从小，他就知道自己与其他的家族子弟不同。他没有显赫的身份，没有父母的关爱，甚至没有一个正经的名字——“夜语”这个姓，还是在他十岁时，家族才勉强承认的。\n\n而血脉测试，将决定他未来的命运。\n\n如果觉醒成功，他将摆脱私生子的身份，成为家族认可的一员。\n\n如果觉醒失败……\n\n林恩不敢想象那之后的生活。\n\n“恩儿。”伊莲娜端着一碗热汤走进来，“喝点汤吧，待会还要去测试。”\n\n“娘，”林恩接过汤碗，“你说……我能不能觉醒血脉？”\n\n伊莲娜在儿子身边坐下，轻轻抚摸着他的头发：“傻孩子，血脉觉醒这种事，谁也说不准的。你不要太有压力，无论结果如何，你都是娘的好儿子。”\n\n“但是……”\n\n“没有但是。”伊莲娜打断儿子的话，“你只要尽力就好。其他的，交给命运吧。”\n\n林恩看着母亲慈祥的面容，心中涌起一股暖流。无论外界如何对待他，至少他还有母亲。\n\n“对了，”伊莲娜像是突然想起什么，“上次娘给你的那枚戒指，你要贴身收好，关键时刻能救命。”\n\n林恩看向手指上那枚古朴的黑戒指，点了点头。\n\n用过午饭，林恩决定在测试前出去走走，散散心。\n\n领主府邸的走廊错综复杂，林恩不知不觉间走到了一处偏僻的角落。这里是护卫们的休息区，平时很少有人来。\n\n※\n\n【小高潮-林恩突破修炼】\n\n就在林恩准备转身离开时，他突然感觉到体内传来一阵异样的波动。\n\n那是什么？\n\n林恩心中一动，下意识地蹲下身子，闭上眼睛，仔细感应着体内的变化。\n\n他能感觉到，在心脏的深处，似乎有什么东西正在苏醒。那是一种很奇怪的感觉——既陌生又熟悉，既温暖又冰冷。\n\n这……这是怎么回事？\n\n林恩咬紧牙关，强忍着那异样的感觉。\n\n他能感觉到自己的身体正在发生某种变化——肌肉在微微颤抖，经脉在微微膨胀，甚至连呼吸都变得困难起来。\n\n不行……\n\n这样下去会出问题……\n\n林恩深吸一口气，强迫自己冷静下来。\n\n他盘膝坐下，按照母亲曾经教过他的基础冥想法，开始调整呼吸。\n\n呼——\n\n吸——\n\n呼——\n\n吸——\n\n一次又一次，林恩保持着节奏。\n\n渐渐的，那异样的感觉开始消退。\n\n但紧接着，一种全新的感觉油然而生。\n\n他能感觉到周围的空气中弥漫着某种特殊的能量——那不是魔力，不是血脉之力，而是一种更加虚无缥缈的东西。\n\n那是……暗影？\n\n林恩心中大惊。\n\n他能感觉到，在周围的阴影中，蕴含着某种奇特的能量。那种能量冰冷而深邃，带着一种死亡的气息。\n\n这是怎么回事？\n\n他不是连血脉都无法觉醒的废血脉吗？\n\n为什么能感应到这种力量？\n\n林恩犹豫了一下，然后试着去接触那些暗影能量。\n\n就在他接触到第一丝暗影能量的瞬间——\n\n“轰——”\n\n仿佛有什么东西在体内炸开。\n\n林恩的身体猛地一颤，整个人瞬间失去了意识。\n\n不知过了多久，他悠悠醒来。\n\n首先感觉到的是——全身充满了力量。\n\n那是一种前所未有的感觉。仿佛有用不完的精力，仿佛能摧毁一切。\n\n林恩握紧拳头。\n\n他能感觉到体内流淌着一股全新的力量——那不是血脉之力，而是一种更加诡异、更加深邃的力量。\n\n暗影能量！\n\n这就是暗影能量！\n\n林恩心中狂喜。\n\n原来，他真的能感应到力量！\n\n原来，他真的不是废血脉！\n\n只是，他的力量不是普通的血脉之力，而是更加罕见的暗影之力！\n\n林恩激动得几乎要跳起来。\n\n但是，他很快就冷静下来。\n\n现在还不是高兴的时候。\n\n血脉测试即将开始，他必须做好充分的准备。\n\n而且，刚才那短暂的力量觉醒，似乎并不稳定。林恩能感觉到，体内的暗影能量时强时弱，像是风中残烛，随时都可能熄灭。\n\n必须尽快稳固境界！\n\n林恩深吸一口气，再次盘膝坐下。\n\n他试着引导体内的暗影能量，让它们按照特定的路线运转。\n\n一次……\n\n两次……\n\n三次……\n\n也不知道过了多久，当林恩再次睁开眼睛时，外面的天色已经暗了下来。\n\n但是，他能感觉到，体内的暗影能量已经稳固了许多。虽然还很微弱，但至少不会再像之前那样不稳定了。\n\n“这就是力量的感觉吗……”\n\n林恩握紧拳头，眼神变得异常坚定。\n\n今日的血脉测试，他一定要通过！\n\n他要向所有人证明——\n\n他，林恩·夜语，不是废物！\n\n---\n\n就在林恩离开后不久，一个身影从阴影中走出。\n\n“有意思。”罗恩看着林恩远去的背影，眼中闪过一丝阴冷，“看来这个废物，也不是表面上看起来那么简单啊……”\n\n他转身消失在走廊深处。\n\n血脉觉醒室门口，人越来越多。所有未觉醒血脉的家族子弟都聚集在这里，等待着改变命运的那一刻。\n\n林恩站在人群中，显得有些孤独。\n\n但他的眼神，却比任何时候都要坚定。\n\n今日。\n\n成败在此一举。\n\n林恩转过身，看到一个身着铠甲的护卫正向自己走来。这个护卫身高马大，满身酒气，走路都有些不稳。\n\n“抱歉，我这就离开。”林恩不想惹事，转身就要走。\n\n“等等！”护卫一把抓住林恩的肩膀，“你就是那个族长的私生子吧？听说你连血脉都无法觉醒？”\n\n林恩皱了皱眉：“放开我。”\n\n“哟呵，还挺有脾气！”护卫不但没有松手，反而抓得更紧了，“一个废物也敢在本大爷面前嚣张？信不信我让你好看？”\n\n“我说了放开我。”林恩的声音冷了下来。\n\n“就不放，你能怎么样？”护卫冷笑一声，猛然出手，一拳向林恩的面门砸来！\n\n这一拳又急又猛，带起一阵风声。如果是普通人，这一拳绝对躲不开。\n\n但林恩不是普通人。\n\n这些年来，虽然无法觉醒血脉，但他从未停止过锻炼。而且，他能隐约感受到周围环境中的危险——那些别人看不到的阴影虚影，有时候会帮他预判威胁。\n\n林恩身形一侧，险之又险地避开了这一拳。\n\n护卫愣了一下，显然没想到这个"废物"能躲开。\n\n“有点意思。”护卫舔了舔嘴唇，再次出手。这次他用上了全力，拳风呼啸，直取林恩胸口。\n\n林恩深吸一口气，身体本能地动了起来。他的动作并不华丽，但异常有效——每一次移动都恰到好处地避开攻击，同时寻找反击的机会。\n\n“砰！”\n\n林恩一掌击中护卫的手腕，将他的攻势化解。\n\n“可恶！”护卫恼羞成怒，拔出腰间的长剑，“既然你找死，就别怪我不客气了！”\n\n寒光闪过，长剑直奔林恩而来！\n\n林恩瞳孔一缩，身体一侧，同时右手成爪，抓向护卫的手腕。\n\n“叮！”\n\n长剑脱手飞出，插在了走廊的墙壁上。\n\n护卫本人也被林恩这一爪带得向前踉跄了几步，险些摔倒。\n\n“你……”护卫难以置信地看着林恩，“你真的是废物？”\n\n林恩没有回答。他低头看了看自己的手，心中也是一阵惊讶。\n\n刚才那一切都是本能反应，他根本没想过自己能做到。\n\n难道说……\n\n他体内真的有某种力量？\n\n“小子，你给我等着！”护卫捡起长剑，灰溜溜地跑了，“这件事没完！”\n\n林恩站在原地，看着护卫远去的背影，若有所思。\n\n刚才的战斗虽然短暂，但他能感觉到自己的身体里确实存在着某种力量。\n\n只是……还没有觉醒而已。\n\n“也许，”林恩喃喃自语，“今日的测试，真的会有转机也说不定。”\n\n他深吸一口气，大步向血脉觉醒室的方向走去。\n\n测试即将开始，他必须做好准备。\n\n---\n\n而就在林恩离开后不久，一个身影从阴影中走出。\n\n“有意思。”罗恩看着林恩远去的背影，眼中闪过一丝阴冷，“看来这个废物，也不是表面上看起来那么简单啊……”\n\n他转身消失在走廊深处。\n\n血脉觉醒室门口，人越来越多。所有未觉醒血脉的家族子弟都聚集在这里，等待着改变命运的那一刻。\n\n林恩站在人群中，显得有些孤独。\n\n但他的眼神，却比任何时候都要坚定。\n\n今日。\n\n成败在此一举。'},{n:6,t:' 第6章：血脉测试前夜',c:'清晨的第一缕阳光透过窗户洒落在脸上，林恩缓缓睁开双眼。\n\n今日……就是血脉测试的日子了。\n\n他坐起身，习惯性地进行每日晨间的冥想。然而，无论他如何努力，体内的力量就像是沉睡的野兽，始终没有任何苏醒的迹象。\n\n一刻钟后，林恩睁开眼睛，嘴角露出一丝苦笑。\n\n还是没有进展。\n\n“恩儿，醒了吗？”门外传来母亲的声音。\n\n“醒了，娘亲。”林恩应了一声，起身开门。\n\n伊莲娜站在门外，手中端着一碗热粥。她的脸上带着温柔的笑容，但林恩敏锐地察觉到，母亲的眼眶有些发黑，似乎昨晚没有睡好。\n\n“娘，你又熬夜了？”林恩皱眉道。\n\n“没事。”伊莲娜笑了笑，“快来吃饭吧，吃完娘有重要的事情要告诉你。”\n\n母子俩相对而坐，简单地吃着早餐。伊莲娜不停地给林恩夹菜：“多吃点，吃饱了才有力气。待会就是测试了，你要保持最好的状态。”\n\n“娘，我吃不下。”林恩放下筷子，心情有些沉重。\n\n“怎么了？”伊莲娜担忧地看着儿子，“是紧张吗？”\n\n林恩沉默片刻，点了点头：“娘，你说……我会不会真的是废血脉？”\n\n伊莲娜握住儿子的手，柔声道：“恩儿，不要胡思乱想。血脉觉醒这种事，不到最后一刻，谁也说不准的。”\n\n“但是族中那些人的态度……你也看到了。”林恩的声音有些苦涩。\n\n“那又如何？”伊莲娜的眼神变得坚定，“只要你自己不放弃，就没有人能定义你的未来。”\n\n林恩看着母亲，心中涌起一股暖流。无论发生什么，母亲总是站在他这边。\n\n“娘，我知道了。”林恩重新拿起筷子，“我会尽力的。”\n\n“这才对。”伊莲娜笑了，“吃完了娘带你去个地方。”\n\n---\n\n吃过饭后，伊莲娜带着林恩离开了居住的小院。两人沿着城堡后的小路一路前行，穿过一片密林，来到了一座废弃的小木屋前。\n\n这座木屋看起来已经有些年头了，木头都已经发黑，屋顶也破损了大半。\n\n“娘，这里是……”林恩疑惑地看着母亲。\n\n伊莲娜没有回答，而是上前推开木屋的门。门发出"吱呀"的声音，激起一片灰尘。\n\n“进来吧。”\n\n林恩跟着母亲走进木屋。屋内弥漫着一股陈旧的气息，家具都已经搬空了。\n\n但是，当林恩踏进房间的瞬间，他的身体突然僵住了。\n\n一种奇异的感觉从心底涌起。\n\n那是……召唤？\n\n他猛地转过头，看向角落处的阴影。在那里，他似乎看到了什么，但又看不太真切。\n\n“恩儿？”伊莲娜注意到儿子的异常，“你怎么了？”\n\n“娘……”林恩揉了揉眼睛，“你有没有看到那里……好像有什么东西？”\n\n伊莲娜的眼神闪烁了一下：“没有啊，你看错了吧？”\n\n“恩儿，”伊莲娜的声音变得严肃，“娘今天要给你的东西，对你非常重要。你一定要好好保管，绝对不能让它落入别人的手中，明白吗？”\n\n林恩收回目光，看向母亲：“娘，什么东西？”\n\n伊莲娜深吸一口气，从怀中取出一个精致的木盒。她轻轻打开盒子，里面躺着一枚戒指。\n\n这枚戒指通体黝黑，材质非金非玉，戒面上刻着复杂的符文，散发着一股古朴神秘的气息。\n\n“好漂亮的戒指。”林恩惊叹道。\n\n“这不是普通的戒指。”伊莲娜的声音变得低沉，“这枚戒指，是我们家族……不，应该说是精灵族的宝物。”\n\n“精灵族？”林恩愣了一下。\n\n伊莲娜苦涩地笑了笑：“恩儿，你坐下来，娘有些事情要告诉你。”\n\n母子俩面对面坐下，伊莲娜开始讲述那段被尘封的往事。\n\n“娘出身于风语家族，那是精灵族的一个旁支。风语家族的先祖曾是月神祭司。”伊莲娜的眼神变得悠远，“但是后来，发生了一些事情……娘被迫离开了精灵族，流落到这里，遇到了你父亲。”\n\n“娘……”林恩握住母亲的手。\n\n“都过去了。”伊莲娜深吸一口气，“娘给你这枚戒指，是我们风语家族世代相传的宝物。它蕴含着巨大的力量。”\n\n“力量？”林恩看向那枚黑戒指。\n\n“不错。”伊莲娜将戒指取出来，递给儿子，“这枚戒指，是当年精灵族智者留下的。据说是死神……嗯，应该是某位强大存在的遗产。”\n\n“死神？！”林恩惊呼出声。\n\n“嘘！”伊莲娜做了个噤声的手势，“小心隔墙有耳。这件事不能让任何人知道，明白吗？”\n\n林恩郑重点头：“娘，我明白。”\n\n他接过戒指，仔细端详。戒指入手温热，仿佛有生命一般在微微震颤。戒面上的符文仿佛活物一般流转，看得久了，林恩甚至有一种头晕目眩的感觉。\n\n“这枚戒指，你滴血认主吧。”伊莲娜说道。\n\n林恩咬破手指，将一滴血液滴在戒面上。\n\n血液瞬间被戒指吸收。紧接着，戒指大放光芒，一股冰冷的气息扑面而来。\n\n【幻境战斗-五感描写】\n\n视觉：四周的黑暗开始翻涌，无数幽蓝色的鬼火在虚空中燃起，勾勒出一个古老战场的轮廓\n\n听觉：远处传来亡灵的哀嚎，战鼓声从远古传来，刀剑碰撞的脆响在耳边回荡\n\n嗅觉：空气中弥漫着腐烂的气息，血腥味、焦尸味充斥着鼻腔\n\n触觉：戒指传来刺骨的寒意，强大的吸力开始抽取体内的力量\n\n感觉：体内的某种力量被唤醒，剧烈的疼痛顺着指尖蔓延到全身\n\n林恩感觉自己仿佛坠入了深渊，四周是无边的黑暗。在黑暗中，有什么东西在注视着他——那是一种被洪荒巨兽盯上的感觉，让人毛骨悚然。\n\n“是谁？”一个苍老的声音在黑暗中响起，带着无尽的岁月的沉淀。\n\n这声音仿佛来自九幽深渊，直接在林恩的灵魂深处回响。林恩想要回应，却发现自己的声音在这个空间中变得微弱无力。\n\n突然，黑暗中亮起两点猩红色的光芒。那是……一双眼睛！\n\n视觉：幽冷的红芒如血月般悬挂天际，俯视着下方的一切\n\n感觉：无尽的威压如山岳般倾覆，灵魂都在颤栗\n\n“是谁？！”苍老的声音再次响起，这一次更加愤怒。\n\n林恩只感觉大脑一阵眩晕，那个声音似乎包含了某种神奇的力量，直接在他的灵魂深处回响。他想要抵抗，但那股力量太强大了，强大到他连反抗的念头都无法升起。\n\n“后裔？”林恩艰难地挤出几个字，“你……你是谁？”\n\n黑雾人形停止了移动，那两点猩红的目光定格在林恩身上。过了片刻，那个苍老的声音再次响起：\n\n“我是谁？呵……太久远了，我已经记不得自己的名字了。不过，那些信徒更喜欢称呼我为……克雷蒙特。”\n\n“克雷蒙特？！”林恩的心脏猛地一缩。\n\n作为夜语家族的成员，他对克雷蒙特的神话并不陌生。在艾瑟兰大陆的传说中，克雷蒙特是掌控死亡与轮回的神明，是所有亡灵的主宰。但那只是神话传说，不是吗？\n\n“你不用紧张。”克雷蒙特残魂似乎感受到了林恩的恐惧，声音中多了一丝戏谑，“如果我要害你，你早就死了。暗影血脉的拥有者……数万年来，你是第一个唤醒我的人。”\n\n“娘，我明白。”林恩郑重点头。\n\n“还有，”伊莲娜的声音压得更低了，“如果测试的结果真的不尽如人意，你也不要灰心。这枚戒指既然选择了你，就说明你有它的缘分。命运有时候是很奇妙的，你永远不知道下一个转折在哪里。”\n\n林恩看着手中的戒指，心中涌起一股复杂的情绪。\n\n“娘，”林恩握住母亲的手，“谢谢你。”\n\n“傻孩子。”伊莲娜笑了，眼中却泛着泪光，“好了，时间不早了，我们该去血脉觉醒室了。”\n\n---\n\n血脉觉醒室门口，人越来越多。所有未觉醒血脉的家族子弟都聚集在这里，等待着改变命运的那一刻。\n\n林恩站在人群中，看着那扇沉重的大门。\n\n今日……成败在此一举。\n\n他深吸一口气，握紧了拳头。\n\n而就在他身后不远处，一个身影正悄悄注视着他……'},{n:7,t:' 第七章：血脉觉醒',c:'清晨的阳光透过窗户洒进来，林恩从睡梦中醒来。这一夜他睡得很不安稳，各种光怪陆离的梦境交织在一起——他梦见自己站在一座巨大的黑门前，门后隐约传来低沉的咆哮；又梦见母亲泪流满面地朝他挥手诀别；还梦见族中长老们对他指指点点，口中说着"废血脉"、"耻辱"之类的话语。\n\n每一次从梦中惊醒，他都会发现自己的后背已经被冷汗浸湿。\n\n今天是血脉测试的日子。\n\n他坐起身，习惯性地活动了一下身体。让他惊讶的是，经过昨晚那番对话后，他感觉自己的身体似乎发生了一些微妙的变化。体内似乎有一沉睡的力量在苏醒，就像冬眠的野兽听到了春天的脚步声。\n\n"起床了吗？"伊莲娜的声音从门外传来。\n\n"起来了，娘亲。"林恩应了一声，迅速穿好衣服走出房间。\n\n伊莲娜已经准备好了早餐。她今天特意换了一身新衣服，银白色的长发也梳理得整整齐齐。但林恩敏锐地注意到，母亲的眼眶微微发红，像是昨晚哭过。\n\n"娘，您又熬夜了？"林恩心疼地问道。\n\n"娘没事。"伊莲娜笑了笑，只是那笑容里带着说不出的苦涩，"快来吃饭吧。"\n\n母子俩相对而坐，伊莲娜不停地给林恩夹菜："多吃点，吃饱了才有力气。今天是测试的日子，你要有最好的状态。"\n\n林恩看着母亲慈祥的面容，心中涌起一股暖流。无论发生什么，母亲总是站在他这边。但是，他能感受到母亲笑容背后的沉重。作为一个被家族边缘化的精灵混血，母亲这些年来承受了太多压力。\n\n"娘，"他放下筷子，声音有些哽咽，"如果我还是废血脉……您会不会很失望？"\n\n伊莲娜的手顿了一下。\n\n她抬起头，直视着儿子的眼睛："林恩，你记住，无论测试结果如何，你都是娘最骄傲的孩子。"\n\n"可是……"\n\n"没有可是。"伊莲娜打断他，"血脉并不能决定一切。娘曾经见过太多血脉平庸却成就非凡的人，也见过血脉高贵却碌碌无为的人。真正决定一个人未来的，是他的心性、他的努力、他的选择。"\n\n林恩看着母亲，突然觉得鼻子有些酸。\n\n"娘，我明白了。"他重新拿起筷子，"我会尽全力的。"\n\n"这才是我的好儿子。"伊莲娜笑了，只是眼中隐隐有泪光闪动。\n\n---\n\n用过早饭，林恩和伊莲娜一起向血脉觉醒室走去。\n\n清晨的阳光温暖和煦，但林恩却感觉不到一丝暖意。他的心跳得厉害，每一步都像是有千斤重。\n\n血脉觉醒室位于城堡的东北角，是一栋独立的建筑，四周用黑色的巨石垒成墙面，窗户开得很高很小，看起来严肃而神秘。门口站着两排身穿铠甲的护卫，手中握着长矛，目光如鹰隼般扫视着每一个靠近的人。\n\n"这里就是血脉觉醒室。"伊莲娜指着那栋建筑说道，"每次血脉测试都在这里进行。"\n\n林恩看着那栋看起来颇为神秘庄严的建築，心中既紧张又期待。\n\n"血脉觉醒室里面有一块血脉石。"伊莲娜继续介绍道，"只要将手放在血脉石上，注入魔力，血脉石就会显示出血脉的品级。品级从高到低分为：极品、上品、中品、下品，以及……无品。"\n\n无品，就是废血脉。\n\n林恩的心沉了一下。\n\n"所以，"伊莲娜看着儿子，"测试的时候，你只需要按照长老的指示来做就好。无论结果如何，记住娘给你说的话。"\n\n"娘，我明白。"林恩点头道。\n\n虽然嘴上这么说，但他心中却涌起一股不服输的念头。\n\n万一……万一他也能觉醒呢？\n\n万一……万一他也能成为一个强大的血脉战士？\n\n---\n\n血脉觉醒室门口已经聚集了不少人。所有未觉醒血脉的家族子弟都来了，足有二十多人，年龄从十二三岁到十七八岁不等。他们的父母亲友们也陪同前来，将门口围得水泄不通。\n\n林恩站在人群中，看着那扇沉重的大门，心跳如鼓。\n\n今日……成败在此一举。\n\n他深吸一口气，握紧拳头。不经意地低头，他看到了手指上戴着的那枚黑色戒指——那是昨晚母亲交给他的宝物。\n\n这枚戒指似乎感受到了他的情绪，戒面上闪过一道微弱的光芒。一股温热从指尖传来，仿佛在无声地鼓励着他。\n\n"娘。"林恩转头看向母亲，"如果我成功了，我一定会让您过上好日子。"\n\n伊莲娜眼眶一红："傻孩子，娘只要你平平安安的就好。"\n\n"嗯。"林恩重重点头。\n\n就在这时，沉重的大门缓缓打开。一个苍老的声音从屋内传出：\n\n"血脉测试，现在开始。"\n\n第一个测试者，是一个看起来比林恩大两三岁的少年。他深吸一口气，迈步走进屋内。\n\n所有人都安静下来，目光紧紧盯着门口。\n\n一刻钟后，少年走出来，脸上洋溢着兴奋的光芒。\n\n"中品！"负责记录的长老高声宣布，"风刃血脉，中品！"\n\n人群中爆发出一阵欢呼。少年的父母激动得热泪盈眶，跑上前将儿子紧紧抱住。\n\n林恩羡慕地看着那一幕。\n\n下一个是他。\n\n时间一分一秒地过去，每一秒都是煎熬。二十几个测试者中，最好的觉醒了上品血脉，最差的……是下品。没有人成为无品废血脉。\n\n这让林恩稍稍安心。\n\n也许……他真的能觉醒？\n\n"下一个，林恩·夜语。"\n\n负责记录的长老喊出了他的名字。\n\n林恩的身体僵住了。\n\n"去吧。"伊莲娜握住儿子的手，轻轻捏了捏，"记住，无论结果如何，你都是娘的骄傲。"\n\n林恩看着母亲，重重点了点头。\n\n他迈步走向那扇沉重的大门。\n\n门后，是决定他命运的时刻。\n\n---\n\n血脉觉醒室内，矗立着一块巨大的石碑。\n\n这块石碑高约三米，通体呈深蓝色，表面光滑如镜。石碑周围刻满了古老的符文，散发着淡淡的荧光，整个房间都被映照得蓝盈盈的。\n\n这就是血脉石——能够显现血脉品级的宝物。\n\n林恩站在血脉石前，长老们分立两侧，表情严肃。\n\n"将手放在血脉石上。"一个长老命令道，"然后集中注意力，感受你体内的力量。"\n\n林恩深吸一口气，缓缓伸出手。\n\n当他的手掌接触到血脉石的瞬间——\n\n一阵刺骨的寒意从掌心传来！\n\n林恩打了个激灵。他感觉自己的意识仿佛被一股无形的力量拉扯，坠入了一片黑暗的深渊。\n\n在这片黑暗中，他看到了无数游离的光点——那是血脉的具象化。每一个光点都代表着一种血脉，而他的目标，是找到属于自己的那一个。\n\n时间仿佛过去了很久，又像是只过了一瞬。\n\n突然，一道微弱的光芒吸引了他的注意。\n\n那是一道黑色的光芒，极其微弱，像是风中的烛火，随时都可能熄灭。\n\n这就是……他的血脉？\n\n林恩想要靠近看清楚，但那道黑光似乎在排斥他，总是与他保持着一定的距离。\n\n"不可能……"\n\n一个震惊的声音在耳边响起。\n\n林恩睁开眼，发现自己依然站在血脉石前。而周围的长老们，正用一种不可思议的眼神看着他。\n\n"这……这是怎么回事？"林恩有些困惑。\n\n刚才血脉石上……好像闪过了什么？\n\n但是太快了，他根本没看清。\n\n"血脉石……没有反应。"负责记录的长老喃喃道，"这不可能……明明应该有反应的……"\n\n"没有反应？"林恩的心一下子沉到了谷底。\n\n没有反应，意味着他真的是废血脉。\n\n"下一个。"长老不耐烦地挥了挥手。\n\n林恩失魂落魄地走出血脉觉醒室。\n\n门外，伊莲娜正焦急地等待着。看到儿子出来，她急忙迎上前去：\n\n"林恩！怎么样？测试结果……"\n\n林恩看着母亲，突然觉得鼻子一酸。\n\n"娘……"他的声音哽咽，"我……我是废血脉。"\n\n伊莲娜的身体僵住了。\n\n但只是一瞬间，她便恢复了正常。\n\n"废血脉……"她喃喃道，随即苦笑一声，"废血脉就废血脉吧。只要你平平安安的，娘就满足了。"\n\n嘴上这么说，但林恩能看到母亲眼中的失望。\n\n那是一种深入骨髓的绝望。\n\n"娘……"林恩握住母亲的手，"对不起……"\n\n"傻孩子，说什么对不起。"伊莲娜擦去眼角的泪水，"走，我们回家。"\n\n母子俩相互搀扶着，离开了血脉觉醒室。\n\n在他们身后，一道阴冷的目光正远远地注视着他们的背影。\n\n罗恩·夜语。\n\n"废血脉……"他的嘴角浮现出一抹冷笑，"林恩，你的好日子还在后头呢。"\n\n晨光中，血脉石散发着幽幽的光芒。\n\n测试，已经结束。\n\n但命运，才刚刚开始。\n\n---\n\n*字数统计：约2100字*\n\n# 第八章：暗影血脉'},{n:8,t:' 第8章：万众瞩目的测试（上）',c:'天还未亮，整个夜语领地就已经苏醒。\n\n今天是血脉测试的日子——对于夜语家族而言，这是一年一度最重要的仪式之一。\n\n卯时一到，所有未觉醒血脉的族人都必须前往血脉觉醒室进行测试。这是夜语家族延续千年的传统，也是每一个族人生命中最重要的时刻。在这一天，所有人的命运都将被重新书写——或者飞黄腾达，或者坠入深渊。\n\n林恩早早地就起来了。换上母亲准备的干净衣服，他站在镜子前，仔细地整理着仪表。镜中的少年有一头黑色的短发，面容清秀，只是那双眼睛中透着与年龄不符的沉稳与忧郁。作为族长的私生子，他在这个家族中生活了十六年，承受了太多不该承受的东西。\n\n“恩儿，准备好了吗？”伊莲娜的声音从门外传来。\n\n“准备好了，娘。”林恩深吸一口气，打开房门。\n\n伊莲娜今天也特意打扮了一下。她身穿一袭白色的长裙，银白色的长发披散在肩上，整个人看起来就像是从画中走出的精灵。只是那绝美的容颜上，带着难以掩饰的担忧。\n\n“走吧。”伊莲娜握住儿子的手，“不管结果如何，娘都会在你身边。”\n\n母子俩离开了居住的小院，沿着石板路向血脉觉醒室的方向走去。清晨的空气带着些许凉意，街道两旁的店铺才刚刚开门，一些小贩正在整理着货物。\n\n“娘，我有点紧张。”林恩低声说道。\n\n“紧张是正常的。”伊莲娜安慰道，“当年娘进行血脉测试的时候，也紧张得说不出话来。”\n\n“娘当年是什么结果？”林恩好奇问道。\n\n伊莲娜的脚步顿了一下，然后若无其事地说道：“娘是风语家族的血脉，与夜语家族有些不同。具体的，你以后就会知道的。”\n\n林恩敏锐地察觉到母亲不想多谈这个话题识趣地没有再问。\n\n---\n\n【新增-林恩vs二级护卫越级战斗】\n\n就在母子俩快要到达血脉觉醒室的时候，前方突然出现了几个身影。\n\n“哟，这不是林恩少爷吗？”一个阴阳怪气的声音响起。\n\n林恩抬头看去，只见三个家族护卫挡在了路中央。为首的是一个身材高大的中年护卫，他双臂抱胸，脸上挂着戏谑的笑容。\n\n“阿尔杰管家有令，”护卫头目冷笑道，“私生子没有资格从正门进入血脉觉醒室。让开路，从侧门走。”\n\n林恩的眼神冷了下来。血脉觉醒室只有一个入口，所谓侧门不过是通往杂役通道的小门。护卫的意思很明显——要他像下人一样从后门进去。\n\n“如果我说不呢？”林恩淡淡地说道。\n\n“那可由不得你。”护卫头目朝另外两人使了个眼色，“把他给我押过去！”\n\n两个护卫立刻朝林恩走来。他们的动作干净利落，显然是训练有素的战士。\n\n视觉：两个护卫的手掌在晨光中投下阴影，铁钳般的大手朝林恩肩膀抓来\n听觉：沉重的脚步声，铠甲铿锵\n触觉：危险的气息让皮肤微微发麻\n\n林恩没有动。\n\n“林恩！”伊莲娜惊呼，想要冲上来保护儿子。\n\n“娘，没事的。”林恩轻声说道，然后猛然出手！\n\n没人看清他是怎么动作的。\n\n只是一瞬间，两个护卫的手腕就被林恩扣住。紧接着，他们整个人就被甩飞出去，重重地撞在路边的石墙上。\n\n“砰！砰！”\n\n两声闷响，两个护卫竟然被一个看起来瘦弱的少年一击秒杀！\n\n护卫头目脸色大变。他终于意识到，自己严重低估了这个“废血脉”私生子。\n\n“你……你做了什么？！”护卫头目声音有些发抖。\n\n林恩没有回答，而是缓步朝他走来。\n\n“二级血脉战士？”林恩冷笑一声，“刚才那一下，我只用了三分力。”\n\n这当然是虚张声势。但效果很明显——护卫头目不自觉地后退了一步。\n\n“滚。”林恩吐出一个字。\n\n护卫头目咬了咬牙，最终还是转身跑了。他要去向管家报告，这个私生子，比想象中要危险得多。\n\n“林恩……”伊莲娜担忧地看着儿子，“你刚才……”\n\n“娘，我没事。”林恩握住母亲的手，“走吧，去血脉觉醒室。”\n\n母子俩继续向前走去。\n\n但林恩知道，从这一刻起，他再也没有退路了。\n\n刚才的战斗虽然短暂，但他已经暴露了自己的实力。接下来等待他的，将是更多的挑战和危机。\n\n但那又如何？\n\n他不再是那个任人欺凌的废物了。\n\n他是暗影血脉的拥有者。\n\n他是……克雷蒙特的后裔！\n\n---\n\n血脉觉醒室位于城堡的东北角，是一栋独立的石质建筑。这座建筑已经有数百年的历史，墙壁上布满了岁月的痕迹。当林恩和伊莲娜赶到的时候，觉醒室外的广场上已经聚集了不少人。\n\n林恩粗略地扫了一眼，至少有上百人。这些都是今天要进行测试的族人，其中大部分是十六七岁的少年少女，也有少数年龄更大的——那是一些多次测试未成功，试图再次觉醒的族人。\n\n广场被划分为三个区域：测试区、观礼区和待测区。待测区的族人们按顺序排成队列，每个人的脸上都带着紧张的表情。有的在默默祈祷，有的在做深呼吸，还有的在心中回忆着家族的血脉典籍。\n\n观礼区也站满了人——这些都是已经觉醒血脉的族人，他们今天是来见证后辈们的测试的。其中不乏一些年轻俊杰，他们优越感十足地打量着待测区的少年们，仿佛在看一群待宰的羔羊。\n\n广场中央搭建了一个临时的观礼台，上面坐着家族的几位长老。最中间的位置空着，看来是留给大长老的。长老们身着黑色的长袍，胸口绣着家族的家徽——一个由阴影组成的狼头。\n\n“大长老到！”突然，一声高喝响起。\n\n众人循声望去，只见一队人从城堡的方向走来。为首的是一位白发苍苍的老者，他身披黑色长袍，手持一根乌黑的手杖，整个人散发着一股威严的气息。这位老者的脸上布满皱纹，但那双眼眸却明亮有神，仿佛能看透人心。\n\n“大长老！”有人惊呼出声。\n\n大长老夜枭·夜语，是夜语家族资历最老的长老，据说已经活了一百多岁，经历了四代族长的更替。他不仅是家族的长老，更是血脉检测方面的权威，由他主持测试，可见家族对这一次测试的重视程度。\n\n在夜语家族的历史上，大长老亲自主持血脉测试的次数不超过十次。每次大长老主持，都意味着有重要的事情发生。\n\n“大长老已经二十多年没有主持过测试了吧？”\n\n“上一次好像是我父亲那一代。”\n\n“这一次到底是怎么回事？”\n\n“不知道，也许是因为今年有几个资质不错的后辈吧。”\n\n族人们低声议论着，猜测着大长老亲自出山的原因。\n\n大长老走到观礼台前，环顾四周。被他目光扫到的人，都不自觉地低下了头。那种威压，不是普通人能够承受的。\n\n“人到齐了吗？”大长老的声音不大，却清晰地传遍整个广场，仿佛在每个人耳边响起。\n\n“回大长老，应到一百二十三人，实到一百二十三人。”旁边的主持人员恭敬地回答道。这是一位中年执事，负责家族的日常事务。\n\n“好。”大长老微微点头，“开始吧。”\n\n他走上观礼台，在最中间的位置坐下。其他的的长老也纷纷入座，整个广场的气氛变得严肃起来。\n\n“首先，请测试的族人按顺序排好队。”主持人的声音响起，“念到名字的人，上前进行测试。每人测试时间为三分钟，超过时间视为放弃。测试过程中不得喧哗，违者取消测试资格。”\n\n待测区的族人们按照事先安排好的顺序排成了一列长队。林恩因为是私生子的身份，被安排在队伍的最末尾。这意味着他要等很长的时间，才能轮到自己。\n\n这种安排让林恩心中有些不爽，但他知道，这是家族的一贯做法——私生子的地位甚至不如一个受宠的仆人。\n\n“第一个，夜风·夜语！”\n\n一个身材瘦削的少年走出队伍。他大约十七岁，长相普通，但那双眼睛中透着自信。夜风是家族旁系子弟，父亲是家族执事，在家族中有一定的地位。\n\n夜风深吸一口气，迈着坚定的步伐来到觉醒室门前。他回头看了一眼观礼区的父母，然后毅然推门走了进去。\n\n广场上的人们伸长了脖子，想要看清里面的情况。但是血脉觉醒室的门窗都拉着厚厚的帘子，根本看不到里面的情形。\n\n大约三分钟后，门打开了。夜风从里面走出来，他的脸上带着难以抑制的兴奋。\n\n“夜风·夜语，血脉觉醒——中品毒蛇血脉！”\n\n“哗——”\n\n整个广场瞬间炸开了锅。\n\n“中品！第一个就是中品！”\n\n“毒蛇血脉！这是家族最强的血脉之一啊！”\n\n“不愧是正统嫡系，一觉醒就是中品！”\n\n“中品毒蛇血脉，攻击力至少是下品的三倍！”\n\n【血脉战力参考】\n- 下品毒蛇血脉（1级初期）\n- 中品毒蛇血脉（1级中期）\n- 上品毒蛇血脉（1级巅峰）\n\n夜风家族的方向响起一片欢呼声。夜风的父亲更是激动得热泪盈眶，他的儿子为家族争光了！\n\n在血脉测试中，中品血脉已经是非常出色的存在。历年来，能够觉醒中品血脉的族人，平均每三年才出一个。\n\n夜风享受着众人羡慕的目光，他挺直腰板走回观礼区，接受着族人们的道贺。\n\n“下一个，夜兰·夜语！”\n\n这是一个看起来颇为腼腆的少女，大约十六岁。她是家族旁系的女儿，性格内向，不太爱说话。\n\n夜兰走进觉醒室的时间比夜风还要短。很快，门打开了。\n\n“夜兰·夜语，血脉觉醒——下品藤蔓血脉！”\n\n“下品啊……虽然不如中品，但也不错。”\n\n“藤蔓血脉攻击力不强，但辅助能力还可以。”\n\n“可惜了，如果觉醒了毒蛇血脉或者烈焰血脉就好了。”\n\n那少女倒是没有表现出太失望的表情，只是默默地点了点头，退到了一旁。对于她来说，能够觉醒血脉就已经是最好的结果了。\n\n测试一个接一个地进行。有人成功觉醒，有人失败。有人兴奋得大笑，有人沮丧得落泪。\n\n“夜星·夜语，血脉觉醒——下品疾风血脉！”\n\n“夜明·夜语，无血脉！”\n\n“无血脉……又一个废物。”\n\n“连续三年测试都是无血脉，这辈子是没希望了。”\n\n类似这样的对话在广场上不断响起。成功的族人得到族人的祝贺，失败的族人则被无情地嘲讽。这就是血脉派世界的残酷现实——没有血脉，就没有任何地位。\n\n林恩站在队伍末尾，看着一个又一个族人进行测试，心情变得越来越紧张。\n\n他的手掌不自觉地握紧，指甲陷入了掌心。\n\n“下一个，夜星·夜语！”\n\n一个看起来颇为稳重的少年走出队伍。这个人是旁系子弟，在家族中的地位不高不低。\n\n时间一分一秒地过去，大约五分钟后，门打开了。\n\n“夜星·夜语，血脉觉醒——下品疾风血脉！”\n\n“又是下品！”\n\n“疾风血脉虽然只是下品，但速度型的血脉价值不错。”\n\n那少年明显松了一口气显然对这个结果还算满意。他走回观礼区，接受着少数几个族人的祝贺。\n\n---\n\n测试持续进行，大约过了一个小时后，终于轮到了罗恩·夜语。\n\n“罗恩·夜语！”\n\n当这个名字响起的时候，整个广场的气氛瞬间变得不同了。\n\n“罗恩少爷！”\n\n“他就是嫡系的那个天才吗？”\n\n“听说他在十二岁那年就差点觉醒了，这次应该没问题吧？”\n\n“废话，罗恩少爷可是族长的侄子，岂是那些旁系废物能比的？”\n\n在一片议论声中，罗恩昂首挺胸地走出队伍。他今天特意穿了一身红色的劲装，看起来英姿勃发。那头金色的短发在阳光下闪闪发光，配上他那俊美的面容，简直就是少女们心目中的白马王子。\n\n在经过林恩身边的时候，罗恩特意停下了脚步。\n\n“哟，林恩弟弟。”罗恩脸上带着虚伪的笑容，“很快就到你了，害怕吗？”\n\n林恩淡淡地看了他一眼：“不劳罗恩哥哥费心。”\n\n“嘴硬。”罗恩冷笑一声，“放心，我会看着你的。好好享受这最后的时光吧，废物。毕竟过了今天，你可能连站在这里的资格都没有了。”\n\n他不再理会林恩，大步流星地走进了觉醒室。\n\n广场上，所有人的目光都集中在那扇门上。包括几位长老，也包括观礼台上的大长老。\n\n时间一分一秒地过去。\n\n一分钟……\n\n两分钟……\n\n三分钟……\n\n门依然没有打开。\n\n“怎么回事？”有人低声议论。\n\n“罗恩少爷进去了这么久，会不会觉醒成功了？”\n\n“有可能！像罗恩少爷这样的天才，觉醒时间肯定会更长！”\n\n就在众人议论纷纷的时候，突然，觉醒室内爆发出一道耀眼的光芒！\n\n那道光芒呈现出深绿色，在场的大部分族人都感受到了一股阴冷的气息。那种感觉，就像是一条毒蛇在背后盯着自己，让人毛骨悚然。\n\n“天哪！那是……”\n\n“好强大的气息！”\n\n“这就是毒蛇血脉的力量吗？”\n\n“不亏是嫡系的天才！”\n\n终于，门打开了。罗恩从里面走出来，他的脸上带着自信的笑容。在他的身体周围，隐约可以看到黑色的蛇影在盘旋，那是血脉之力外放的表现。\n\n“罗恩·夜语，血脉觉醒——中品毒蛇血脉！”\n\n整个广场瞬间沸腾了！\n\n“中品！又是中品！而且还是毒蛇血脉！”\n\n“攻击力最强的血脉之一！”\n\n“罗恩少爷太厉害了！”\n\n“天佑我夜语家族！”\n\n【罗恩血脉数据】\n姓名：罗恩·夜语\n血脉：中品毒蛇血脉\n觉醒等级：1级中期\n能力：毒液喷射、蛇影攻击、感知强化\n\n罗恩享受着众人羡慕的目光，他故意从林恩面前经过，用只有两人能听到的声音说道：“看到了吗？这才是真正的血脉。你这种废物，一辈子都不可能达到这种高度。”\n\n林恩没有说话，只是默默地看着罗恩走远。\n\n但他的心中，却燃起了一团火。\n\n那是被屈辱和不甘点燃的火焰。\n\n---\n\n测试继续进行。\n\n在罗恩之后，又测试了十几个人。其中成功的只有三四个，而且都是下品血脉。大部分人都是失败，有的甚至是连续好几年都来测试，却始终无法觉醒。\n\n时间一分一秒地过去，太阳逐渐升高。\n\n很快，最后一个测试者——林恩·夜语，被叫到了名字。\n\n“最后一个，林恩·夜语！”\n\n当这个名字响起的时候，众人的目光齐刷刷地看向队列末尾的那个少年。\n\n“他就是那个私生子？”\n\n“听说他母亲是精灵族的边缘人。”\n\n“又一个来丢人的。”\n\n“可惜了一张脸，估计也是个废物。”\n\n“听说他连血脉都没有觉醒过，每次测试都是毫无反应。”\n\n各种议论声传入耳中，林恩却仿佛没有听到。他深吸一口气，迈步向觉醒室走去。\n\n伊莲娜看着儿子的背影，双手不自觉地握紧。\n\n“恩儿……”她在心中默默祈祷，“一定要没事。”\n\n在周围那些复杂的目光中，林恩推开了觉醒室的大门。\n\n\n\n房间内的光线有些昏暗，四周的墙壁上点燃着幽幽的烛火。在房间的正中央，矗立着一块巨大的石碑——血脉石。\n\n这块血脉石足有三米高\n\n“将手放在血脉石上。”大长老的声音响起，“然后输入你体内的魔力。记住，不要勉强，如果感到不适就立即停止。”\n\n“是。”林恩应了一声。\n\n他伸出右手，轻轻地放在血脉石上。\n\n入手是一阵冰凉的感觉。\n\n林恩深吸一口气，尝试着将体内的魔力输入血脉石。\n\n一分钟过去了。\n\n血脉石没有任何反应。\n\n林恩咬紧牙关，加大了魔力的输出。\n\n两分钟过去了。\n\n血脉石依然没有任何变化。\n\n广场上，通过一面巨大的魔法镜子观看着测试过程的族人们，开始发出各种嘲讽的声音。\n\n“果然是废物。”\n\n“浪费大家的时间。”\n\n“还不赶紧滚下来？”\n\n觉醒室内，大长老的眉头也皱了起来。\n\n“小子，可以了。”大长老说道，“你没有血脉缘分，下来吧。”\n\n但是林恩却仿佛没有听到一般，依然坚持着。\n\n他想起了母亲期盼的眼神，想起了这些年的屈辱，想起了罗恩嘲讽的话语。\n\n不！\n\n他不能放弃！\n\n林恩在心中怒吼，体内的魔力不要命地向血脉石中输入。\n\n就在这个时候，变故发生了！\n\n原本毫无反应的血脉石，突然开始震颤起来。\n\n“嗯？”大长老的眼睛亮了一下。\n\n紧接着，血脉石上的纹路开始发出微弱的光芒。那光芒很淡，淡到几乎看不见。\n\n但是紧接着，那光芒开始变得强烈起来！\n\n赤！\n\n橙！\n\n黄！\n\n绿！\n\n青！\n\n蓝！\n\n紫！\n\n七种颜色在血脉石上轮转，仿佛彩虹一般绚烂！\n\n大长老腾地一下站了起来，脸上露出了震惊的表情。\n\n“这……这是……”\n\n就在众人惊讶的时候，血脉石的光芒突然急剧收缩，最后汇聚成一点——黑色。\n\n【暗影血脉觉醒！】\n\n纯粹的黑色。\n\n然后，那黑色开始扩散，眨眼间就覆盖了整个血脉石。\n\n【暗影血脉数据】\n名称：暗影血脉（变异级，古老传承）\n等级：1级巅峰（觉醒既巅峰）\n能力：\n  - Shadow Step：短距离瞬移（3米范围）\n  - 暗影箭：暗影伤害（150点）\n  - 暗影之体：速度+30%，力量+20%\n  - 骷髅召唤：可召唤3个骷髅仆从\n  - 亡灵沟通：可与亡灵生物交流\n\n【血脉等级对比】\n普通血脉（如下品）：1级\n\n变异血脉（如暗影血脉）：1级（觉醒即巅峰值）\n\n“咔嚓——”\n\n一声脆响，血脉石的表面竟然出现了裂纹！\n\n“这不可能！”大长老失声惊呼。\n\n就在这时，血脉石突然爆发出一股强大的吸力！\n\n林恩感觉体内的魔力被疯狂地抽取，他想要挣脱，却发现自己的身体已经完全不受控制。\n\n“不……不要……”\n\n他想要求救，但已经说不出话来。\n\n意识开始模糊，身体的力量正在被抽干。\n\n就在这千钧一发之际，林恩手指上的戒指突然闪过一道光芒。\n\n那光芒很微弱，但却有效地阻止了血脉石的抽取。\n\n林恩趁机脱离的血脉石的控制，一屁股跌坐在地上，大口大口地喘着粗气。\n\n而血脉石，则在失去了目标之后，光芒迅速黯淡下去，最终恢复了平静。\n\n只是那块原本完整的血脉石，此时已经布满了裂纹，仿佛随时都会碎裂。\n\n整个觉醒室内一片寂静。\n\n大长老看着那块报废的血脉石，又看看地上狼狈的林恩，脸上的表情复杂到了极点。\n\n“怎么回事？”他沉声问道。\n\n“大长老……”林恩想要解释，却发现自己的声音沙哑得厉害。\n\n“刚才那是……”大长老正想追问，突然，觉醒室的门被人推开了。\n\n“发生什么事了？”罗恩带着几个护卫闯了进来。\n\n他本来是打算来看林恩笑话的，但看到室内的情景后，脸上的笑容瞬间僵住了。\n\n“这……这是怎么回事？”\n\n大长老没有回答，只是默默地看着那块报废的血脉石。\n\n过了良久，他才缓缓开口：“这次测试……到此为止。”\n\n“到此为止？”罗恩难以置信，“可是还有很多人没测试啊！”\n\n“这次的测试结果，已经很明显了。”大长老淡淡地说道，“所有测试结果为无血脉的族人，全部记录在案。现在，都散了吧。”\n\n说完，他不再理会众人，径自离开了觉醒室。\n\n其他长老也纷纷起身离开，留下了一脸茫然的族人们。\n\n“到底发生什么事了？”\n\n“血脉石怎么变成那样了？”\n\n“那个私生子到底做了什么？”\n\n各种议论声在广场上响起。\n\n林恩在伊莲娜的搀扶下走出觉醒室的时候迎接他的，是无数道复杂的目光。\n\n有惊讶。\n\n有疑惑。\n\n有恐惧。\n\n也有……仇恨。\n\n罗恩站在不远处，看着林恩被母亲扶着的狼狈模样，眼中闪过一丝阴冷。\n\n“林恩……”他在心中暗暗发誓，“别以为这样就能翻身。我会让你后悔活在这个世界上！”\n\n这场血脉测试，最终以一种谁也没有想到的方式落下了帷幕。\n\n而林恩的命运，也从这一刻开始，发生了翻天覆地的变化。\n\n---\n\n夜，城堡的某个密室内。\n\n大长老夜枭坐在主位上，下面站着几个家族的高层。\n\n“那块血脉石，彻底报废了。”二长老沉声说道，“损失超过十万金币。”\n\n“十万金币是小问题。”大长老摆摆手，“那块血脉石跟随家族千年，从来没有出现过这种情况。刚才那个孩子……到底是怎么回事？”\n\n“大长老，”三长老犹豫了一下，“我怀疑……那个孩子体内的血脉，可能不是我们已知的那种。”\n\n“什么意思？”\n\n“我的意思是……”三长老深吸一口气，“也许他觉醒的，是某种变异血脉，或者……更加古老强大的血脉。”\n\n此言一出，在场的所有人都倒吸一口凉气。\n\n变异血脉，那可是百年难遇的存在。\n\n而更加古老强大的血脉……那意味着什么，他们心里很清楚。\n\n“如果我没看错的话，”大长老缓缓开口，“刚才血脉石显示的颜色……是黑色。”\n\n“黑色？！”众人惊呼。\n\n“不错。”大长老点头，“七色轮转，最终归于黑暗。这种情况，我在一本古老的典籍中看到过。”\n\n“大长老，那是什么血脉？”\n\n大长老沉默了片刻，最后吐出两个字：“暗影。”\n\n暗影血脉！\n\n那是比毒蛇血脉更加古老、更加稀有的存在！\n\n【暗影血脉品级】\n品级：变异超品（古籍记载中最强血脉之一）\n稀有度：千年一遇\n\n相传，暗影血脉的拥有者，能够操控阴影之力，甚至能够沟通亡灵！\n\n【血脉进化路线】\n暗影血脉→暗影领主→阴影主宰→死神代言人\n\n如果这个消息传出去，整个夜语家族，甚至整个血脉派，都会为之震动！\n\n“这件事，必须保密。”大长老站起身来，“在搞清楚那个孩子的真正血脉之前，任何人不得向外透露今天发生的事情。违者，家法处置！”\n\n“是！”众人齐声应道。\n\n大长老走到窗边，看着外面的夜空，眼神深邃。\n\n“也许……”他喃喃自语，“夜语家族沉寂千年，终于要崛起了。”'},{n:9,t:' 《阴影纪元》第9-11章',c:'---\n\n## 第9章：血脉测试仪式（下）- 废血脉的宣判\n\n### 超长章 7650字\n\n阳光透过测试广场四周的火把，洒落在那块一人高的血脉石上。深灰色的石面上，那些神秘的血色纹路如同血管一般微微搏动，仿佛沉睡的远古巨兽正在苏醒。\n\n广场周围已经围满了夜语家族的族人。他们交头接耳，窃窃私语，目光不时投向站在测试台下的林恩·夜语。十六岁的少年穿着一件洗得发白的灰色长袍，黑色的短发略显凌乱，那双深邃的眼眸中带着一丝紧张与期待。\n\n今天是血脉测试的日子。\n\n整个夜语家族，所有年满十六岁的年轻族人，都必须接受血脉觉醒的测试。这是自夜语家族建族以来延续千年的传统——只有觉醒血脉之力的人，才能真正继承夜语家族的荣耀，成为家族的中坚力量。\n\n而林恩，这个被遗忘在家族角落的私生子，今天也站在了这里。\n\n“下一个，林恩·夜语。”\n\n测试官那低沉的声音在广场上回荡，如同重锤一般敲击在林恩的心头。他深吸一口气，迈步走向血脉石。\n\n周围的目光瞬间集中在他身上。那些目光中有好奇，有同情，更多的则是冷漠与轻蔑。作为族长的私生子，林恩从小就在家族的最底层挣扎求生。他没有显赫的身份，没有优渥的资源，甚至连基本的修炼资源都得不到保障。\n\n但他从未放弃。\n\n林恩走到血脉石前，抬起头，仔细打量着这块传说中的奇石。血脉石高约一米五，通体呈深灰色，表面布满玄奥的纹路。这些纹路呈暗红色，如同人体内的血管一般，散发着微弱的光芒。\n\n根据族中的记载，血脉石能够检测出一个人的血脉浓度与天赋等级。血脉浓度越高，血脉石的反应就越强烈，觉醒的成功率也就越高。\n\n“将手放在血脉石上，注入你的魔力。”测试官的声音响起，“记住，不要有任何保留。”\n\n林恩点点头，缓缓伸出右手。他的手指修长有力，指节分明，手掌带着一层薄薄的茧——那是多年修炼基础冥想术后留下的痕迹。\n\n当他的手掌接触到血脉石的瞬间，一种奇异的感觉传来。血脉石表面传来淡淡的温热，那些暗红色的纹路似乎微微亮了一下。\n\n林恩闭上眼睛，开始按照族中传授的方法，将体内的魔力注入血脉石。\n\n魔力是他这十年来修炼的唯一成果。虽然因为没有觉醒血脉，他无法真正踏上修炼之路，但通过基础的冥想术，他至少积累了一些魔力。虽然这些魔力薄弱得可怜，但足以进行最基本的血脉测试。\n\n体内的魔力如同涓涓细流，顺着他的手臂流向手掌，然后注入血脉石中。\n\n一秒、两秒、三秒……\n\n时间仿佛在这一刻静止。\n\n林恩能够感觉到，自己的魔力正在被血脉石缓慢吸收。然而，让他感到不安的是，血脉石除了最初那一丝微弱的反应之外，便再也没有任何变化。\n\n那些暗红色的纹路，依然保持着原来的样子，没有变得更亮，也没有显示出任何特殊的纹路。\n\n“怎么回事？”林恩心中涌起一丝不安。他加大了魔力的输出，将体内仅存的所有魔力都注入血脉石中。\n\n然而，血脉石依然没有任何反应。\n\n广场上的人群开始窃窃私语。\n\n“这是怎么回事？”\n\n“血脉石怎么没有反应？”\n\n“难道是血脉石坏了？”\n\n测试官的眉头也皱了起来。作为主持血脉测试多年的老测试官，他还从来没有遇到过这种情况。通常情况下，血脉石会在测试者注入魔力的瞬间产生反应——无论是被测试者的血脉浓度高还是低，血脉石都会有所表示。\n\n像现在这样毫无反应的情况，只有一种可能。\n\n“安静！”测试官举起手，广场上的议论声渐渐平息。他看向林恩，目光中带着一丝复杂，“林恩少爷，请继续注入魔力。”\n\n林恩咬紧牙关，将体内最后一滴魔力都挤压出来。然而，血脉石依然如同死物一般，没有任何反应。\n\n终于，当体内再也挤不出一丝魔力时，林恩只能无奈地收回手掌。他看向测试官，眼中带着一丝期待：“大人，这是怎么回事？”\n\n测试官没有回答。他绕着血脉石走了一圈，仔细检查了一遍，然后回到原位，宣布道：“血脉石无反应——测试结果，废血脉。”\n\n废血脉。\n\n这三个字如同三道惊雷，在林恩的脑海中炸响。他的身体晃了晃，几乎站立不稳。\n\n废血脉，意味着他的体内根本没有觉醒血脉的可能。这意味着他终其一生，都只能是一个无法修炼的普通人。在这个以血脉为尊的世界里，废血脉甚至比最低等的血脉都不如。\n\n最低等的血脉，至少还有一丝觉醒的可能。而废血脉，则彻底断绝了一切希望。\n\n“不可能……”林恩喃喃自语，“这不可能……”\n\n然而，事实就摆在眼前。血脉石依然没有任何反应，这已经说明了一切。\n\n广场上爆发出一阵喧哗。\n\n“废血脉？真的是废血脉？”\n\n“哈哈哈，我就知道！这个私生子怎么可能有觉醒的机会！”\n\n“真是给我们夜语家族丢脸！”\n\n各种嘲讽、讥笑的声音如同潮水般涌来，将林恩淹没。这些声音虽然不大，却清晰地传入他的耳中，每一个字都如同利刃一般切割着他的心。\n\n他想要反驳，想要呐喊，想要证明自己不是废血脉。然而，事实摆在眼前，他无从辩驳。\n\n“安静！”测试官再次举起手，广场上的声音渐渐平息。他看向林恩，目光中带着一丝同情，但更多的则是冷漠，“林恩少爷，按照族规，废血脉者无法参加后续的觉醒仪式。你可以离开了。”\n\n可以离开了。\n\n林恩浑浑噩噩地转过身，朝着测试台下方走去。他的脚步虚浮，仿佛踩在棉花上一般。每一步都像是用尽了全身的力气。\n\n然而，就在他即将走下测试台的时候，一个冰冷的声音突然响起。\n\n“慢着。”\n\n林恩的脚步一顿。他抬起头，看到一个身穿华丽锦袍的年轻男子正朝着测试台走来。男子大约十八九岁，长相俊美，但脸上带着一抹傲然与阴冷。他的身后还跟着几个狗腿子模样的年轻族人。\n\n罗恩·夜语。\n\n族长的嫡子，夜语家族真正的继承者。\n\n整个夜语家族年轻一代中最杰出的天才，早在两年前就成功觉醒了血脉，如今已经是一名1级暗影血脉。\n\n“罗恩少爷。”测试官微微躬身，表示敬意。\n\n罗恩没有理会测试官。他直径走到林恩面前，上下打量了几眼，然后露出一丝冷笑：“这就是我们夜语家族的私生子？真是闻名不如见面。”\n\n林恩握紧拳头，却没有说话。他知道，现在说什么都没有用。\n\n“废血脉啊。”罗恩故意提高了音量，让周围的人都能听到，“真是给我们夜语家族长脸。一个废血脉，也配站在这个测试台上？”\n\n周围的族人发出一阵哄笑。\n\n林恩咬紧牙关，强忍着心中的愤怒。他知道，自己不是罗恩的对手。如果在这里动手，只会被羞辱得更惨。\n\n“怎么？不服气？”罗恩注意到了林恩的表情变化，“就你这种废材，也配不服气？也不撒泡尿照照自己是什么德行！”\n\n“罗恩少爷。”就在这时，一个清脆的声音响起，“测试还没有结束，请您不要打扰测试的正常进行。”\n\n罗恩转过头，看到一个身穿白色祭司长袍的中年女子正朝着这边走来。女子大约三十多岁，容貌秀美，气质温婉，但此刻她的脸上带着一丝怒容。\n\n伊莲娜·风语。\n\n月神祭司一脉的逃亡者，同时也是林恩的亲生母亲。\n\n“原来是伊莲娜夫人。”罗恩冷笑一声，“怎么，您也想为您的儿子出头？”\n\n“测试结果已经出来了。”伊莲娜走到林恩身边，轻轻握住他的手，“林恩，我们走。”\n\n“走？”罗恩却是挡在了两人面前，“怎么，测试失败就想走？没那么容易吧？”\n\n“你想怎么样？”伊莲娜的声音变得冰冷。\n\n“不怎么样。”罗恩笑了笑，“只是觉得，像这种废材，既然测试失败，就应该有点表示。比如……给我们夜语家族磕几个头，道个歉？”\n\n“你！”伊莲娜的脸色瞬间变得铁青。\n\n周围的族人也是一阵哗然。虽然他们也看不起林恩这个私生子，但让林恩当众磕头道歉，这确实是太过分了。\n\n“怎么？不愿意？”罗恩的笑容变得阴冷，“或者说，您想代替您的儿子？”\n\n伊莲娜咬紧牙关。她知道，罗恩这是在故意羞辱他们母子。但如果她不照做的话，以罗恩的性格，还不知道会做出什么事来。\n\n就在她犹豫的时候，林恩突然开口了。\n\n“母亲，不用求他。”\n\n伊莲娜愣了一下，转头看向林恩。她看到自己儿子的脸上已经没有刚才的慌乱与无措，取而代之的是一种冷静得可怕的表情。\n\n“林恩……”\n\n“走吧。”林恩握住母亲的手，“我们回家。”\n\n罗恩脸色一沉：“我让你走了吗？”\n\n“测试已经结束。”林恩抬起头，直视罗恩的眼睛，“按照族规，我有权离开。”\n\n“族规？”罗恩冷笑，“在夜语家族，我的话就是族规！”\n\n“是吗？”\n\n林恩的语气很平静，但不知为何，在场的所有人都感觉到了一种异样的气氛。\n\n“怎么？你还想反抗？”罗恩嗤笑一声，“就你这种废材，我一根手指就能捏死你！”\n\n“那你可以试试。”林恩依然平静。\n\n罗恩的眼睛微微眯起。他没想到，这个平时连话都不敢多说的私生子，今天居然敢反抗自己。\n\n“好，很好。”罗恩的笑容变得狰狞，“既然你自己找死，那就别怪我不客气了！”\n\n话音刚落，罗恩身上突然涌出一股强大的气息。这是血脉觉醒者的威压，虽然他只觉醒了两成血脉，但这股威压也不是普通人能够承受的。\n\n林恩感觉自己的身体像是被一座大山压住，几乎喘不过气来。他的膝盖微微弯曲，几乎要跪倒在地。\n\n但他咬牙硬撑住了。\n\n“还挺硬气。”罗恩冷笑一声，加大了威压的力度。\n\n林恩闷哼一声，嘴角溢出一丝鲜血。但他的身体依然挺立，没有倒下。\n\n“林恩！”伊莲娜惊呼一声，想要冲上去，但被罗恩的手下拦住了。\n\n“母亲，我没事。”林恩咬着牙说道。他的脸上已经没有了血色，额头上青筋暴起，显得十分痛苦。\n\n“还不肯求饶？”罗恩冷笑，“真是敬酒不吃吃罚酒！”\n\n他抬起手，准备给林恩最后一击。\n\n然而就在这时，一个冰冷的声音突然响起。\n\n“罗恩，住手。”\n\n这个声音虽然不大，但却带着一种不容置疑的威严。众人循声望去，只见一个身穿黑色长袍的中年男子正朝着测试台走来。\n\n男子大约四十多岁，国字脸，浓眉大眼，留着短须。他的身上穿着一件绣有暗金色花纹的黑色长袍，这是夜语家族族长的专属服饰。\n\n布隆·夜语。\n\n夜语家族的当代族长，同时也是林恩的亲生父亲。\n\n“父亲大人。”罗恩收回手，微微躬身。其他族人也是纷纷行礼。\n\n布隆没有理会众人。他走到测试台前，看了一眼林恩，然后对测试官说道：“测试结果如何？”\n\n“回禀族长。”测试官恭敬地回答道，“林恩少爷的测试结果是……废血脉。”\n\n布隆的表情没有任何变化。他点了点头，然后转身看向林恩。\n\n林恩也看着自己的父亲。这是他记事以来，第一次如此近距离地接触自己的父亲。然而，他从这个男人眼中看到的，只有冷漠。\n\n“测试已经结束。”布隆淡淡地说道，“你退下吧。”\n\n退下吧。\n\n多么简单的三个字。没有安慰，没有鼓励，甚至连一丝多余的情绪都没有。\n\n林恩感觉自己的心仿佛被冻结了。这就是他的父亲，这就是他一直期待着能够认可自己的父亲。\n\n然而，这个男人甚至连多看他一眼都不愿意。\n\n“族长……”伊莲娜想要说什么，但被布隆打断了。\n\n“测试已经结束。”布隆转过身，准备离开，“最近家族事务繁忙，没事不要来打扰我。”\n\n说完，他便头也不回地离开了。\n\n广场上的族人们看着这场闹剧，开始低声议论。\n\n“看来族长根本不重视这个私生子。”\n\n“那是当然，一个废血脉而已，有什么值得重视的？”\n\n“真是可怜的母亲和孩子……”\n\n各种议论声传入耳中，林恩却仿佛失去了所有感觉。他只是愣愣地站在原地，看着父亲远去的背影。\n\n“林恩，我们走。”伊莲娜走过来，轻轻扶住自己的儿子。\n\n林恩木然地点点头，任由母亲拉着他离开。\n\n然而就在这时，罗恩的声音再次响起。\n\n“慢着。”\n\n林恩和伊莲娜的脚步一顿。\n\n罗恩脸上带着戏谑的笑容，缓步走到两人面前。他看了一眼伊莲娜，然后对林恩说道：“今天是你的幸运日。看在你母亲的份上，我就饶你一次
