<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>墨言 - 虚拟形象</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a0a2a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0f0;
      overflow: hidden;
    }
    
    #avatar-container {
      position: relative;
      width: 400px;
      height: 400px;
      margin-bottom: 40px;
    }
    
    #avatar-canvas {
      width: 100%;
      height: 100%;
    }
    
    .status-text {
      font-size: 18px;
      color: #8888aa;
      margin-bottom: 30px;
      transition: all 0.3s ease;
    }
    
    .status-text.active {
      color: #a0a0ff;
      text-shadow: 0 0 10px rgba(100, 100, 255, 0.5);
    }
    
    .controls {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 600px;
    }
    
    .control-btn {
      padding: 12px 24px;
      border: 1px solid rgba(100, 120, 200, 0.3);
      background: rgba(30, 30, 60, 0.6);
      color: #c0c0e0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }
    
    .control-btn:hover {
      background: rgba(50, 50, 100, 0.8);
      border-color: rgba(100, 120, 200, 0.6);
      transform: translateY(-2px);
    }
    
    .control-btn.active {
      background: rgba(60, 60, 140, 0.8);
      border-color: rgba(120, 140, 255, 0.8);
      color: #ffffff;
      box-shadow: 0 0 20px rgba(100, 100, 255, 0.3);
    }
    
    .info {
      position: fixed;
      bottom: 20px;
      font-size: 12px;
      color: #6666888;
    }
  </style>
</head>
<body>
  <div id="avatar-container">
    <canvas id="avatar-canvas"></canvas>
  </div>
  
  <div class="status-text" id="status-text">待机中</div>
  
  <div class="controls">
    <button class="control-btn active" data-state="idle">💤 待机</button>
    <button class="control-btn" data-state="speaking">💬 说话</button>
    <button class="control-btn" data-state="thinking">💭 思考</button>
    <button class="control-btn" data-state="happy">✨ 开心</button>
  </div>
  
  <div class="info">墨言 · 虚拟形象 v1.0</div>
  
  <script>
    const canvas = document.getElementById('avatar-canvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('status-text');
    const buttons = document.querySelectorAll('.control-btn');
    
    // 高清画布
    const dpr = window.devicePixelRatio || 1;
    canvas.width = 400 * dpr;
    canvas.height = 400 * dpr;
    ctx.scale(dpr, dpr);
    
    // 状态
    let currentState = 'idle';
    let time = 0;
    let particles = [];
    let speakingPhase = 0;
    let happyPhase = 0;
    
    // 粒子类
    class Particle {
      constructor() {
        this.reset();
      }
      
      reset() {
        const angle = Math.random() * Math.PI * 2;
        const distance = 80 + Math.random() * 60;
        this.x = Math.cos(angle) * distance;
        this.y = Math.sin(angle) * distance;
        this.size = 1 + Math.random() * 3;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = (Math.random() - 0.5) * 0.5;
        this.opacity = 0.3 + Math.random() * 0.5;
        this.life = Math.random();
      }
      
      update(state) {
        this.x += this.speedX;
        this.y += this.speedY;
        this.life += 0.005;
        
        if (state === 'happy') {
          this.speedX *= 1.02;
          this.speedY *= 1.02;
          this.opacity = Math.min(1, this.opacity + 0.02);
        }
        
        const dist = Math.sqrt(this.x * this.x + this.y * this.y);
        if (dist > 180 || dist < 40 || this.life > 1) {
          this.reset();
        }
      }
      
      draw(ctx, state) {
        ctx.beginPath();
        ctx.arc(this.x + 200, this.y + 200, this.size, 0, Math.PI * 2);
        
        let color;
        if (state === 'happy') {
          color = `rgba(180, 200, 255, ${this.opacity})`;
        } else if (state === 'thinking') {
          color = `rgba(100, 140, 200, ${this.opacity * 0.7})`;
        } else {
          color = `rgba(140, 160, 220, ${this.opacity})`;
        }
        
        ctx.fillStyle = color;
        ctx.fill();
      }
    }
    
    // 初始化粒子
    for (let i = 0; i < 30; i++) {
      particles.push(new Particle());
    }
    
    // 绘制光晕
    function drawGlow(x, y, radius, color, intensity) {
      const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
      gradient.addColorStop(0, color);
      gradient.addColorStop(0.4, color.replace('1)', `${intensity * 0.5})`).replace('rgba', 'rgba'));
      gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);
    }
    
    // 主绘制函数
    function draw() {
      ctx.clearRect(0, 0, 400, 400);
      time += 0.016;
      
      const centerX = 200;
      const centerY = 200;
      
      // 根据状态更新参数
      let coreSize = 50;
      let glowSize = 120;
      let glowIntensity = 0.4;
      let particleSpeed = 1;
      
      if (currentState === 'idle') {
        // 待机：柔和呼吸
        coreSize = 50 + Math.sin(time * 2) * 3;
        glowSize = 120 + Math.sin(time * 1.5) * 10;
        glowIntensity = 0.35 + Math.sin(time * 2) * 0.1;
        statusText.textContent = '💤 待机中';
      } else if (currentState === 'speaking') {
        // 说话：闪烁
        speakingPhase += 0.15;
        coreSize = 50 + Math.sin(speakingPhase * 3) * 5;
        glowSize = 120 + Math.sin(speakingPhase * 2) * 15;
        glowIntensity = 0.4 + Math.sin(speakingPhase * 4) * 0.2;
        statusText.textContent = '💬 说话中';
      } else if (currentState === 'thinking') {
        // 思考：缓慢旋转的漩涡
        coreSize = 48 + Math.sin(time * 1.5) * 2;
        glowSize = 115 + Math.sin(time) * 5;
        glowIntensity = 0.35 + Math.sin(time * 0.8) * 0.05;
        statusText.textContent = '💭 思考中';
      } else if (currentState === 'happy') {
        // 开心：扩大+明亮
        happyPhase += 0.05;
        coreSize = 55 + Math.sin(time * 3) * 4;
        glowSize = 140 + Math.sin(time * 2) * 15;
        glowIntensity = 0.5 + Math.sin(time * 2.5) * 0.15;
        statusText.textContent = '✨ 开心';
      }
      
      // 绘制外层光晕
      const gradient1 = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, glowSize);
      if (currentState === 'happy') {
        gradient1.addColorStop(0, 'rgba(180, 200, 255, 0.3)');
        gradient1.addColorStop(0.5, 'rgba(120, 140, 220, 0.15)');
        gradient1.addColorStop(1, 'rgba(60, 80, 180, 0)');
      } else if (currentState === 'thinking') {
        gradient1.addColorStop(0, 'rgba(80, 120, 200, 0.25)');
        gradient1.addColorStop(0.5, 'rgba(60, 90, 180, 0.1)');
        gradient1.addColorStop(1, 'rgba(40, 60, 160, 0)');
      } else {
        gradient1.addColorStop(0, `rgba(100, 120, 200, ${glowIntensity})`);
        gradient1.addColorStop(0.5, `rgba(60, 80, 180, ${glowIntensity * 0.4})`);
        gradient1.addColorStop(1, 'rgba(40, 60, 160, 0)');
      }
      ctx.fillStyle = gradient1;
      ctx.fillRect(0, 0, 400, 400);
      
      // 绘制粒子
      particles.forEach(p => {
        p.update(currentState);
        p.draw(ctx, currentState);
      });
      
      // 绘制中层光晕
      const gradient2 = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, coreSize + 30);
      gradient2.addColorStop(0, 'rgba(80, 100, 200, 0.8)');
      gradient2.addColorStop(0.6, 'rgba(60, 80, 180, 0.4)');
      gradient2.addColorStop(1, 'rgba(40, 60, 160, 0)');
      ctx.fillStyle = gradient2;
      ctx.beginPath();
      ctx.arc(centerX, centerY, coreSize + 30, 0, Math.PI * 2);
      ctx.fill();
      
      // 绘制核心
      const coreGradient = ctx.createRadialGradient(centerX - 10, centerY - 10, 0, centerX, centerY, coreSize);
      if (currentState === 'happy') {
        coreGradient.addColorStop(0, '#e0e8ff');
        coreGradient.addColorStop(0.3, '#a0b0ff');
        coreGradient.addColorStop(0.7, '#6070df');
        coreGradient.addColorStop(1, '#3040a0');
      } else if (currentState === 'thinking') {
        coreGradient.addColorStop(0, '#c0d0ff');
        coreGradient.addColorStop(0.3, '#8090df');
        coreGradient.addColorStop(0.7, '#4050a0');
        coreGradient.addColorStop(1, '#203060');
      } else {
        coreGradient.addColorStop(0, '#d0d8ff');
        coreGradient.addColorStop(0.3, '#8090e0');
        coreGradient.addColorStop(0.7, '#4050a0');
        coreGradient.addColorStop(1, '#203070');
      }
      ctx.fillStyle = coreGradient;
      ctx.beginPath();
      ctx.arc(centerX, centerY, coreSize, 0, Math.PI * 2);
      ctx.fill();
      
      // 核心高光
      ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
      ctx.beginPath();
      ctx.arc(centerX - 15, centerY - 15, coreSize * 0.25, 0, Math.PI * 2);
      ctx.fill();
      
      requestAnimationFrame(draw);
    }
    
    // 按钮事件
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentState = btn.dataset.state;
      });
    });
    
    // 启动
    draw();
  </script>
</body>
</html>
