<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>墨言 - 虚拟形象</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a0a2a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0f0;
      overflow: hidden;
    }
    
    #avatar-container {
      position: relative;
      width: 500px;
      height: 500px;
      margin-bottom: 30px;
    }
    
    #avatar-canvas {
      width: 100%;
      height: 100%;
    }
    
    .name-tag {
      font-size: 28px;
      font-weight: 300;
      color: #c0c8ff;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(100, 120, 255, 0.5);
      letter-spacing: 8px;
    }
    
    .status-text {
      font-size: 16px;
      color: #8888aa;
      margin-bottom: 25px;
      transition: all 0.3s ease;
      height: 24px;
    }
    
    .status-text.active {
      color: #a0a0ff;
    }
    
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 500px;
    }
    
    .control-btn {
      padding: 10px 20px;
      border: 1px solid rgba(100, 120, 200, 0.3);
      background: rgba(30, 30, 60, 0.6);
      color: #c0c0e0;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }
    
    .control-btn:hover {
      background: rgba(50, 50, 100, 0.8);
      border-color: rgba(100, 120, 200, 0.6);
      transform: translateY(-2px);
    }
    
    .control-btn.active {
      background: rgba(60, 60, 140, 0.8);
      border-color: rgba(120, 140, 255, 0.8);
      color: #ffffff;
      box-shadow: 0 0 20px rgba(100, 100, 255, 0.3);
    }
    
    .info {
      position: fixed;
      bottom: 20px;
      font-size: 12px;
      color: #666688;
    }
  </style>
</head>
<body>
  <div class="name-tag">墨 言</div>
  
  <div id="avatar-container">
    <canvas id="avatar-canvas"></canvas>
  </div>
  
  <div class="status-text" id="status-text">待机中</div>
  
  <div class="controls">
    <button class="control-btn active" data-state="idle">💤 待机</button>
    <button class="control-btn" data-state="speaking">💬 说话</button>
    <button class="control-btn" data-state="thinking">💭 思考</button>
    <button class="control-btn" data-state="happy">✨ 开心</button>
  </div>
  
  <div class="info">墨言 · 虚拟形象 v2.0</div>
  
  <script>
    const canvas = document.getElementById('avatar-canvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('status-text');
    const buttons = document.querySelectorAll('.control-btn');
    
    // 高清画布
    const dpr = window.devicePixelRatio || 1;
    canvas.width = 500 * dpr;
    canvas.height = 500 * dpr;
    ctx.scale(dpr, dpr);
    
    // 状态变量
    let currentState = 'idle';
    let time = 0;
    let hairParticles = [];
    let auraParticles = [];
    let blinkTimer = 0;
    let isBlinking = false;
    let mouthOpen = 0;
    let bodyBob = 0;
    
    // 初始化头发粒子
    for (let i = 0; i < 15; i++) {
      hairParticles.push({
        x: 0,
        y: 0,
        vx: (Math.random() - 0.5) * 0.5,
        vy: Math.random() * 0.3 + 0.1,
        size: Math.random() * 2 + 1,
        opacity: Math.random() * 0.5 + 0.3
      });
    }
    
    // 初始化光晕粒子
    for (let i = 0; i < 20; i++) {
      auraParticles.push({
        angle: Math.random() * Math.PI * 2,
        distance: 80 + Math.random() * 60,
        size: Math.random() * 2 + 1,
        speed: (Math.random() - 0.5) * 0.02,
        opacity: Math.random() * 0.4 + 0.2
      });
    }
    
    // 绘制头发
    function drawHair(x, y, state) {
      ctx.save();
      
      // 头发的渐变
      const hairGradient = ctx.createLinearGradient(x - 60, y - 80, x + 60, y + 20);
      hairGradient.addColorStop(0, '#1a2060');
      hairGradient.addColorStop(0.5, '#2a3090');
      hairGradient.addColorStop(1, '#1a1050');
      
      ctx.fillStyle = hairGradient;
      
      // 飘动的头发
      const wave = Math.sin(time * 2) * 5;
      const hairExtend = state === 'speaking' ? Math.sin(time * 8) * 3 : 0;
      
      // 后层头发
      ctx.beginPath();
      ctx.moveTo(x - 45, y - 60);
      ctx.quadraticCurveTo(x - 60 + wave, y - 20, x - 55 + wave * 1.5, y + 30);
      ctx.quadraticCurveTo(x - 50, y + 50, x - 35, y + 40);
      ctx.quadraticCurveTo(x - 30, y, x - 35, y - 50);
      ctx.closePath();
      ctx.fill();
      
      // 右侧头发
      ctx.beginPath();
      ctx.moveTo(x + 45, y - 60);
      ctx.quadraticCurveTo(x + 60 - wave, y - 20, x + 55 - wave * 1.5, y + 30);
      ctx.quadraticCurveTo(x + 50, y + 50, x + 35, y + 40);
      ctx.quadraticCurveTo(x + 30, y, x + 35, y - 50);
      ctx.closePath();
      ctx.fill();
      
      // 头顶头发
      ctx.beginPath();
      ctx.ellipse(x, y - 65, 50, 25, 0, Math.PI, 0);
      ctx.fill();
      
      // 刘海
      ctx.beginPath();
      ctx.moveTo(x - 35, y - 60);
      ctx.quadraticCurveTo(x - 30 + wave * 0.3, y - 45, x - 25, y - 38);
      ctx.quadraticCurveTo(x - 15 + wave * 0.5, y - 50, x, y - 45);
      ctx.quadraticCurveTo(x + 15 - wave * 0.5, y - 50, x + 25, y - 38);
      ctx.quadraticCurveTo(x + 30 - wave * 0.3, y - 45, x + 35, y - 60);
      ctx.quadraticCurveTo(x, y - 55, x - 35, y - 60);
      ctx.fill();
      
      // 头发高光
      ctx.strokeStyle = 'rgba(150, 170, 255, 0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x - 20, y - 70);
      ctx.quadraticCurveTo(x - 15, y - 50, x - 18, y - 30);
      ctx.stroke();
      
      ctx.restore();
    }
    
    // 绘制脸部
    function drawFace(x, y, state) {
      ctx.save();
      
      // 脸型 - 椭圆
      const faceGradient = ctx.createRadialGradient(x - 10, y - 15, 0, x, y, 50);
      faceGradient.addColorStop(0, '#f8f0f8');
      faceGradient.addColorStop(0.7, '#e8e0e8');
      faceGradient.addColorStop(1, '#d8d0d8');
      
      ctx.fillStyle = faceGradient;
      ctx.beginPath();
      ctx.ellipse(x, y, 42, 50, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // 肤色过渡
      ctx.fillStyle = '#f0e8f0';
      ctx.beginPath();
      ctx.ellipse(x, y - 5, 38, 45, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // 眼睛
      const eyeY = y - 12;
      const eyeSpacing = 18;
      
      // 眼白
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.ellipse(x - eyeSpacing, eyeY, 10, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(x + eyeSpacing, eyeY, 10, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // 瞳孔
      let pupilOffsetX = 0;
      let pupilOffsetY = 0;
      if (state === 'thinking') {
        pupilOffsetY = -2;
      } else if (state === 'speaking') {
        pupilOffsetX = Math.sin(time * 3) * 2;
      }
      
      // 眨眼处理
      let eyeHeight = 7;
      if (isBlinking) {
        eyeHeight = 1;
      }
      
      const pupilColor = '#2a3080';
      ctx.fillStyle = pupilColor;
      
      // 左眼
      ctx.beginPath();
      ctx.ellipse(x - eyeSpacing + pupilOffsetX, eyeY + pupilOffsetY, 5, eyeHeight, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // 右眼
      ctx.beginPath();
      ctx.ellipse(x + eyeSpacing + pupilOffsetX, eyeY + pupilOffsetY, 5, eyeHeight, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // 眼睛高光
      if (!isBlinking) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.beginPath();
        ctx.arc(x - eyeSpacing - 2, eyeY - 2, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + eyeSpacing - 2, eyeY - 2, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // 眉毛
      ctx.strokeStyle = '#3a3070';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      
      let browAngle = 0;
      if (state === 'thinking') {
        browAngle = -0.1;
      } else if (state === 'happy') {
        browAngle = 0.15;
      }
      
      // 左眉
      ctx.beginPath();
      ctx.moveTo(x - eyeSpacing - 8, eyeY - 14 + browAngle * 10);
      ctx.quadraticCurveTo(x - eyeSpacing, eyeY - 16 + browAngle * 5, x - eyeSpacing + 8, eyeY - 14 + browAngle * 10);
      ctx.stroke();
      
      // 右眉
      ctx.beginPath();
      ctx.moveTo(x + eyeSpacing - 8, eyeY - 14 + browAngle * 10);
      ctx.quadraticCurveTo(x + eyeSpacing, eyeY - 16 + browAngle * 5, x + eyeSpacing + 8, eyeY - 14 + browAngle * 10);
      ctx.stroke();
      
      // 嘴巴
      const mouthY = y + 22;
      ctx.strokeStyle = '#6a5070';
      ctx.lineWidth = 2;
      
      if (state === 'speaking') {
        // 说话 - 动态张嘴
        mouthOpen = Math.abs(Math.sin(time * 6)) * 8;
        ctx.beginPath();
        ctx.ellipse(x, mouthY, 8, mouthOpen, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#c08080';
        ctx.fill();
        ctx.stroke();
      } else if (state === 'happy') {
        // 开心 - 微笑
        ctx.beginPath();
        ctx.arc(x, mouthY - 5, 12, 0.1 * Math.PI, 0.9 * Math.PI);
        ctx.stroke();
      } else if (state === 'thinking') {
        // 思考 - 微微张开
        ctx.beginPath();
        ctx.ellipse(x, mouthY, 5, 3, 0, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        // 默认 - 自然闭合
        ctx.beginPath();
        ctx.moveTo(x - 6, mouthY);
        ctx.quadraticCurveTo(x, mouthY + 2, x + 6, mouthY);
        ctx.stroke();
      }
      
      // 腮红 (开心时有)
      if (state === 'happy') {
        ctx.fillStyle = 'rgba(255, 150, 150, 0.3)';
        ctx.beginPath();
        ctx.ellipse(x - 30, y + 5, 8, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(x + 30, y + 5, 8, 5, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      
      ctx.restore();
    }
    
    // 绘制身体
    function drawBody(x, y, state) {
      ctx.save();
      
      const bobOffset = Math.sin(bodyBob) * 2;
      y += bobOffset;
      
      // 衣服渐变
      const clothGradient = ctx.createLinearGradient(x - 40, y, x + 40, y + 100);
      clothGradient.addColorStop(0, '#2a2a4a');
      clothGradient.addColorStop(1, '#1a1a3a');
      
      ctx.fillStyle = clothGradient;
      
      // 身体/衣服
      ctx.beginPath();
      ctx.moveTo(x - 35, y);
      ctx.quadraticCurveTo(x - 45, y + 60, x - 30, y + 100);
      ctx.lineTo(x + 30, y + 100);
      ctx.quadraticCurveTo(x + 45, y + 60, x + 35, y);
      ctx.quadraticCurveTo(x, y - 10, x - 35, y);
      ctx.fill();
      
      // 领口
      ctx.fillStyle = '#3a3a5a';
      ctx.beginPath();
      ctx.moveTo(x - 15, y);
      ctx.quadraticCurveTo(x, y + 15, x + 15, y);
      ctx.quadraticCurveTo(x, y + 5, x - 15, y);
      ctx.fill();
      
      // 袖子
      ctx.fillStyle = '#252545';
      
      // 左袖
      ctx.beginPath();
      ctx.moveTo(x - 35, y + 5);
      ctx.quadraticCurveTo(x - 55, y + 30, x - 50, y + 55);
      ctx.quadraticCurveTo(x - 40, y + 50, x - 35, y + 30);
      ctx.fill();
      
      // 右袖
      ctx.beginPath();
      ctx.moveTo(x + 35, y + 5);
      ctx.quadraticCurveTo(x + 55, y + 30, x + 50, y + 55);
      ctx.quadraticCurveTo(x + 40, y + 50, x + 35, y + 30);
      ctx.fill();
      
      ctx.restore();
    }
    
    // 绘制光晕
    function drawAura(x, y, state) {
      ctx.save();
      
      let intensity = 0.15;
      let size = 120;
      let color = 'rgba(100, 120, 200, ';
      
      if (state === 'idle') {
        intensity = 0.12 + Math.sin(time * 1.5) * 0.03;
        size = 120 + Math.sin(time) * 10;
      } else if (state === 'speaking') {
        intensity = 0.2 + Math.sin(time * 4) * 0.08;
        size = 130 + Math.sin(time * 3) * 15;
      } else if (state === 'thinking') {
        intensity = 0.18 + Math.sin(time * 0.8) * 0.05;
        size = 115 + Math.sin(time * 0.5) * 8;
      } else if (state === 'happy') {
        intensity = 0.25 + Math.sin(time * 2) * 0.1;
        size = 150 + Math.sin(time * 2) * 20;
        color = 'rgba(150, 170, 255, ';
      }
      
      const gradient = ctx.createRadialGradient(x, y - 20, 0, x, y - 20, size);
      gradient.addColorStop(0, color + intensity + ')');
      gradient.addColorStop(0.5, color + (intensity * 0.4) + ')');
      gradient.addColorStop(1, 'rgba(60, 80, 160, 0)');
      
      ctx.fillStyle = gradient;
      ctx.fillRect(x - size, y - size - 20, size * 2, size * 2);
      
      // 浮动粒子
      auraParticles.forEach(p => {
        p.angle += p.speed;
        if (state === 'happy') p.angle += 0.01;
        
        const px = x + Math.cos(p.angle) * (p.distance + Math.sin(time) * 10);
        const py = y - 20 + Math.sin(p.angle) * (p.distance * 0.6 + Math.cos(time) * 10);
        
        ctx.fillStyle = `rgba(150, 170, 255, ${p.opacity})`;
        ctx.beginPath();
        ctx.arc(px, py, p.size, 0, Math.PI * 2);
        ctx.fill();
      });
      
      ctx.restore();
    }
    
    // 绘制头发飘散粒子
    function drawHairParticles(x, y) {
      ctx.save();
      
      hairParticles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        
        if (p.y > 50) {
          p.y = -50;
          p.x = (Math.random() - 0.5) * 80;
        }
        
        ctx.fillStyle = `rgba(80, 100, 200, ${p.opacity})`;
        ctx.beginPath();
        ctx.arc(x + p.x, y - 80 + p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });
      
      ctx.restore();
    }
    
    // 主绘制函数
    function draw() {
      ctx.clearRect(0, 0, 500, 500);
      time += 0.016;
      
      const centerX = 250;
      const baseY = 220;
      
      // 更新眨眼
      blinkTimer += 0.016;
      if (blinkTimer > 3 + Math.random() * 2) {
        isBlinking = true;
        setTimeout(() => { isBlinking = false; }, 100);
        blinkTimer = 0;
      }
      
      // 更新身体晃动
      bodyBob += 0.03;
      
      // 更新状态文本
      if (currentState === 'idle') {
        statusText.textContent = '💤 待机中';
      } else if (currentState === 'speaking') {
        statusText.textContent = '💬 说话中';
      } else if (currentState === 'thinking') {
        statusText.textContent = '💭 思考中';
      } else if (currentState === 'happy') {
        statusText.textContent = '✨ 开心';
      }
      
      // 绘制层级
      drawAura(centerX, baseY, currentState);
      drawHairParticles(centerX, baseY);
      drawBody(centerX, baseY + 50, currentState);
      drawHair(centerX, baseY, currentState);
      drawFace(centerX, baseY, currentState);
      
      requestAnimationFrame(draw);
    }
    
    // 按钮事件
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentState = btn.dataset.state;
      });
    });
    
    // 启动
    draw();
  </script>
</body>
</html>
